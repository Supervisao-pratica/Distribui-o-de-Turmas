<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Senac Portão - Distribuição de Turmas</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- VERSÕES ESTÁVEIS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    
    <!-- SheetJS (Para ler Excel .xlsx, .xlsm, .xls) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const RechartsObj = window.Recharts || null;
        
        // Ícones SVG
        const Icons = {
            Users: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
            BookOpen: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
            School: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m4 6 8-4 8 4"/><path d="m18 10 4 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-8l4-2"/><path d="M14 22v-4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v4"/><path d="M18 5v17"/><path d="M6 5v17"/></svg>,
            Upload: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
            Search: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
            CheckCircle: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
            ArrowRightLeft: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m16 3 4 4-4 4"/><path d="M20 7H4"/><path d="m8 21-4-4 4-4"/><path d="M4 17h16"/></svg>,
            BarChart3: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>,
            AlertCircle: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
            Info: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>,
            CheckSquare: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        };

        const MOCK_DATA = [
            { id: '202500029', curso: 'Administrativo', analista: 'Bianca', alunos: 31, inicio: '2025-02-17', termino: '2026-02-11', instrutor1: 'Sheila', instrutor2: 'Bruna', dataTransferencia: '2026-02-04' },
            { id: '202500118', curso: 'Administrativo', analista: 'Bianca', alunos: 31, inicio: '2025-02-17', termino: '2026-02-11', instrutor1: 'Bruna', instrutor2: 'Jaqueline', dataTransferencia: '2026-02-04' },
            { id: '202501228', curso: 'Supermercado', analista: 'Bianca', alunos: 28, inicio: '2025-12-02', termino: '2026-12-01', instrutor1: 'Luciano', instrutor2: 'Claire', dataTransferencia: '2026-02-04' },
            { id: '202400999', curso: 'Vendas', analista: 'Mariana', alunos: 25, inicio: '2024-01-01', termino: '2024-12-01', instrutor1: 'Sheila', instrutor2: '', dataTransferencia: '' } 
        ];

        function App() {
            const [data, setData] = useState(MOCK_DATA);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [newClassCourse, setNewClassCourse] = useState('Administrativo');
            const [newClassStudents, setNewClassStudents] = useState(30);
            const [recommendation, setRecommendation] = useState(null);
            const [uploadError, setUploadError] = useState(null);
            const fileInputRef = useRef(null);
            const [isMockData, setIsMockData] = useState(true);
            const [chartsLoaded, setChartsLoaded] = useState(!!RechartsObj);

            useEffect(() => {
                if (!chartsLoaded && window.Recharts) {
                    setChartsLoaded(true);
                }
            }, [chartsLoaded]);

            // --- LÓGICA DE UPLOAD REFINADA (EXCEL + CSV) ---
            const handleFileUpload = (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();

                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        // Lê o arquivo usando SheetJS (suporta xlsx, xlsm, xls, csv, txt)
                        const workbook = XLSX.read(data, {type: 'array', cellDates: true});
                        
                        // Pega a primeira aba da planilha
                        const firstSheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[firstSheetName];
                        
                        // Converte para JSON (Array de Arrays)
                        const jsonData = XLSX.utils.sheet_to_json(worksheet, {header: 1});

                        // Remove cabeçalho (primeira linha) e processa
                        const cleanData = [];
                        
                        // Começa do índice 1 para pular o cabeçalho
                        for (let i = 1; i < jsonData.length; i++) {
                            const cols = jsonData[i];
                            
                            // Verifica se a linha não está vazia (pelo menos coluna A existe)
                            if (cols && cols.length > 0 && cols[0]) {
                                
                                // Função auxiliar para normalizar datas vindas do Excel ou Texto
                                const parseDate = (val) => {
                                    if (!val) return '';
                                    
                                    // Se for objeto Date (Excel converteu automaticamente)
                                    if (val instanceof Date) {
                                        // Ajusta fuso horário simples para YYYY-MM-DD
                                        return val.toISOString().split('T')[0];
                                    }
                                    
                                    // Se for string
                                    if (typeof val === 'string') {
                                        val = val.trim();
                                        if (val.length < 8) return ''; // Ignora "OK", "X"
                                        
                                        // DD/MM/YYYY
                                        if (val.match(/^\d{1,2}\/\d{1,2}\/\d{4}$/)) {
                                            const parts = val.split('/');
                                            return `${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`;
                                        }
                                        // YYYY-MM-DD
                                        else if (val.match(/^\d{4}-\d{2}-\d{2}$/)) {
                                            return val;
                                        }
                                    }
                                    return '';
                                };

                                cleanData.push({
                                    id: String(cols[0] || '').trim(), // Col A
                                    curso: String(cols[1] || 'Desconhecido').trim(), // Col B
                                    analista: String(cols[2] || '').trim(), // Col C
                                    alunos: parseInt(cols[3] || 0), // Col D
                                    inicio: parseDate(cols[4]), // Col E
                                    termino: parseDate(cols[5]), // Col F
                                    instrutor1: String(cols[6] || '').trim(), // Col G
                                    instrutor2: String(cols[7] || '').trim(), // Col H
                                    dataTransferencia: parseDate(cols[8]) // Col I
                                });
                            }
                        }

                        if (cleanData.length === 0) throw new Error("Nenhum dado válido encontrado.");

                        setData(cleanData);
                        setIsMockData(false);
                        setUploadError(null);
                        setActiveTab('list'); 
                    } catch (err) {
                        console.error("Erro Processamento:", err);
                        setUploadError("Erro ao ler o arquivo. Verifique se é um arquivo Excel ou CSV válido.");
                    }
                };

                // Usa readAsArrayBuffer para suportar binários do Excel
                reader.readAsArrayBuffer(file);
                event.target.value = null; 
            };

            // --- PROCESSAMENTO INTELIGENTE ---
            const processedData = useMemo(() => {
                const today = new Date();
                today.setHours(0,0,0,0);
                
                return data.map(row => {
                    let currentInstructor = row.instrutor1;
                    let status = 'Em Andamento';
                    let isFinished = false;

                    // 1. Verifica se já acabou (Término < Hoje)
                    if (row.termino) {
                        const terminoDate = new Date(row.termino + 'T00:00:00');
                        if (!isNaN(terminoDate.getTime()) && today > terminoDate) {
                            status = 'Concluída';
                            isFinished = true;
                        }
                    }

                    // 2. Verifica Transferência (apenas se não estiver concluída)
                    if (!isFinished && row.instrutor2 && row.dataTransferencia) {
                        const transferDate = new Date(row.dataTransferencia + 'T00:00:00'); 
                        if (!isNaN(transferDate.getTime())) {
                            if (today >= transferDate) {
                                currentInstructor = row.instrutor2;
                                status = 'Transferido';
                            }
                        }
                    }

                    if (!currentInstructor || currentInstructor.trim() === '') {
                        currentInstructor = 'Não Atribuído';
                    }

                    return {
                        ...row,
                        instrutorAtual: currentInstructor,
                        statusTransferencia: status,
                        isFinished: isFinished
                    };
                });
            }, [data]);

            // --- ESTATÍSTICAS (FILTRANDO CONCLUÍDAS) ---
            const instructorStats = useMemo(() => {
                const stats = {};
                processedData.forEach(row => {
                    if (row.isFinished || row.instrutorAtual === 'Não Atribuído') return;

                    const instrutor = row.instrutorAtual;

                    if (!stats[instrutor]) {
                        stats[instrutor] = { nome: instrutor, totalAlunos: 0, totalTurmas: 0, cursos: {} };
                    }
                    stats[instrutor].totalAlunos += parseInt(row.alunos || 0);
                    stats[instrutor].totalTurmas += 1;
                    const cursoTipo = row.curso || 'Outros';
                    stats[instrutor].cursos[cursoTipo] = (stats[instrutor].cursos[cursoTipo] || 0) + 1;
                });
                return Object.values(stats).sort((a,b) => b.totalAlunos - a.totalAlunos);
            }, [processedData]);

            // --- SIMULADOR ---
            const handleSimulate = () => {
                const scores = instructorStats.map(inst => {
                    const loadScore = inst.totalAlunos * 1; 
                    const classScore = inst.totalTurmas * 15; 
                    const courseRepetitionScore = (inst.cursos[newClassCourse] || 0) * 50; 
                    return {
                        ...inst,
                        score: loadScore + classScore + courseRepetitionScore,
                        details: { alunos: inst.totalAlunos, turmas: inst.totalTurmas, mesmoCurso: inst.cursos[newClassCourse] || 0 }
                    };
                });
                scores.sort((a, b) => a.score - b.score);
                setRecommendation(scores);
            };

            const StatCard = ({ title, value, icon: IconComponent, color }) => (
                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                    <div>
                        <p className="text-gray-500 text-sm font-medium mb-1">{title}</p>
                        <h3 className="text-3xl font-bold text-gray-800">{value}</h3>
                    </div>
                    <div className={`p-3 rounded-full text-white ${color}`}><IconComponent /></div>
                </div>
            );

            // Gráficos Seguros
            const ChartsSection = () => {
                if (!window.Recharts) return <div className="p-4 bg-yellow-50 text-yellow-800 rounded">Carregando gráficos...</div>;
                const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell } = window.Recharts;

                return (
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 h-96">
                            <h3 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2"><Icons.BarChart3 /> Carga Ativa (Alunos)</h3>
                            <ResponsiveContainer width="100%" height="90%">
                                <BarChart data={instructorStats} layout="vertical" margin={{ top: 5, right: 30, left: 40, bottom: 5 }}>
                                    <CartesianGrid strokeDasharray="3 3" horizontal={true} vertical={false} />
                                    <XAxis type="number" />
                                    <YAxis dataKey="nome" type="category" width={80} tick={{fontSize: 11}} />
                                    <Tooltip cursor={{fill: '#f4f6f8'}} contentStyle={{borderRadius: '8px', border: 'none', boxShadow: '0 4px 12px rgba(0,0,0,0.1)'}} />
                                    <Bar dataKey="totalAlunos" fill="#004587" radius={[0, 4, 4, 0]} name="Alunos" barSize={20}>
                                        {instructorStats.map((entry, index) => (
                                            <Cell key={`cell-${index}`} fill={index % 2 === 0 ? '#004587' : '#F68B1F'} />
                                        ))}
                                    </Bar>
                                </BarChart>
                            </ResponsiveContainer>
                        </div>
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 h-96">
                            <h3 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2"><Icons.BarChart3 /> Turmas Ativas</h3>
                            <ResponsiveContainer width="100%" height="90%">
                                <BarChart data={instructorStats} margin={{ top: 5, right: 30, left: 20, bottom: 5 }}>
                                    <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                    <XAxis dataKey="nome" tick={{fontSize: 11}} />
                                    <YAxis allowDecimals={false} />
                                    <Tooltip cursor={{fill: '#f4f6f8'}} contentStyle={{borderRadius: '8px', border: 'none', boxShadow: '0 4px 12px rgba(0,0,0,0.1)'}} />
                                    <Bar dataKey="totalTurmas" fill="#00A4E0" radius={[4, 4, 0, 0]} name="Turmas" barSize={30} />
                                </BarChart>
                            </ResponsiveContainer>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen pb-10">
                    <input 
                        type="file" 
                        ref={fileInputRef} 
                        onChange={handleFileUpload} 
                        accept=".csv,.txt,.xlsx,.xls,.xlsm" 
                        className="hidden" 
                    />

                    <header className="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-20">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <div className="bg-white p-2 rounded-lg border-l-4 border-orange-500">
                                    <h1 className="text-xl md:text-2xl font-bold text-blue-900 tracking-tight">Senac <span className="text-orange-500">Portão</span></h1>
                                </div>
                            </div>
                            <nav className="flex items-center space-x-2 md:space-x-4">
                                <button onClick={() => setActiveTab('dashboard')} className={`px-3 py-2 rounded-md text-sm font-medium transition-colors ${activeTab === 'dashboard' ? 'bg-blue-50 text-blue-700 border border-blue-200' : 'text-gray-500 hover:text-gray-700'}`}>Dashboard</button>
                                <button onClick={() => setActiveTab('simulator')} className={`px-3 py-2 rounded-md text-sm font-medium transition-colors ${activeTab === 'simulator' ? 'bg-orange-50 text-orange-700 border border-orange-200' : 'text-gray-500 hover:text-gray-700'}`}>Distribuir</button>
                                <button onClick={() => setActiveTab('list')} className={`px-3 py-2 rounded-md text-sm font-medium transition-colors ${activeTab === 'list' ? 'bg-gray-100 text-gray-700 border border-gray-200' : 'text-gray-500 hover:text-gray-700'}`}>Lista</button>
                                <div className="h-6 w-px bg-gray-300 mx-2"></div>
                                <button onClick={() => fileInputRef.current.click()} className="px-3 py-2 rounded-md text-sm font-medium bg-green-600 text-white hover:bg-green-700 shadow-sm transition-colors flex items-center gap-2">
                                    <Icons.Upload /> <span className="hidden sm:inline">Importar Excel/CSV</span>
                                </button>
                            </nav>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        {isMockData && (
                            <div className="mb-6 bg-blue-50 border border-blue-200 text-blue-800 px-4 py-3 rounded-lg flex items-center gap-2 text-sm">
                                <Icons.AlertCircle />
                                <span><strong>Modo Demonstração:</strong> Exibindo dados de exemplo. Clique em "Importar" para carregar sua planilha (xlsx, xlsm, csv).</span>
                            </div>
                        )}
                        {uploadError && (
                            <div className="mb-6 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg flex items-center gap-2">
                                <Icons.AlertCircle />
                                {uploadError}
                            </div>
                        )}

                        {activeTab === 'dashboard' && (
                            <div className="space-y-6 fade-in">
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <StatCard title="Total Alunos Ativos" value={instructorStats.reduce((acc, i) => acc + i.totalAlunos, 0)} icon={Icons.Users} color="bg-blue-600" />
                                    <StatCard title="Turmas Ativas" value={instructorStats.reduce((acc, i) => acc + i.totalTurmas, 0)} icon={Icons.BookOpen} color="bg-orange-500" />
                                    <StatCard title="Turmas Concluídas" value={processedData.filter(d => d.isFinished).length} icon={Icons.CheckSquare} color="bg-gray-400" />
                                </div>

                                <ChartsSection />

                                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                                    <h3 className="text-lg font-bold text-gray-800 mb-6">Detalhamento: Mix de Cursos (Apenas Ativos)</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                        {instructorStats.map((inst) => (
                                            <div key={inst.nome} className="border border-gray-200 rounded-lg p-4 hover:shadow-md transition-shadow bg-gray-50">
                                                <div className="flex justify-between items-center mb-3">
                                                    <h4 className="font-bold text-blue-900">{inst.nome}</h4>
                                                    <span className="text-xs bg-white border border-gray-200 text-gray-600 px-2 py-1 rounded-full">{inst.totalAlunos} alunos</span>
                                                </div>
                                                <div className="space-y-2">
                                                    {Object.entries(inst.cursos).map(([curso, qtd]) => (
                                                        <div key={curso} className="flex justify-between text-sm items-center">
                                                            <span className="text-gray-600 truncate max-w-[150px]" title={curso}>{curso}</span>
                                                            <div className="flex items-center gap-2">
                                                                <div className="w-16 h-2 bg-gray-200 rounded-full overflow-hidden">
                                                                    <div className="h-full bg-orange-400 rounded-full" style={{ width: `${(qtd / inst.totalTurmas) * 100}%` }}></div>
                                                                </div>
                                                                <span className="font-bold text-gray-700 text-xs">{qtd}</span>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'simulator' && (
                            <div className="max-w-4xl mx-auto space-y-8 fade-in">
                                <div className="bg-gradient-to-r from-blue-900 to-blue-800 text-white p-8 rounded-2xl shadow-lg">
                                    <h2 className="text-2xl font-bold mb-2">Simulador de Distribuição</h2>
                                    <p className="text-blue-200 mb-6">Analisa a carga ATUAL de turmas ativas.</p>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 items-end">
                                        <div>
                                            <label className="block text-sm font-medium text-blue-100 mb-1">Nome do Curso</label>
                                            <select value={newClassCourse} onChange={(e) => setNewClassCourse(e.target.value)} className="w-full bg-white/10 border border-blue-400 text-white rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-orange-400 option:text-gray-800">
                                                {[...new Set(processedData.map(d => d.curso))].sort().map(c => (
                                                    <option key={c} value={c} className="text-gray-800">{c}</option>
                                                ))}
                                                <option className="text-gray-800" value="Novo Curso">Outro...</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-blue-100 mb-1">Total de Alunos</label>
                                            <input type="number" value={newClassStudents} onChange={(e) => setNewClassStudents(Number(e.target.value))} className="w-full bg-white/10 border border-blue-400 text-white rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-orange-400" />
                                        </div>
                                    </div>
                                    <button onClick={handleSimulate} className="mt-6 w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-lg shadow-md transition-all flex items-center justify-center gap-2">
                                        <Icons.Search /> Encontrar Melhor Instrutor
                                    </button>
                                </div>
                                {recommendation && (
                                    <div className="space-y-4 fade-in">
                                        <div className="bg-white border-l-4 border-green-500 rounded-lg shadow-md p-6 relative overflow-hidden">
                                            <div className="absolute top-0 right-0 p-4 opacity-10 text-green-500"><Icons.CheckCircle /></div>
                                            <div className="relative z-10">
                                                <p className="text-sm text-green-600 font-bold uppercase tracking-wider mb-1">Melhor Opção</p>
                                                <h2 className="text-3xl font-bold text-gray-800 mb-2">{recommendation[0].nome}</h2>
                                                <p className="text-gray-600 max-w-lg mb-4">Menor carga combinada.</p>
                                                <div className="flex flex-wrap gap-4 text-sm">
                                                    <div className="bg-gray-100 px-3 py-1 rounded">
                                                        <span className="block text-gray-500 text-xs">Alunos Atuais</span>
                                                        <span className="font-bold">{recommendation[0].details.alunos}</span>
                                                    </div>
                                                    <div className="bg-gray-100 px-3 py-1 rounded">
                                                        <span className="block text-gray-500 text-xs">Turmas de {newClassCourse}</span>
                                                        <span className="font-bold">{recommendation[0].details.mesmoCurso}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                                            <div className="divide-y divide-gray-100">
                                                {recommendation.slice(1).map((inst, idx) => (
                                                    <div key={inst.nome} className="px-6 py-4 flex items-center justify-between hover:bg-gray-50">
                                                        <div className="flex items-center gap-4">
                                                            <span className="text-gray-400 font-mono text-lg w-6">#{idx + 2}</span>
                                                            <div>
                                                                <p className="font-medium text-gray-800">{inst.nome}</p>
                                                                <p className="text-xs text-gray-500">{inst.details.alunos} alunos • {inst.details.mesmoCurso} turmas deste curso</p>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'list' && (
                            <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden fade-in">
                                <div className="p-6 border-b border-gray-200 flex justify-between items-center">
                                    <h3 className="font-bold text-gray-800 text-lg">Base de Dados Completa</h3>
                                    <span className="text-sm bg-blue-100 text-blue-800 px-3 py-1 rounded-full font-bold">
                                        {processedData.length} Turmas
                                    </span>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-sm text-left text-gray-500">
                                        <thead className="text-xs text-gray-700 uppercase bg-gray-50">
                                            <tr>
                                                <th className="px-6 py-3">ID Turma</th>
                                                <th className="px-6 py-3">Curso</th>
                                                <th className="px-6 py-3 text-center">Alunos</th>
                                                <th className="px-6 py-3">Término</th>
                                                <th className="px-6 py-3">Instr. 1</th>
                                                <th className="px-6 py-3">Instr. 2</th>
                                                <th className="px-6 py-3">Data Transf.</th>
                                                <th className="px-6 py-3">Status / Resp.</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {processedData.map((row, idx) => (
                                                <tr key={idx} className={`border-b ${row.isFinished ? 'bg-gray-100 text-gray-400' : 'bg-white hover:bg-gray-50'}`}>
                                                    <td className="px-6 py-4 font-medium">{row.id}</td>
                                                    <td className="px-6 py-4">
                                                        <span className={`px-2 py-1 rounded-full text-xs font-semibold
                                                            ${row.isFinished ? 'bg-gray-200 text-gray-500' :
                                                            row.curso.includes('Administrativo') ? 'bg-blue-100 text-blue-800' : 
                                                            row.curso.includes('Vendas') ? 'bg-green-100 text-green-800' : 
                                                            'bg-orange-100 text-orange-800'}`}>
                                                            {row.curso}
                                                        </span>
                                                    </td>
                                                    <td className="px-6 py-4 text-center font-bold">{row.alunos}</td>
                                                    <td className="px-6 py-4 text-xs font-mono">{row.termino}</td>
                                                    <td className="px-6 py-4">{row.instrutor1}</td>
                                                    <td className="px-6 py-4">{row.instrutor2 || '-'}</td>
                                                    <td className="px-6 py-4 text-xs font-mono">{row.dataTransferencia || '-'}</td>
                                                    <td className="px-6 py-4">
                                                        <div className="flex items-center gap-2">
                                                            {row.isFinished ? (
                                                                <span className="flex items-center gap-1 font-bold text-gray-500">
                                                                    <Icons.CheckSquare /> Concluída
                                                                </span>
                                                            ) : (
                                                                <>
                                                                    <span className="font-bold text-blue-900">{row.instrutorAtual}</span>
                                                                    {row.statusTransferencia === 'Transferido' && (
                                                                        <Icons.ArrowRightLeft className="text-orange-500 w-4 h-4" title="Transferida" />
                                                                    )}
                                                                </>
                                                            )}
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
