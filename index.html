                                    <div className="md:col-span-2 pt-4 flex gap-3">
                                        <button type="button" onClick={() => setIsFormOpen(false)} className="flex-1 py-3 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300 font-bold">Cancelar</button>
                                        <button type="submit" className="flex-1 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-bold shadow-lg">Salvar Turma</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {isSubModalOpen && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 backdrop-blur-sm fade-in">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg">
                                <div className="p-6 border-b border-gray-100 flex justify-between items-center bg-purple-700 text-white rounded-t-2xl">
                                    <h3 className="text-xl font-bold flex items-center gap-2"><Icons.Switch /> Registrar Substituição</h3>
                                    <button onClick={() => setIsSubModalOpen(false)} className="hover:bg-white/20 p-1 rounded-full text-white">✕</button>
                                </div>
                                <form onSubmit={handleAddSub} className="p-6 space-y-4">
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">Data da Falta</label>
                                        <input required type="date" className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-purple-500" value={newSub.data} onChange={e => setNewSub({...newSub, data: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">Selecione a Turma</label>
                                        <select required className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-purple-500" value={newSub.turmaId} onChange={e => setNewSub({...newSub, turmaId: e.target.value})}>
                                            <option value="">Selecione...</option>
                                            {processedData.filter(t => t.status === 'Ativo' || t.status === 'Transferido').map(t => (
                                                <option key={t.id} value={t.id}>{t.id} - {t.curso} ({t.instrutorAtual})</option>
                                            ))}
                                        </select>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-bold text-red-600 mb-1">Instrutor Ausente</label>
                                            <input required type="text" className="w-full p-2 border border-red-200 bg-red-50 rounded" value={newSub.instrutorAusente} onChange={e => setNewSub({...newSub, instrutorAusente: e.target.value})} placeholder="Nome..." />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-green-600 mb-1">Instrutor Substituto</label>
                                            <div className="relative">
                                                <input required type="text" className="w-full p-2 border border-green-200 bg-green-50 rounded pr-8" value={newSub.instrutorSubstituto} onChange={e => setNewSub({...newSub, instrutorSubstituto: e.target.value})} placeholder="Nome..." />
                                                <div className="absolute right-2 top-2.5 text-green-500 text-xs font-bold">AUTO</div>
                                            </div>
                                            <p className="text-xs text-gray-400 mt-1">Sugerido automaticamente se possível.</p>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">Motivo</label>
                                        <input type="text" className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-purple-500" value={newSub.motivo} onChange={e => setNewSub({...newSub, motivo: e.target.value})} placeholder="Ex: Atestado médico, Falta injustificada..." />
                                    </div>
                                    <div className="pt-4 flex gap-3">
                                        <button type="button" onClick={() => setIsSubModalOpen(false)} className="flex-1 py-3 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300 font-bold">Cancelar</button>
                                        <button type="submit" className="flex-1 py-3 bg-purple-600 text-white rounded-lg hover:bg-purple-700 font-bold shadow-lg">Confirmar</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
                </ErrorBoundary>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
