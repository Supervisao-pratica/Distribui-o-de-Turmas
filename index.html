<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Senac Portão - Gestão Completa</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- VERSÕES ESTÁVEIS (React, Recharts, SheetJS) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .alert-pulse { animation: pulse-border 2s infinite; }
        @keyframes pulse-border { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, Component } = React;
        
        // --- ERROR BOUNDARY (Evita tela branca) ---
        class ErrorBoundary extends Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            componentDidCatch(error, errorInfo) {
                console.error("Erro no Dashboard:", error, errorInfo);
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen flex items-center justify-center bg-red-50 p-4">
                            <div className="bg-white p-8 rounded-xl shadow-xl max-w-lg text-center">
                                <h1 className="text-2xl font-bold text-red-600 mb-4">Ops! Algo deu errado.</h1>
                                <p className="text-gray-600 mb-4">Ocorreu um erro ao processar os dados. Isso geralmente acontece com arquivos Excel muito complexos ou corrompidos.</p>
                                <div className="bg-gray-100 p-3 rounded text-left text-xs font-mono overflow-auto max-h-32 mb-4">
                                    {this.state.error && this.state.error.toString()}
                                </div>
                                <button onClick={() => window.location.reload()} className="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700">
                                    Recarregar Página
                                </button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // --- ÍCONES ---
        const Icons = {
            Users: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>,
            BookOpen: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>,
            Upload: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>,
            Download: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>,
            Alert: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>,
            Plus: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4" /></svg>,
            Filter: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" /></svg>,
            Switch: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" /></svg>,
            Calendar: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
            Search: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>,
            Check: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7" /></svg>,
            Clock: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
        };

        const MOCK_DATA = [
            { id: '202500029', curso: 'Administrativo', analista: 'Bianca', alunos: 31, inicio: '2025-02-17', termino: '2026-02-11', instrutor1: 'Sheila', instrutor2: 'Bruna', dataTransferencia: '2026-02-04' },
            { id: '202500118', curso: 'Administrativo', analista: 'Bianca', alunos: 31, inicio: '2025-02-17', termino: '2026-02-11', instrutor1: 'Bruna', instrutor2: 'Jaqueline', dataTransferencia: '2026-02-04' },
            { id: '202501228', curso: 'Supermercado', analista: 'Bianca', alunos: 28, inicio: '2025-12-02', termino: '2026-12-01', instrutor1: 'Luciano', instrutor2: 'Claire', dataTransferencia: '2026-02-04' }
        ];

        const COURSE_OPTIONS = [
            'Administrativo',
            'Administrativo - Aprendizagem Técnica',
            'Vendas',
            'Supermercado',
            'Logística',
            'Informática',
            'Outro'
        ];

        // --- COMPONENTE PRINCIPAL ---
        function App() {
            // Estados Principais
            const [data, setData] = useState(MOCK_DATA);
            const [substitutions, setSubstitutions] = useState([]); 
            const [filters, setFilters] = useState({ instrutor: '', analista: '' });
            
            // Navegação e Modais
            const [activeTab, setActiveTab] = useState('dashboard'); 
            const [isFormOpen, setIsFormOpen] = useState(false);
            const [isSubModalOpen, setIsSubModalOpen] = useState(false);
            
            // Formulários
            const [newClass, setNewClass] = useState({
                id: '', curso: '', analista: '', alunos: '', inicio: '', termino: '', instrutor1: '', instrutor2: '', dataTransferencia: ''
            });
            const [newSub, setNewSub] = useState({
                data: '', turmaId: '', instrutorAusente: '', instrutorSubstituto: '', motivo: '', status: 'Pendente'
            });
            
            // Simulador
            const [simData, setSimData] = useState({ curso: 'Administrativo', alunos: 30 });
            const [recommendations, setRecommendations] = useState(null);

            // Substituições Urgentes
            const [urgentSubs, setUrgentSubs] = useState([]);

            const fileInputRef = useRef(null);

            // --- 1. PROCESSAMENTO SEGURO DE DADOS ---
            const processedData = useMemo(() => {
                const today = new Date();
                today.setHours(0,0,0,0);

                return data.map(row => {
                    if (!row) return null;

                    let currentInstructor = row.instrutor1;
                    let status = 'Ativo';
                    let isFinished = false;

                    try {
                        if (row.termino) {
                            const terminoDate = new Date(row.termino + 'T00:00:00');
                            if (!isNaN(terminoDate.getTime()) && today > terminoDate) {
                                status = 'Concluída';
                                isFinished = true;
                            }
                        }
                        if (!isFinished && row.instrutor2 && row.dataTransferencia) {
                            const transferDate = new Date(row.dataTransferencia + 'T00:00:00'); 
                            if (!isNaN(transferDate.getTime())) {
                                if (today >= transferDate) {
                                    currentInstructor = row.instrutor2;
                                    status = 'Transferido';
                                }
                            }
                        }
                    } catch(e) {
                        console.warn("Erro ao processar linha:", row, e);
                    }

                    if (!currentInstructor || String(currentInstructor).trim() === '') currentInstructor = 'Não Atribuído';

                    return { ...row, instrutorAtual: currentInstructor, status, isFinished };
                }).filter(Boolean);
            }, [data]);

            // --- 2. DETECÇÃO DE SUBSTITUIÇÕES URGENTES (Hoje/Amanhã) ---
            useEffect(() => {
                const today = new Date();
                today.setHours(0,0,0,0);
                const tomorrow = new Date(today);
                tomorrow.setDate(tomorrow.getDate() + 1);

                const urgent = substitutions.filter(sub => {
                    if (sub.status === 'Confirmada') return false; 
                    if (!sub.data) return false;
                    
                    try {
                        const subDate = new Date(sub.data + 'T00:00:00');
                        if (isNaN(subDate.getTime())) return false;
                        // Verifica se é hoje ou amanhã
                        return subDate.getTime() === today.getTime() || subDate.getTime() === tomorrow.getTime();
                    } catch(e) { return false; }
                });

                setUrgentSubs(urgent);
            }, [substitutions]);

            const confirmSubstitution = (originalSub) => {
                const updatedSubs = substitutions.map(s => {
                    if (s === originalSub) return { ...s, status: 'Confirmada' };
                    return s;
                });
                setSubstitutions(updatedSubs);
                alert("Troca confirmada com sucesso!");
            };

            // --- 3. LÓGICA DO DASHBOARD ---
            const filteredData = useMemo(() => {
                return processedData.filter(row => {
                    const iName = row.instrutorAtual || '';
                    const aName = row.analista || '';
                    const matchInstrutor = filters.instrutor === '' || iName === filters.instrutor;
                    const matchAnalista = filters.analista === '' || aName === filters.analista;
                    return matchInstrutor && matchAnalista;
                });
            }, [processedData, filters]);

            const instructorStats = useMemo(() => {
                const stats = {};
                processedData.forEach(row => {
                    if (row.isFinished || row.instrutorAtual === 'Não Atribuído') return;
                    const inst = row.instrutorAtual;
                    
                    if (!stats[inst]) stats[inst] = { nome: inst, totalAlunos: 0, totalTurmas: 0, analistas: new Set(), cursos: {} };
                    
                    const qtdAlunos = parseInt(row.alunos);
                    stats[inst].totalAlunos += isNaN(qtdAlunos) ? 0 : qtdAlunos;
                    stats[inst].totalTurmas += 1;
                    
                    if (row.analista) stats[inst].analistas.add(row.analista);
                    const curso = row.curso || 'Outros';
                    stats[inst].cursos[curso] = (stats[inst].cursos[curso] || 0) + 1;
                });

                const allStats = Object.values(stats);
                const count = allStats.length || 1;
                const avgAlunos = allStats.reduce((acc, i) => acc + i.totalAlunos, 0) / count;
                const avgTurmas = allStats.reduce((acc, i) => acc + i.totalTurmas, 0) / count;

                return allStats.map(inst => {
                    const overloadAlunos = inst.totalAlunos > avgAlunos * 1.3;
                    const overloadTurmas = inst.totalTurmas > avgTurmas * 1.3;
                    return {
                        ...inst,
                        analistas: Array.from(inst.analistas).join(', '),
                        alert: overloadAlunos || overloadTurmas,
                        alertType: overloadAlunos && overloadTurmas ? 'Crítico' : (overloadAlunos ? 'Alunos' : (overloadTurmas ? 'Turmas' : null))
                    };
                }).sort((a,b) => b.totalAlunos - a.totalAlunos);
            }, [processedData]);

            // Listas para Filtros
            const uniqueInstrutores = useMemo(() => {
                const set = new Set();
                processedData.forEach(d => {
                    if (d.instrutor1) set.add(d.instrutor1);
                    if (d.instrutor2) set.add(d.instrutor2);
                });
                return Array.from(set).filter(d => d !== 'Não Atribuído').sort();
            }, [processedData]);

            const uniqueAnalistas = useMemo(() => {
                return [...new Set(processedData.map(d => d.analista))].filter(Boolean).sort();
            }, [processedData]);

            // --- 4. UPLOAD SUPER ROBUSTO ---
            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const dataBuffer = evt.target.result;
                        const wb = XLSX.read(dataBuffer, { type: 'array', cellDates: true });
                        
                        // 4.1 Encontrar a aba correta (Procura por "Turma" ou "Curso" na primeira linha)
                        let targetSheetName = wb.SheetNames[0];
                        let foundHeader = false;

                        for(let name of wb.SheetNames) {
                            const wsTest = wb.Sheets[name];
                            // Lê apenas as primeiras linhas para checar
                            const jsonTest = XLSX.utils.sheet_to_json(wsTest, { header: 1, range: 0, limit: 5 });
                            if (jsonTest.length > 0) {
                                const row0 = jsonTest[0].map(c => String(c).toLowerCase());
                                if (row0.includes('turma') || row0.includes('curso')) {
                                    targetSheetName = name;
                                    foundHeader = true;
                                    break;
                                }
                                // Tenta linha 2 também (caso tenha título)
                                if (jsonTest.length > 1) {
                                    const row1 = jsonTest[1].map(c => String(c).toLowerCase());
                                    if (row1.includes('turma') || row1.includes('curso')) {
                                        targetSheetName = name;
                                        foundHeader = true;
                                        break;
                                    }
                                }
                            }
                        }

                        console.log("Aba detectada:", targetSheetName);

                        const ws = wb.Sheets[targetSheetName];
                        const jsonData = XLSX.utils.sheet_to_json(ws, { header: 1 });
                        const newRows = [];
                        
                        // Parser de data seguro
                        const safeDate = (val) => {
                            if (!val) return '';
                            if (val instanceof Date) return val.toISOString().split('T')[0];
                            const str = String(val).trim();
                            if (str.length < 8) return ''; 
                            if (str.match(/^\d{2}\/\d{2}\/\d{4}$/)) {
                                const [dd,mm,yyyy] = str.split('/');
                                return `${yyyy}-${mm}-${dd}`;
                            }
                            if (str.match(/^\d{4}-\d{2}-\d{2}$/)) return str;
                            return '';
                        };

                        // 4.2 Processamento
                        // Tenta descobrir o index das colunas dinamicamente se achou cabeçalho
                        let colMap = { id: 0, curso: 1, analista: 2, alunos: 3, inicio: 4, termino: 5, i1: 6, i2: 7, dt: 8 };
                        let startRow = 1;

                        if (foundHeader) {
                            // Re-lê para pegar o header exato
                             // Simplificando: vamos assumir a estrutura fixa se não tiver certeza, 
                             // mas se achou header, tenta ajustar o startRow
                             // Lógica simplificada: Se linha 0 tem "Turma", dados começam na 1.
                             // Se linha 1 tem "Turma", dados começam na 2.
                             const r0 = jsonData[0] ? jsonData[0].map(s=>String(s).toLowerCase()) : [];
                             if (!r0.includes('turma') && jsonData[1]) startRow = 2;
                        }

                        for(let i=startRow; i<jsonData.length; i++) {
                            const row = jsonData[i];
                            if(row && (row[colMap.id] || row[colMap.curso])) {
                                // Tenta achar data de transferência inteligente (se col 8 não for data)
                                let dtTransfer = safeDate(row[colMap.dt]);
                                if (!dtTransfer) {
                                    // Heurística: procura primeira data válida da coluna 8 até 25
                                    for(let k=8; k<25; k++) {
                                        const candidate = safeDate(row[k]);
                                        if (candidate) {
                                            dtTransfer = candidate;
                                            break;
                                        }
                                    }
                                }

                                newRows.push({
                                    id: row[colMap.id] || `S/ID-${i}`,
                                    curso: row[colMap.curso] || 'Não Inf.',
                                    analista: row[colMap.analista] || '',
                                    alunos: parseInt(row[colMap.alunos]) || 0, 
                                    inicio: safeDate(row[colMap.inicio]),
                                    termino: safeDate(row[colMap.termino]),
                                    instrutor1: row[colMap.i1] || '',
                                    instrutor2: row[colMap.i2] || '',
                                    dataTransferencia: dtTransfer
                                });
                            }
                        }

                        // Aba Substituições
                        const subRows = [];
                        for(let name of wb.SheetNames) {
                            if (name.toLowerCase().includes('subst')) {
                                const wsSub = wb.Sheets[name];
                                const jsonSub = XLSX.utils.sheet_to_json(wsSub, { header: 1 });
                                for(let i=1; i<jsonSub.length; i++) {
                                    const row = jsonSub[i];
                                    if(row && row[0]) {
                                        let d = row[0];
                                        if (d instanceof Date) d = d.toISOString().split('T')[0];
                                        subRows.push({
                                            data: d,
                                            turmaId: row[1],
                                            instrutorAusente: row[2],
                                            instrutorSubstituto: row[3],
                                            motivo: row[4],
                                            status: row[5] || 'Pendente'
                                        });
                                    }
                                }
                            }
                        }

                        if (newRows.length > 0) {
                            setData(newRows);
                            setSubstitutions(subRows);
                            alert(`Importação concluída!\nTurmas carregadas: ${newRows.length}\nSubstituições: ${subRows.length}`);
                        } else {
                            alert("Não foi possível encontrar dados de turmas. Verifique se a planilha tem colunas 'Turma' ou 'Curso'.");
                        }

                    } catch (err) {
                        console.error(err);
                        alert("Erro ao ler o arquivo. Tente salvar como .xlsx simples se persistir.");
                    }
                };
                reader.readAsArrayBuffer(file);
                e.target.value = null; 
            };

            const handleExport = () => {
                try {
                    const wb = XLSX.utils.book_new();
                    const headers = ['Turma', 'Curso', 'Analista', 'Alunos', 'Início', 'Término', 'Instrutor 1', 'Instrutor 2', 'Data Transferência', 'Resp. Atual', 'Status'];
                    const exportRows = data.map(row => {
                        const today = new Date(); today.setHours(0,0,0,0);
                        let currInst = row.instrutor1;
                        let st = 'Ativo';
                        try {
                            if (row.termino) {
                                const t = new Date(row.termino+'T00:00:00');
                                if (!isNaN(t) && today > t) st = 'Concluída';
                            }
                            if (st !== 'Concluída' && row.instrutor2 && row.dataTransferencia) {
                                const tf = new Date(row.dataTransferencia+'T00:00:00');
                                if (!isNaN(tf) && today >= tf) currInst = row.instrutor2;
                            }
                        } catch(e) {}
                        return [row.id, row.curso, row.analista, row.alunos, row.inicio, row.termino, row.instrutor1, row.instrutor2, row.dataTransferencia, currInst, st];
                    });
                    const wsData = [headers, ...exportRows];
                    const ws = XLSX.utils.aoa_to_sheet(wsData);
                    XLSX.utils.book_append_sheet(wb, ws, "Base de Turmas");

                    const subHeaders = ['Data', 'Turma ID', 'Instrutor Ausente', 'Instrutor Substituto', 'Motivo', 'Status'];
                    const subExportRows = substitutions.map(s => [s.data, s.turmaId, s.instrutorAusente, s.instrutorSubstituto, s.motivo, s.status]);
                    const wsSubData = [subHeaders, ...subExportRows];
                    const wsSub = XLSX.utils.aoa_to_sheet(wsSubData);
                    XLSX.utils.book_append_sheet(wb, wsSub, "Substituicoes");

                    XLSX.writeFile(wb, "Senac_Gestao_Turmas.xlsx");
                } catch (err) { alert("Erro ao exportar: " + err.message); }
            };

            useEffect(() => {
                if (newSub.turmaId && newSub.data) {
                    const turma = processedData.find(t => t.id === newSub.turmaId);
                    if (turma) {
                        const subDate = new Date(newSub.data + 'T00:00:00');
                        let titularNaData = turma.instrutor1;
                        if (turma.instrutor2 && turma.dataTransferencia) {
                            const transfDate = new Date(turma.dataTransferencia + 'T00:00:00');
                            if (subDate >= transfDate) titularNaData = turma.instrutor2;
                        }
                        let sugestao = '';
                        if (titularNaData === turma.instrutor1 && turma.instrutor2) sugestao = turma.instrutor2;
                        else if (titularNaData === turma.instrutor2 && turma.instrutor1) sugestao = turma.instrutor1;
                        setNewSub(prev => ({ ...prev, instrutorAusente: titularNaData, instrutorSubstituto: prev.instrutorSubstituto || sugestao }));
                    }
                }
            }, [newSub.turmaId, newSub.data, processedData]);

            const handleAddClass = (e) => {
                e.preventDefault();
                setData([...data, { ...newClass }]);
                setIsFormOpen(false);
                setNewClass({ id: '', curso: '', analista: '', alunos: '', inicio: '', termino: '', instrutor1: '', instrutor2: '', dataTransferencia: '' });
                alert("Turma adicionada!");
            };
            const handleAddSub = (e) => {
                e.preventDefault();
                setSubstitutions([...substitutions, { ...newSub, status: 'Pendente' }]);
                setIsSubModalOpen(false);
                setNewSub({ data: '', turmaId: '', instrutorAusente: '', instrutorSubstituto: '', motivo: '', status: 'Pendente' });
                alert("Substituição agendada!");
            };

            const handleSimulate = () => {
                if (!simData.curso || !simData.alunos) return;
                const scores = instructorStats.map(inst => {
                    const loadScore = inst.totalAlunos * 1; 
                    const classScore = inst.totalTurmas * 15; 
                    const courseRepetitionScore = (inst.cursos[simData.curso] || 0) * 50; 
                    return {
                        ...inst,
                        score: loadScore + classScore + courseRepetitionScore,
                        projectedAlunos: inst.totalAlunos + parseInt(simData.alunos),
                        currentCourseCount: inst.cursos[simData.curso] || 0
                    };
                });
                setRecommendations(scores.sort((a, b) => a.score - b.score));
            };
            const acceptSuggestion = (instrutorNome) => {
                setNewClass(prev => ({ ...prev, curso: simData.curso, alunos: simData.alunos, instrutor1: instrutorNome }));
                setIsFormOpen(true);
            };

            const Charts = () => {
                if (!window.Recharts) return <div className="p-4 bg-gray-100 rounded text-center">Carregando gráficos...</div>;
                const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = window.Recharts;
                const chartStats = useMemo(() => {
                    const stats = {};
                    filteredData.forEach(row => {
                        if (row.isFinished || row.instrutorAtual === 'Não Atribuído') return;
                        const inst = row.instrutorAtual;
                        if (!stats[inst]) stats[inst] = { nome: inst, totalAlunos: 0, totalTurmas: 0 };
                        stats[inst].totalAlunos += (parseInt(row.alunos) || 0);
                        stats[inst].totalTurmas += 1;
                    });
                    return Object.values(stats).sort((a,b) => b.totalAlunos - a.totalAlunos);
                }, [filteredData]);

                return (
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8 fade-in">
                        <div className="bg-white p-4 rounded-lg shadow border border-gray-200 h-96">
                            <h3 className="font-bold text-gray-700 mb-4 text-center">Total de Jovens (Filtrado)</h3>
                            <ResponsiveContainer width="100%" height="90%">
                                <BarChart data={chartStats} layout="horizontal" margin={{top:20, right:30, left:20, bottom:50}}>
                                    <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                    <XAxis dataKey="nome" angle={-45} textAnchor="end" interval={0} height={60} tick={{fontSize:10}} />
                                    <YAxis />
                                    <Tooltip contentStyle={{borderRadius:'8px'}} />
                                    <Bar dataKey="totalAlunos" name="Alunos" fill="#004587" radius={[4, 4, 0, 0]} />
                                </BarChart>
                            </ResponsiveContainer>
                        </div>
                        <div className="bg-white p-4 rounded-lg shadow border border-gray-200 h-96">
                            <h3 className="font-bold text-gray-700 mb-4 text-center">Total de Turmas (Filtrado)</h3>
                            <ResponsiveContainer width="100%" height="90%">
                                <BarChart data={chartStats} layout="horizontal" margin={{top:20, right:30, left:20, bottom:50}}>
                                    <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                    <XAxis dataKey="nome" angle={-45} textAnchor="end" interval={0} height={60} tick={{fontSize:10}} />
                                    <YAxis allowDecimals={false} />
                                    <Tooltip contentStyle={{borderRadius:'8px'}} />
                                    <Bar dataKey="totalTurmas" name="Turmas" fill="#F68B1F" radius={[4, 4, 0, 0]} />
                                </BarChart>
                            </ResponsiveContainer>
                        </div>
                    </div>
                );
            };

            return (
                <ErrorBoundary>
                <div className="min-h-screen pb-20">
                    <input type="file" ref={fileInputRef} onChange={handleFileUpload} accept=".csv,.xlsx,.xls,.xlsm" className="hidden" />

                    <nav className="bg-white border-b border-gray-200 sticky top-0 z-30 shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 py-3 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-3">
                                <img src="https://upload.wikimedia.org/wikipedia/commons/8/86/Senac_logo.svg" alt="Senac Logo" className="h-10 w-auto" />
                                <div className="border-l pl-3 border-gray-300">
                                    <h1 className="text-xl font-bold text-blue-900 leading-tight">Unidade Portão</h1>
                                    <p className="text-xs text-gray-500 uppercase tracking-wide">Gestão de Distribuição</p>
                                </div>
                            </div>
                            
                            <div className="flex gap-2">
                                <button onClick={() => setIsSubModalOpen(true)} className="flex items-center gap-2 px-4 py-2 bg-purple-50 text-purple-700 rounded-lg hover:bg-purple-100 transition text-sm font-semibold shadow-sm">
                                    <Icons.Switch /> Substituir
                                </button>
                                <button onClick={() => setIsFormOpen(true)} className="flex items-center gap-2 px-4 py-2 bg-blue-50 text-blue-700 rounded-lg hover:bg-blue-100 transition text-sm font-semibold shadow-sm">
                                    <Icons.Plus /> Turma
                                </button>
                                <button onClick={handleExport} className="flex items-center gap-2 px-4 py-2 bg-green-50 text-green-700 rounded-lg hover:bg-green-100 transition text-sm font-semibold shadow-sm">
                                    <Icons.Download /> Salvar
                                </button>
                                <button onClick={() => fileInputRef.current.click()} className="flex items-center gap-2 px-4 py-2 bg-orange-50 text-orange-700 rounded-lg hover:bg-orange-100 transition text-sm font-semibold shadow-sm">
                                    <Icons.Upload /> Carregar
                                </button>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto px-4 py-8">
                        {/* PAINEL DE ALERTA: Substituições Próximas */}
                        {urgentSubs.length > 0 && (
                            <div className="bg-white border-l-4 border-red-500 p-4 mb-8 rounded-lg shadow-lg fade-in alert-pulse ring-1 ring-red-100">
                                <div className="flex justify-between items-start">
                                    <div>
                                        <h3 className="font-bold text-red-800 text-lg flex items-center gap-2">
                                            <Icons.Clock /> Substituições para Hoje/Amanhã
                                        </h3>
                                        <p className="text-red-600 text-sm">Confirme as trocas para efetivar no sistema.</p>
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mt-3">
                                    {urgentSubs.map((sub, idx) => (
                                        <div key={idx} className="bg-red-50 p-3 rounded border border-red-200 flex flex-col gap-2">
                                            <div className="flex justify-between items-center text-sm font-bold text-gray-700">
                                                <span>{sub.data}</span>
                                                <span className="bg-white px-2 rounded text-xs border">Turma {sub.turmaId}</span>
                                            </div>
                                            <div className="flex items-center justify-between text-sm">
                                                <span className="text-red-600 font-semibold">{sub.instrutorAusente}</span>
                                                <span className="text-gray-400">➔</span>
                                                <span className="text-green-700 font-bold">{sub.instrutorSubstituto}</span>
                                            </div>
                                            <button 
                                                onClick={() => confirmSubstitution(sub)}
                                                className="mt-1 w-full bg-green-600 hover:bg-green-700 text-white py-1.5 rounded text-sm font-bold shadow transition flex justify-center gap-2"
                                            >
                                                <Icons.Check /> Confirmar Troca
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* Abas */}
                        <div className="flex space-x-4 mb-6 border-b border-gray-200 overflow-x-auto">
                            <button onClick={() => setActiveTab('dashboard')} className={`py-2 px-4 font-semibold border-b-2 transition whitespace-nowrap ${activeTab === 'dashboard' ? 'border-orange-500 text-orange-600' : 'border-transparent text-gray-500 hover:text-gray-700'}`}>
                                Visão Geral
                            </button>
                            <button onClick={() => setActiveTab('simulator')} className={`py-2 px-4 font-semibold border-b-2 transition whitespace-nowrap ${activeTab === 'simulator' ? 'border-blue-500 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'}`}>
                                Simulador de Distribuição
                            </button>
                            <button onClick={() => setActiveTab('subs')} className={`py-2 px-4 font-semibold border-b-2 transition whitespace-nowrap ${activeTab === 'subs' ? 'border-purple-500 text-purple-600' : 'border-transparent text-gray-500 hover:text-gray-700'}`}>
                                Histórico de Substituições ({substitutions.length})
                            </button>
                        </div>

                        {activeTab === 'dashboard' && (
                            <div className="fade-in">
                                {/* Filtros */}
                                <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200 mb-8 flex flex-col md:flex-row gap-4 items-end">
                                    <div className="flex-1 w-full">
                                        <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Filtrar por Instrutor</label>
                                        <select 
                                            value={filters.instrutor} 
                                            onChange={e => setFilters({...filters, instrutor: e.target.value})}
                                            className="w-full p-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                        >
                                            <option value="">Todos os Instrutores</option>
                                            {uniqueInstrutores.map(i => <option key={i} value={i}>{i}</option>)}
                                        </select>
                                    </div>
                                    <div className="flex-1 w-full">
                                        <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Filtrar por Analista</label>
                                        <select 
                                            value={filters.analista} 
                                            onChange={e => setFilters({...filters, analista: e.target.value})}
                                            className="w-full p-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                        >
                                            <option value="">Todos os Analistas</option>
                                            {uniqueAnalistas.map(a => <option key={a} value={a}>{a}</option>)}
                                        </select>
                                    </div>
                                    <div className="pb-2 text-sm text-gray-400 font-mono">
                                        {filteredData.length} registros
                                    </div>
                                </div>

                                <Charts />

                                <h2 className="text-xl font-bold text-gray-800 mb-4 border-l-4 border-orange-500 pl-3">Visão Geral dos Instrutores</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 mb-12">
                                    {instructorStats.filter(i => {
                                        const matchInst = filters.instrutor === '' || i.nome === filters.instrutor;
                                        const matchAnalista = filters.analista === '' || i.analistas.includes(filters.analista);
                                        return matchInst && matchAnalista;
                                    }).map(inst => (
                                        <div key={inst.nome} className={`bg-white rounded-xl shadow-sm border-2 p-5 relative transition hover:shadow-md ${inst.alert ? 'border-red-400' : 'border-transparent'}`}>
                                            {inst.alert && (
                                                <div className="absolute -top-3 -right-3 bg-red-500 text-white text-xs font-bold px-3 py-1 rounded-full shadow flex items-center gap-1 animate-pulse">
                                                    <Icons.Alert /> Redistribuir: {inst.alertType}
                                                </div>
                                            )}
                                            
                                            <div className="flex justify-between items-start mb-4">
                                                <div>
                                                    <h3 className="text-lg font-bold text-gray-900">{inst.nome}</h3>
                                                    <p className="text-sm text-gray-500 flex items-center gap-1 mt-1">
                                                        <span className="bg-gray-100 px-2 py-0.5 rounded text-gray-600 font-medium text-xs">Analista(s):</span> 
                                                        <span className="font-semibold text-blue-600">{inst.analistas || 'N/A'}</span>
                                                    </p>
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-2 gap-4 mb-4">
                                                <div className="bg-blue-50 p-3 rounded-lg text-center">
                                                    <span className="block text-2xl font-bold text-blue-800">{inst.totalAlunos}</span>
                                                    <span className="text-xs text-blue-600 font-semibold uppercase">Jovens</span>
                                                </div>
                                                <div className="bg-orange-50 p-3 rounded-lg text-center">
                                                    <span className="block text-2xl font-bold text-orange-800">{inst.totalTurmas}</span>
                                                    <span className="text-xs text-orange-600 font-semibold uppercase">Turmas</span>
                                                </div>
                                            </div>

                                            <div className="border-t border-gray-100 pt-3">
                                                <p className="text-xs font-bold text-gray-400 uppercase mb-2">Distribuição de Cursos</p>
                                                <div className="space-y-2 max-h-32 overflow-y-auto pr-1">
                                                    {Object.entries(inst.cursos).map(([curso, qtd]) => (
                                                        <div key={curso} className="flex justify-between text-sm items-center">
                                                            <span className="text-gray-600 truncate w-40" title={curso}>{curso}</span>
                                                            <div className="flex items-center gap-2">
                                                                <div className="w-16 h-1.5 bg-gray-100 rounded-full overflow-hidden">
                                                                    <div className="h-full bg-blue-500" style={{width: `${(qtd/inst.totalTurmas)*100}%`}}></div>
                                                                </div>
                                                                <span className="font-mono text-xs font-bold text-gray-500">{qtd}</span>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'simulator' && (
                            <div className="fade-in max-w-4xl mx-auto">
                                <div className="bg-white rounded-xl shadow-lg border border-blue-100 overflow-hidden mb-8">
                                    <div className="bg-gradient-to-r from-blue-900 to-blue-800 p-6 text-white">
                                        <h2 className="text-xl font-bold flex items-center gap-2"><Icons.Search /> Simulador de Distribuição</h2>
                                        <p className="text-blue-200 text-sm mt-1">Preencha os dados da nova turma para ver quem está mais apto a assumir.</p>
                                    </div>
                                    <div className="p-6 grid grid-cols-1 md:grid-cols-2 gap-6 items-end">
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-1">Curso da Nova Turma</label>
                                            <select 
                                                className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                                value={simData.curso}
                                                onChange={e => setSimData({...simData, curso: e.target.value})}
                                            >
                                                {COURSE_OPTIONS.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-1">Quantidade de Jovens</label>
                                            <input 
                                                type="number" 
                                                className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                                value={simData.alunos}
                                                onChange={e => setSimData({...simData, alunos: e.target.value})}
                                            />
                                        </div>
                                    </div>
                                    <div className="px-6 pb-6">
                                        <button onClick={handleSimulate} className="w-full py-3 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 shadow transition transform hover:scale-[1.01]">
                                            Analisar Carga e Recomendar
                                        </button>
                                    </div>
                                </div>

                                {recommendations && (
                                    <div className="space-y-4">
                                        <h3 className="text-lg font-bold text-gray-800 pl-2 border-l-4 border-green-500">Ranking de Recomendação</h3>
                                        {recommendations.map((inst, idx) => (
                                            <div key={inst.nome} className={`bg-white p-4 rounded-xl shadow-sm border flex flex-col md:flex-row items-center justify-between gap-4 transition ${idx === 0 ? 'border-green-400 ring-1 ring-green-100' : 'border-gray-200'}`}>
                                                <div className="flex items-center gap-4 flex-1">
                                                    <div className={`w-8 h-8 flex items-center justify-center rounded-full font-bold text-sm ${idx === 0 ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'}`}>
                                                        #{idx + 1}
                                                    </div>
                                                    <div>
                                                        <h4 className="font-bold text-gray-800 text-lg">{inst.nome}</h4>
                                                        <div className="flex gap-4 text-xs text-gray-500 mt-1">
                                                            <span>Atual: <strong>{inst.totalAlunos}</strong> alunos</span>
                                                            <span>Turmas deste curso: <strong>{inst.currentCourseCount}</strong></span>
                                                            <span>Projeção: <strong>{inst.projectedAlunos}</strong></span>
                                                        </div>
                                                    </div>
                                                </div>
                                                
                                                <div className="flex items-center gap-3">
                                                    {idx === 0 && <span className="text-xs font-bold text-green-600 bg-green-50 px-2 py-1 rounded">Melhor Opção</span>}
                                                    <button 
                                                        onClick={() => acceptSuggestion(inst.nome)}
                                                        className="px-4 py-2 bg-gray-900 text-white text-sm font-bold rounded-lg hover:bg-gray-700 flex items-center gap-2"
                                                    >
                                                        <Icons.Check /> Criar Turma
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'subs' && (
                            <div className="bg-white rounded-xl shadow border border-gray-200 overflow-hidden fade-in">
                                <div className="p-6 border-b border-gray-200 flex justify-between items-center">
                                    <div>
                                        <h3 className="text-lg font-bold text-gray-800">Registro de Substituições</h3>
                                        <p className="text-sm text-gray-500">Histórico de trocas por ausência.</p>
                                    </div>
                                    <button onClick={() => setIsSubModalOpen(true)} className="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 font-bold text-sm shadow">
                                        + Nova Substituição
                                    </button>
                                </div>
                                {substitutions.length === 0 ? (
                                    <div className="p-12 text-center text-gray-400">Nenhuma substituição registrada.</div>
                                ) : (
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-sm text-left text-gray-500">
                                            <thead className="text-xs text-gray-700 uppercase bg-gray-50">
                                                <tr>
                                                    <th className="px-6 py-3">Data</th>
                                                    <th className="px-6 py-3">Turma</th>
                                                    <th className="px-6 py-3 text-red-600">Instrutor Ausente</th>
                                                    <th className="px-6 py-3 text-green-600">Substituto</th>
                                                    <th className="px-6 py-3">Motivo</th>
                                                    <th className="px-6 py-3">Status</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {substitutions.map((sub, idx) => (
                                                    <tr key={idx} className="bg-white border-b hover:bg-gray-50">
                                                        <td className="px-6 py-4 font-mono">{sub.data}</td>
                                                        <td className="px-6 py-4 font-bold">{sub.turmaId}</td>
                                                        <td className="px-6 py-4 text-red-500 font-medium">{sub.instrutorAusente}</td>
                                                        <td className="px-6 py-4 text-green-600 font-bold bg-green-50">{sub.instrutorSubstituto}</td>
                                                        <td className="px-6 py-4">{sub.motivo}</td>
                                                        <td className="px-6 py-4">
                                                            <span className={`px-2 py-1 rounded text-xs font-bold ${sub.status === 'Confirmada' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}`}>
                                                                {sub.status || 'Pendente'}
                                                            </span>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* MODAL NOVA TURMA */}
                    {isFormOpen && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 backdrop-blur-sm fade-in">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
                                <div className="p-6 border-b border-gray-100 flex justify-between items-center bg-blue-900 text-white rounded-t-2xl">
                                    <h3 className="text-xl font-bold flex items-center gap-2"><Icons.Plus /> Adicionar Nova Turma</h3>
                                    <button onClick={() => setIsFormOpen(false)} className="hover:bg-white/20 p-1 rounded-full text-white">✕</button>
                                </div>
                                <form onSubmit={handleAddClass} className="p-6 grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="md:col-span-2">
                                        <label className="block text-sm font-bold text-gray-700 mb-1">ID da Turma</label>
                                        <input required type="text" className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500" 
                                            value={newClass.id} onChange={e => setNewClass({...newClass, id: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">Curso</label>
                                        <select required className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500"
                                            value={newClass.curso} onChange={e => setNewClass({...newClass, curso: e.target.value})}>
                                            <option value="">Selecione...</option>
                                            {COURSE_OPTIONS.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">Total de Jovens</label>
                                        <input required type="number" className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500" 
                                            value={newClass.alunos} onChange={e => setNewClass({...newClass, alunos: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">Analista</label>
                                        <input required type="text" className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500" 
                                            value={newClass.analista} onChange={e => setNewClass({...newClass, analista: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">Data Transferência</label>
                                        <input type="date" className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500" 
                                            value={newClass.dataTransferencia} onChange={e => setNewClass({...newClass, dataTransferencia: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">Início</label>
                                        <input required type="date" className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500" 
                                            value={newClass.inicio} onChange={e => setNewClass({...newClass, inicio: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">Término</label>
                                        <input required type="date" className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500" 
                                            value={newClass.termino} onChange={e => setNewClass({...newClass, termino: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">Instrutor 1</label>
                                        <input required type="text" className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500" 
                                            value={newClass.instrutor1} onChange={e => setNewClass({...newClass, instrutor1: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">Instrutor 2 (Opcional)</label>
                                        <input type="text" className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500" 
                                            value={newClass.instrutor2} onChange={e => setNewClass({...newClass, instrutor2: e.target.value})} />
                                    </div>
                                    
                                    <div className="md:col-span-2 pt-4 flex gap-3">
                                        <button type="button" onClick={() => setIsFormOpen(false)} className="flex-1 py-3 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300 font-bold">Cancelar</button>
                                        <button type="submit" className="flex-1 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-bold shadow-lg">Salvar Turma</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL NOVA SUBSTITUIÇÃO */}
                    {isSubModalOpen && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 backdrop-blur-sm fade-in">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg">
                                <div className="p-6 border-b border-gray-100 flex justify-between items-center bg-purple-700 text-white rounded-t-2xl">
                                    <h3 className="text-xl font-bold flex items-center gap-2"><Icons.Switch /> Registrar Substituição</h3>
                                    <button onClick={() => setIsSubModalOpen(false)} className="hover:bg-white/20 p-1 rounded-full text-white">✕</button>
                                </div>
                                <form onSubmit={handleAddSub} className="p-6 space-y-4">
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">Data da Falta</label>
                                        <input required type="date" className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-purple-500" 
                                            value={newSub.data} onChange={e => setNewSub({...newSub, data: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">Selecione a Turma</label>
                                        <select required className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-purple-500"
                                            value={newSub.turmaId} onChange={e => setNewSub({...newSub, turmaId: e.target.value})}>
                                            <option value="">Selecione...</option>
                                            {processedData.filter(t => t.status === 'Ativo' || t.status === 'Transferido').map(t => (
                                                <option key={t.id} value={t.id}>{t.id} - {t.curso} ({t.instrutorAtual})</option>
                                            ))}
                                        </select>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-bold text-red-600 mb-1">Instrutor Ausente</label>
                                            <input required type="text" className="w-full p-2 border border-red-200 bg-red-50 rounded" 
                                                value={newSub.instrutorAusente} 
                                                onChange={e => setNewSub({...newSub, instrutorAusente: e.target.value})}
                                                placeholder="Nome..." />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-green-600 mb-1">Instrutor Substituto</label>
                                            <div className="relative">
                                                <input required type="text" className="w-full p-2 border border-green-200 bg-green-50 rounded pr-8" 
                                                    value={newSub.instrutorSubstituto} 
                                                    onChange={e => setNewSub({...newSub, instrutorSubstituto: e.target.value})}
                                                    placeholder="Nome..." />
                                                <div className="absolute right-2 top-2.5 text-green-500 text-xs font-bold">AUTO</div>
                                            </div>
                                            <p className="text-xs text-gray-400 mt-1">Sugerido automaticamente se possível.</p>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">Motivo</label>
                                        <input type="text" className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-purple-500" 
                                            value={newSub.motivo} onChange={e => setNewSub({...newSub, motivo: e.target.value})} 
                                            placeholder="Ex: Atestado médico, Falta injustificada..." />
                                    </div>
                                    
                                    <div className="pt-4 flex gap-3">
                                        <button type="button" onClick={() => setIsSubModalOpen(false)} className="flex-1 py-3 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300 font-bold">Cancelar</button>
                                        <button type="submit" className="flex-1 py-3 bg-purple-600 text-white rounded-lg hover:bg-purple-700 font-bold shadow-lg">Confirmar</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
                </ErrorBoundary>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
