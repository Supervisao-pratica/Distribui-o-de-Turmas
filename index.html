                const org = instructor.organized;
                
                let actFiltered = [];
                let incFiltered = [];
                let outFiltered = [];
                let futFiltered = [];
                let histFiltered = [];
                let periodText = "";

                if (period && period.start && period.end) {
                    const pStart = new Date(period.start + '-01T00:00:00');
                    const pEnd = new Date(period.end + '-01T00:00:00');
                    pEnd.setMonth(pEnd.getMonth() + 1);
                    pEnd.setDate(0); 

                    if (period.start === period.end) {
                        periodText = ` no período de <b>${getMonthName(period.start)}</b>`;
                    } else {
                        periodText = ` no período de <b>${getMonthName(period.start)} a ${getMonthName(period.end)}</b>`;
                    }

                    const instName = getCanonical(instructor.nome);
                    const allInvolvedClasses = data.filter(d => getCanonical(d.instrutor1) === instName || getCanonical(d.instrutor2) === instName || getCanonical(d.instrutor3) === instName);

                    const parseDStr = (str, fallback) => (str && str.length === 10) ? str : fallback;

                    allInvolvedClasses.forEach(cls => {
                        const dInicio = parseDStr(cls.inicio, '1970-01-01');
                        const dTermino = parseDStr(cls.termino, '2099-12-31');
                        const dTransf1 = parseDStr(cls.dataTransferencia, null);
                        const dTransf2 = parseDStr(cls.dataTransferencia2, null);

                        let slices = [];
                        if (getCanonical(cls.instrutor1) === instName) {
                            slices.push({
                                start: dInicio, end: dTransf1 || dTermino,
                                isTransfOut: !!dTransf1, transfOutDate: dTransf1, transfOutTo: cls.instrutor2,
                                isTransfIn: false, roleName: 'Titular'
                            });
                        }
                        if (getCanonical(cls.instrutor2) === instName) {
                            slices.push({
                                start: dTransf1 || dInicio, end: dTransf2 || dTermino,
                                isTransfIn: !!dTransf1, transfInDate: dTransf1, transfInFrom: cls.instrutor1,
                                isTransfOut: !!dTransf2, transfOutDate: dTransf2, transfOutTo: cls.instrutor3,
                                roleName: 'Sucessor 1'
                            });
                        }
                        if (getCanonical(cls.instrutor3) === instName) {
                            slices.push({
                                start: dTransf2 || dTransf1 || dInicio, end: dTermino,
                                isTransfIn: !!dTransf2, transfInDate: dTransf2, transfInFrom: cls.instrutor2 || cls.instrutor1,
                                isTransfOut: false, roleName: 'Sucessor Final'
                            });
                        }

                        slices.forEach(slice => {
                            const sDate = new Date(slice.start + 'T00:00:00');
                            const eDate = new Date(slice.end + 'T00:00:00');

                            if (sDate <= pEnd && eDate >= pStart) {
                                let clonedCls = { ...cls };
                                
                                const tInDate = slice.isTransfIn ? new Date(slice.transfInDate + 'T00:00:00') : null;
                                const tOutDate = slice.isTransfOut ? new Date(slice.transfOutDate + 'T00:00:00') : null;

                                const hasTransferInPeriod = tInDate && tInDate >= pStart && tInDate <= pEnd;
                                const hasTransferOutPeriod = tOutDate && tOutDate >= pStart && tOutDate <= pEnd;

                                if (hasTransferInPeriod) {
                                    clonedCls.transferNote = `Receberá de ${slice.transfInFrom} em ${formatDatePTBR(slice.transfInDate)}`;
                                    if (hasTransferOutPeriod) clonedCls.transferNote += ` | Repassará p/ ${slice.transfOutTo} em ${formatDatePTBR(slice.transfOutDate)}`;
                                    incFiltered.push(clonedCls);
                                } else if (hasTransferOutPeriod) {
                                    clonedCls.transferNote = `Passará para ${slice.transfOutTo} em ${formatDatePTBR(slice.transfOutDate)}`;
                                    outFiltered.push(clonedCls);
                                } else {
                                    clonedCls.statusDetail = slice.roleName;
                                    actFiltered.push(clonedCls);
                                }
                            }
                        });
                    });

                    substitutions.forEach(sub => {
                        if (getCanonical(sub.instrutorSubstituto) === instName) {
                            const subS = new Date(sub.dataInicio + 'T00:00:00');
                            const subE = new Date(sub.dataFim + 'T00:00:00');
                            if (subS <= pEnd && subE >= pStart) {
                                const originalClass = data.find(d => String(d.id) === String(sub.turmaId));
                                if (originalClass) {
                                    actFiltered.push({ ...originalClass, isSubstitution: true, statusDetail: `🔄 Cobrindo ${sub.instrutorAusente} até ${formatDatePTBR(sub.dataFim)}`, obs: sub.motivo });
                                }
                            }
                        }
                    });

                    const uniqueById = (arr) => Array.from(new Map(arr.map(a => [a.id, a])).values());
                    actFiltered = uniqueById(actFiltered).sort((a,b) => new Date(a.inicio) - new Date(b.inicio));
                    incFiltered = uniqueById(incFiltered).sort((a,b) => new Date(a.inicio) - new Date(b.inicio));
                    outFiltered = uniqueById(outFiltered).sort((a,b) => new Date(a.inicio) - new Date(b.inicio));
                    
                    futFiltered = []; 
                    histFiltered = [];

                } else {
                    actFiltered = [...org.activeClasses];
                    incFiltered = [...org.incomingClasses];
                    outFiltered = [...org.outgoingClasses];
                    futFiltered = [...org.futureClasses];
                    histFiltered = [...org.historyClasses];
                }

                // NOVO: Aplica o filtro de Analista caso tenha sido selecionado!
                if (period && period.analista) {
                    const filterFn = (arr) => arr.filter(t => normalizeText(t.analista) === normalizeText(period.analista));
                    actFiltered = filterFn(actFiltered);
                    incFiltered = filterFn(incFiltered);
                    outFiltered = filterFn(outFiltered);
                    futFiltered = filterFn(futFiltered);
                    histFiltered = filterFn(histFiltered);
                    periodText += `<br/><span style="color: #4f46e5; font-size: 11px;">🎯 Filtro Aplicado: Apenas turmas sob responsabilidade de <b>${period.analista}</b></span>`;
                }

                let html = `<div style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; color: #333333; line-height: 1.4;">`;
                html += `<p style="margin-bottom: 12px;">Prezado(a) Instrutor(a) <strong style="color: #1e3a8a; font-size: 15px;">${safeString(instructor.nome)}</strong>,<br/>Segue o panorama atualizado das suas distribuições no sistema${periodText}:</p>`;

                const buildBlock = (title, colorHex, bgColor, classes, infoType) => {
                    if (classes.length === 0) return '';
                    let block = `<div style="margin-bottom: 12px; border: 1px solid #e5e7eb; border-radius: 6px; overflow: hidden;">`;
                    block += `<div style="background-color: ${bgColor}; padding: 6px 12px; border-bottom: 2px solid ${colorHex};">`;
                    block += `<h3 style="margin: 0; color: ${colorHex}; font-size: 13px; text-transform: uppercase;">${title} (${classes.length})</h3></div>`;
                    
                    block += `<table style="width: 100%; border-collapse: collapse; background-color: #ffffff;">`;
                    classes.forEach((t, index) => {
                        let info = infoType === 'status' ? t.statusDetail : (infoType === 'transfer' ? t.transferNote : t.statusDetail);
                        let borderStyle = index < classes.length - 1 ? 'border-bottom: 1px solid #f3f4f6;' : '';
                        
                        block += `<tr>
                            <td style="padding: 6px 12px; ${borderStyle} width: 60%; vertical-align: middle;">
                                <div style="font-weight: bold; font-size: 13px; color: #1f2937; margin-bottom: 2px;">Turma ${safeString(t.id)}</div>
                                <div style="color: #6b7280; font-size: 11px;">${safeString(t.curso)} (${safeString(t.modalidade)})</div>
                            </td>
                            <td style="padding: 6px 12px; ${borderStyle} text-align: right; width: 40%; vertical-align: middle;">
                                <div style="display: inline-block; background-color: #f8fafc; border: 1px solid #e2e8f0; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; color: ${colorHex}; margin-bottom: 3px;">${info}</div>
                                <div style="font-size: 10px; color: #4b5563;">Início: <b>${formatDatePTBR(t.inicio)}</b><br/>Término: <b>${formatDatePTBR(t.termino)}</b></div>
                            </td>
                        </tr>`;
                    });
                    block += `</table></div>`;
                    return block;
                };

                html += buildBlock('📌 Turmas Atuais (Em Vigência)', '#1d4ed8', '#eff6ff', actFiltered, 'status'); 
                html += buildBlock('📥 Turmas A Receber', '#c2410c', '#fff7ed', incFiltered, 'transfer'); 
                html += buildBlock('📤 Turmas A Repassar', '#047857', '#ecfdf5', outFiltered, 'transfer'); 
                html += buildBlock('⏳ Turmas Futuras (Agendadas)', '#4338ca', '#eef2ff', futFiltered, 'inicio'); 
                html += buildBlock('✅ Turmas Finalizadas / Já Repassadas', '#475569', '#f1f5f9', histFiltered, 'status'); 
                
                if (actFiltered.length === 0 && incFiltered.length === 0 && outFiltered.length === 0 && futFiltered.length === 0 && histFiltered.length === 0) {
                    html += `<div style="padding: 15px; border: 1px dashed #cbd5e1; border-radius: 6px; background-color: #f8fafc; text-align: center; color: #64748b; font-size: 12px; margin-bottom: 12px;">Nenhuma turma vinculada a você ativa ou prevista para este filtro/período.</div>`;
                }

                html += `<p style="margin-top: 15px; font-size: 11px; color: #6b7280; border-top: 1px solid #e5e7eb; padding-top: 10px;">Atenciosamente,<br/><strong style="color: #374151;">Equipe de Gestão de Turmas - Senac PR</strong></p>`;
                html += `</div>`;

                const dummyElement = document.createElement('span');
                dummyElement.textContent = "Copiando...";
                document.body.appendChild(dummyElement);

                const selection = window.getSelection();
                const range = document.createRange();
                range.selectNodeContents(dummyElement);
                selection.removeAllRanges();
                selection.addRange(range);

                const clipboardListener = function(e) {
                    e.preventDefault();
                    e.clipboardData.setData('text/html', html);
                    e.clipboardData.setData('text/plain', "Resumo de Turmas copiado para colar no Outlook.");
                };

                document.addEventListener('copy', clipboardListener);

                try {
                    const ok = document.execCommand('copy');
                    if (ok) {
                        showNotify("Resumo Visual Enxuto copiado! Abra o Outlook e pressione Ctrl+V.");
                    } else {
                        throw new Error("Copy command failed");
                    }
                } catch (err) {
                    showNotify("O navegador bloqueou a cópia formatada. Tente novamente.", "error");
                } finally {
                    document.removeEventListener('copy', clipboardListener);
                    selection.removeAllRanges();
                    document.body.removeChild(dummyElement);
                }
            };

            const exportReport = (dataToExport, name) => { 
                try { 
                    // Pega os dados e traduz todas as datas para o Padrão Brasileiro (DD/MM/YYYY)
                    const formattedData = dataToExport.map(row => {
                        let newRow = { ...row };
                        
                        // Formata as datas do Relatório Geral
                        if (newRow.inicio) newRow.inicio = formatDatePTBR(newRow.inicio);
                        if (newRow.termino) newRow.termino = formatDatePTBR(newRow.termino);
                        if (newRow.dataTransferencia) newRow.dataTransferencia = formatDatePTBR(newRow.dataTransferencia);
                        if (newRow.dataTransferencia2) newRow.dataTransferencia2 = formatDatePTBR(newRow.dataTransferencia2);
                        
                        // Formata as datas do Relatório de Substituições
                        if (newRow.dataInicio) newRow.dataInicio = formatDatePTBR(newRow.dataInicio);
                        if (newRow.dataFim) newRow.dataFim = formatDatePTBR(newRow.dataFim);
                        
                        // Formata as datas do Histórico (Logs)
                        if (newRow.timestamp) newRow.timestamp = new Date(newRow.timestamp).toLocaleString('pt-BR');
                        
                        // Remove marcações internas da IA da exportação para o Excel ficar mais limpo
                        delete newRow.autoAssignedLogs;

                        return newRow;
                    });

                    const ws = XLSX.utils.json_to_sheet(formattedData); 
                    const wb = XLSX.utils.book_new(); 
                    XLSX.utils.book_append_sheet(wb, ws, "Relatório"); 
                    XLSX.writeFile(wb, `${name}.xlsx`); 
                } catch (err) { 
                    showNotify("Erro ao exportar o arquivo excel.", "error");
                } 
            };
            
            const subDaysCount = useMemo(() => {
                if (!newSub.dataInicio || !newSub.dataFim || newSub.isDefinitive) return 0;
                const start = new Date(newSub.dataInicio); const end = new Date(newSub.dataFim);
                const diffTime = Math.abs(end - start);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1; 
                return diffDays > 0 ? diffDays : 0;
            }, [newSub.dataInicio, newSub.dataFim, newSub.isDefinitive]);

            const isCopyValid = emailPeriod.start && emailPeriod.end && emailPeriod.start <= emailPeriod.end;

            // Variáveis do relatório Estatístico (NOVO)
            const totalInstrutoresAtivos = dashboardInstructors.length;
            const totalAlunosGeral = dashboardInstructors.reduce((acc, inst) => acc + inst.totalAlunos, 0);
            const mediaAlunosPorInstrutor = totalInstrutoresAtivos > 0 ? Math.round(totalAlunosGeral / totalInstrutoresAtivos) : 0;

            return (
                <div className="min-h-screen bg-slate-100 flex flex-col pb-10">
                    <input type="file" ref={fileInputRef} className="hidden" onChange={handleFileUpload} />
                    {notification && (<div className={`custom-alert fade-in ${notification.type === 'error' ? 'bg-red-600' : 'bg-emerald-600'} text-white`}>{notification.type === 'error' ? <Icons.Alert /> : <Icons.Check />}<span className="font-bold">{safeString(notification.msg)}</span></div>)}

                    <div className="bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm header-bar no-print">
                        <div className="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
                            <div className="flex items-center gap-4"><img src="https://upload.wikimedia.org/wikipedia/commons/8/86/Senac_logo.svg" alt="Senac" className="h-10 w-auto" /><div className="border-l border-gray-300 pl-4 h-8 flex items-center"><h1 className="text-xl font-bold text-slate-800 tracking-tight">Gestão de Turmas</h1></div></div>
                            <div className="flex items-center gap-6">
                                <button onClick={handleFullBackupExport} className="px-3 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-bold text-xs flex gap-1 items-center shadow-lg transition border border-indigo-500 animate-pulse hover:animate-none"><Icons.Sync /> Backup</button>
                                <div className="flex flex-col items-end">{isSaving ? (<div className="flex items-center gap-2 text-orange-500"><div className="loading-icon"><Icons.Refresh /></div><span className="text-xs font-bold uppercase tracking-wide">Salvando...</span></div>) : (<div className="flex items-center gap-1 text-green-600"><Icons.Check /><span className="text-xs font-bold uppercase tracking-wide">Dados Salvos (v100)</span></div>)}<span className="text-[10px] text-gray-400">{lastSaved ? `Sync: ${lastSaved.toLocaleTimeString()}` : 'Pronto'}</span></div>
                                <div className="flex gap-2">
                                    <button onClick={hardReset} className="px-3 py-2 bg-red-50 text-red-600 rounded-lg hover:bg-red-100 font-bold text-xs flex gap-1 items-center shadow-sm transition border border-red-200">Limpar Tudo</button>
                                    <button onClick={() => setIsSubModalOpen(true)} className="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 font-bold text-sm flex gap-2 items-center shadow-sm transition hover:scale-105"><Icons.Switch /> Transferir</button>
                                    <button onClick={() => setIsNewInstModalOpen(true)} className="px-4 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 font-bold text-sm flex gap-2 items-center shadow-sm transition hover:scale-105"><Icons.UserPlus /> Novo Instrutor</button>
                                    <button onClick={() => setIsFormOpen(true)} className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-bold text-sm flex gap-2 items-center shadow-sm transition hover:scale-105"><Icons.Plus /> Nova Turma</button>
                                </div>
                            </div>
                        </div>
                        <div className="bg-slate-50 border-b border-gray-200 nav-bar">
                            <div className="max-w-7xl mx-auto px-4 flex gap-1 overflow-x-auto py-1">
                                <button onClick={() => {setActiveTab('dashboard'); setReportType('geral');}} className={`px-4 py-2 rounded-t-lg text-xs font-bold transition border-b-2 ${activeTab==='dashboard'?'border-blue-600 text-blue-900 bg-white':'border-transparent text-gray-500 hover:text-blue-600 hover:bg-white'}`}>Dashboard</button>
                                <button onClick={() => {setActiveTab('relatorios'); setReportType('geral');}} className={`px-4 py-2 rounded-t-lg text-xs font-bold transition border-b-2 ${activeTab==='relatorios' && reportType==='geral'?'border-blue-600 text-blue-900 bg-white':'border-transparent text-gray-500 hover:text-blue-600 hover:bg-white'}`}>Relatório Geral</button>
                                <button onClick={() => {setActiveTab('relatorios'); setReportType('subs');}} className={`px-4 py-2 rounded-t-lg text-xs font-bold transition border-b-2 ${activeTab==='relatorios' && reportType==='subs'?'border-blue-600 text-blue-900 bg-white':'border-transparent text-gray-500 hover:text-blue-600 hover:bg-white'}`}>Relatório Substituições</button>
                                <button onClick={() => {setActiveTab('relatorios'); setReportType('estatisticas');}} className={`px-4 py-2 rounded-t-lg text-xs font-bold transition border-b-2 ${activeTab==='relatorios' && reportType==='estatisticas'?'border-emerald-600 text-emerald-900 bg-emerald-50':'border-transparent text-gray-500 hover:text-emerald-600 hover:bg-emerald-50'}`}>Estatísticas e Médias</button>
                                <button onClick={() => {setActiveTab('relatorios'); setReportType('logs');}} className={`px-4 py-2 rounded-t-lg text-xs font-bold transition border-b-2 ${activeTab==='relatorios' && reportType==='logs'?'border-purple-600 text-purple-900 bg-purple-50':'border-transparent text-gray-500 hover:text-purple-600 hover:bg-purple-50'}`}>Histórico</button>
                                <button onClick={() => fileInputRef.current.click()} className="ml-auto px-3 py-1 text-emerald-600 hover:bg-emerald-50 border border-emerald-200 rounded text-xs font-bold flex items-center gap-1 transition"><Icons.Upload /> Importar Excel</button>
                            </div>
                        </div>
                    </div>

                    <main className="max-w-7xl mx-auto w-full px-6 py-8 flex-1">
                        {activeTab === 'relatorios' ? (
                            <div className="fade-in bg-white p-6 rounded-xl shadow-sm border border-gray-200 printable-content">
                                {reportType === 'estatisticas' ? (
                                    <>
                                        <h2 className="text-xl font-bold text-emerald-900 mb-6 flex items-center gap-2 no-print border-b pb-4"> 
                                            <Icons.ChartBar /> Resumo Estatístico de Instrutores e Alunos (Data base: {formatDatePTBR(viewDate)})
                                        </h2>
                                        
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                                            <div className="bg-slate-50 border border-slate-200 rounded-2xl p-6 flex flex-col justify-center items-center shadow-sm">
                                                <div className="text-slate-400 mb-2"><Icons.Users /></div>
                                                <span className="text-4xl font-black text-slate-800">{totalInstrutoresAtivos}</span>
                                                <span className="text-xs font-bold text-slate-500 uppercase tracking-widest mt-1">Instrutores Ativos</span>
                                            </div>
                                            <div className="bg-blue-50 border border-blue-200 rounded-2xl p-6 flex flex-col justify-center items-center shadow-sm">
                                                <div className="text-blue-400 mb-2"><Icons.User /></div>
                                                <span className="text-4xl font-black text-blue-900">{totalAlunosGeral}</span>
                                                <span className="text-xs font-bold text-blue-600 uppercase tracking-widest mt-1">Total de Alunos (Cenário)</span>
                                            </div>
                                            <div className="bg-emerald-50 border border-emerald-200 rounded-2xl p-6 flex flex-col justify-center items-center shadow-sm">
                                                <div className="text-emerald-400 mb-2"><Icons.Check /></div>
                                                <span className="text-4xl font-black text-emerald-700">{mediaAlunosPorInstrutor}</span>
                                                <span className="text-xs font-bold text-emerald-600 uppercase tracking-widest mt-1">Média (Alunos/Instrutor)</span>
                                            </div>
                                        </div>

                                        <h3 className="text-lg font-bold text-slate-700 mb-4">Média Individual por Instrutor (Ranqueamento de Carga)</h3>
                                        <div className="overflow-x-auto border rounded-lg">
                                            <table className="min-w-full comp-table">
                                                <thead>
                                                    <tr>
                                                        <th className="w-16 text-center">Rank</th>
                                                        <th>Instrutor</th>
                                                        <th className="text-center">Total Turmas</th>
                                                        <th className="text-center">Total Alunos</th>
                                                        <th className="text-center">Média (Alunos/Turma)</th>
                                                        <th className="text-center">Status Carga</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {dashboardInstructors.map((inst, index) => {
                                                        const mediaIndividual = inst.totalTurmas > 0 ? Math.round(inst.totalAlunos / inst.totalTurmas) : 0;
                                                        let statusLabel = "Adequada";
                                                        let statusClass = "bg-green-100 text-green-700 border-green-200";
                                                        
                                                        if (inst.totalAlunos >= 250) { statusLabel = "Máxima (Alerta)"; statusClass = "bg-red-100 text-red-700 border-red-200"; }
                                                        else if (inst.totalAlunos >= 200) { statusLabel = "Alta"; statusClass = "bg-orange-100 text-orange-700 border-orange-200"; }
                                                        else if (inst.totalAlunos < 100) { statusLabel = "Baixa (Disponível)"; statusClass = "bg-blue-100 text-blue-700 border-blue-200"; }

                                                        return (
                                                            <tr key={inst.nome} className="hover:bg-slate-50 transition">
                                                                <td className="text-center font-bold text-slate-400">{index + 1}º</td>
                                                                <td className="font-bold text-slate-700">{inst.nome}</td>
                                                                <td className="text-center text-slate-600">{inst.totalTurmas}</td>
                                                                <td className={`text-center font-bold ${inst.totalAlunos >= 200 ? 'text-red-600' : 'text-blue-700'}`}>{inst.totalAlunos}</td>
                                                                <td className="text-center font-mono text-slate-600">{mediaIndividual}</td>
                                                                <td className="text-center">
                                                                    <span className={`px-2 py-1 rounded text-[10px] font-bold border ${statusClass}`}>{statusLabel}</span>
                                                                </td>
                                                            </tr>
                                                        );
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                    </>
                                ) : (
                                    <>
                                        <h2 className="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2 no-print"> <Icons.FileText /> 
                                            {reportType === 'geral' ? 'Relatório Geral de Turmas' : reportType === 'subs' ? 'Relatório de Substituições / Transferências' : 'Histórico de Alterações (Audit Log)'}
                                        </h2>
                                        <div className="text-xs text-gray-500 mb-4 font-semibold no-print border-b pb-2">Visualizando {filteredReportData ? filteredReportData.length : 0} registros</div>
                                        <div className="flex gap-4 mb-4 no-print">
                                            <button onClick={() => window.print()} className="bg-slate-700 text-white px-4 py-2 rounded flex gap-2 items-center"><Icons.Printer /> Imprimir</button>
                                            <button onClick={() => exportReport(filteredReportData, `Relatorio_${reportType}`)} className="bg-green-600 text-white px-4 py-2 rounded flex gap-2 items-center"><Icons.Download /> Exportar Excel</button>
                                        </div>
                                        <div className="overflow-x-auto border rounded-lg">
                                            <table className={`min-w-full ${reportType === 'logs' ? 'log-table' : 'comp-table'}`}>
                                                <thead>
                                                    <tr>
                                                        {reportType === 'logs' ? (
                                                            <><th>Data/Hora</th><th>Turma ID</th><th>Tipo</th><th>Antes</th><th>Depois</th></>
                                                        ) : (
                                                            <><th>Turma</th><th>APZ/Curso</th><th>Analista</th><th>Instrutores (Cadeia)</th><th>Situação</th><th>Período</th></>
                                                        )}
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {(filteredReportData || []).slice(0, 200).map((row, i) => (
                                                        <tr key={row.id || i} className="hover:bg-slate-50 transition">
                                                            {reportType === 'logs' ? (
                                                                <>
                                                                    <td className="font-mono text-gray-500">{new Date(row.timestamp).toLocaleString('pt-BR')}</td>
                                                                    <td className="font-bold">{row.classId}</td>
                                                                    <td><span className={`px-2 py-0.5 rounded text-[10px] font-bold ${row.type === 'Transferência Definitiva' || row.type === 'Onboarding de Instrutor' ? 'bg-purple-100 text-purple-700' : 'bg-slate-100 text-slate-700'}`}>{row.type}</span></td>
                                                                    <td className="text-red-600 max-w-xs truncate" title={safeString(row.before)}>{safeString(row.before)}</td>
                                                                    <td className="text-green-600 max-w-xs truncate" title={safeString(row.after)}>{safeString(row.after)}</td>
                                                                </>
                                                            ) : (
                                                                <>
                                                                    <td>{safeString(reportType === 'subs' ? row.turmaId : row.id)}</td>
                                                                    <td>
                                                                        <div className="flex flex-col">
                                                                            <span className="font-bold">{safeString(reportType === 'subs' ? row.motivo : row.curso)}</span>
                                                                            {reportType !== 'subs' && <span className="text-[10px] uppercase text-gray-400 font-bold">{row.modalidade}</span>}
                                                                        </div>
                                                                    </td>
                                                                    <td>{safeString(reportType === 'subs' ? row.instrutorSubstituto : row.analista)}</td>
                                                                    <td>
                                                                        <div className="flex flex-col">
                                                                            <span className="font-bold text-blue-700">{row.instrutor1}</span>
                                                                            {row.instrutor2 && <span className="text-xs text-green-600 font-semibold flex items-center gap-1">➔ {row.instrutor2} {row.dataTransferencia ? `(P1: ${formatDatePTBR(row.dataTransferencia)})` : ''}</span>}
                                                                            {row.instrutor3 && <span className="text-xs text-purple-600 font-semibold flex items-center gap-1">➔ {row.instrutor3} {row.dataTransferencia2 ? `(P2: ${formatDatePTBR(row.dataTransferencia2)})` : ''}</span>}
                                                                        </div>
                                                                    </td>
                                                                    <td><span className="px-2 py-1 rounded text-[10px] font-bold border bg-blue-50 text-blue-700 border-blue-200">{row.status}</span></td>
                                                                    <td>{safeString(reportType === 'subs' ? `${formatDatePTBR(row.dataInicio)}` : formatDatePTBR(row.inicio))}</td>
                                                                </>
                                                            )}
                                                        </tr>
                                                    ))}
                                                    {(!filteredReportData || filteredReportData.length === 0) && (
                                                        <tr><td colSpan="6" className="text-center py-6 text-gray-400 italic">Nenhum dado encontrado para os filtros atuais.</td></tr>
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    </>
                                )}
                            </div>
                        ) : (

                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="input-wrapper"><label className="input-label">Início</label><input type="date" className="input-field" value={editingClass.inicio} onChange={e => setEditingClass({...editingClass, inicio: e.target.value})} /></div>
                                            <div className="input-wrapper"><label className="input-label">Término</label><input type="date" className="input-field" value={editingClass.termino} onChange={e => setEditingClass({...editingClass, termino: e.target.value})} /></div>
                                        </div>
                                        <button type="submit" className="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-lg text-lg transition flex justify-center items-center gap-2 mt-2"><Icons.Save /> Confirmar Validação & Salvar</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL NOVA TURMA */}
                    {isFormOpen && (
                        <div className="modal-overlay z-[12000]">
                            <div className="modal-window">
                                <div className="modal-header"><span>Nova Turma</span><button onClick={() => setIsFormOpen(false)} className="opacity-50 hover:opacity-100 transition p-2">✕</button></div>
                                <div className="modal-body">
                                    <form onSubmit={handleCreateClass} className="flex flex-col gap-8">
                                        <div className="flex flex-col gap-6">
                                            <div className="flex items-center gap-3 border-b border-gray-100 pb-2 mb-2">
                                                <div className="bg-blue-100 text-blue-700 w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold">1</div>
                                                <h3 className="text-sm font-bold text-gray-800 uppercase tracking-wide">Identificação</h3>
                                            </div>
                                            <div className="grid grid-cols-12 gap-6">
                                                <div className="col-span-8 input-wrapper">
                                                    <label className="input-label">Turma</label>
                                                    <input className="input-field font-bold text-lg" placeholder="Ex: 202500..." value={newClass.id} onChange={e => setNewClass({...newClass, id: e.target.value})} required />
                                                </div>
                                                <div className="col-span-4 input-wrapper">
                                                    <label className="input-label">Alunos</label>
                                                    <input type="number" className="input-field" placeholder="0" value={newClass.alunos} onChange={e => setNewClass({...newClass, alunos: e.target.value})} />
                                                </div>
                                            </div>
                                            
                                            <div className="grid grid-cols-2 gap-6 p-4 bg-slate-50 border border-slate-200 rounded-xl">
                                                <div className="input-wrapper">
                                                    <label className="input-label text-blue-800">APZ</label>
                                                    <select className="input-field bg-white font-bold text-blue-900 border-blue-200" value={newClass.modalidade} onChange={e => {
                                                        const modalidadeSelecionada = e.target.value;
                                                        setNewClass({
                                                            ...newClass, 
                                                            modalidade: modalidadeSelecionada,
                                                            curso: CURSOS_POR_MODALIDADE[modalidadeSelecionada][0],
                                                            instrutor3: '',
                                                            dataTransferencia2: ''
                                                        });
                                                    }} required>
                                                        {uniqueModalidades.map(m => <option key={m} value={m}>{safeString(m)}</option>)}
                                                    </select>
                                                </div>
                                                <div className="input-wrapper">
                                                    <label className="input-label">Curso Específico</label>
                                                    <select className="input-field bg-white" value={newClass.curso} onChange={e => setNewClass({...newClass, curso: e.target.value})} required>
                                                        {(CURSOS_POR_MODALIDADE[newClass.modalidade] || []).map(c => <option key={c} value={c}>{safeString(c)}</option>)}
                                                    </select>
                                                </div>
                                            </div>
                                            
                                            <div className="input-wrapper">
                                                <label className="input-label">Analista</label>
                                                <select className="input-field" value={newClass.analista} onChange={e => setNewClass({...newClass, analista: e.target.value})}>
                                                    <option value="">Deixar em branco para Inteligência Automática...</option>
                                                    {newClass.curso ? getRankedAnalystOptions(newClass.curso).map(opt => (
                                                        <option key={opt.nome} value={opt.nome}>{opt.emoji} {safeString(opt.nome)} {safeString(opt.tip)}</option>
                                                    )) : uniqueAnalistas.map(a => <option key={a} value={a}>{safeString(a)}</option>)}
                                                </select>
                                            </div>
                                        </div>
                                        <div className="flex flex-col gap-6">
                                            <div className="flex items-center gap-3 border-b border-gray-100 pb-2 mb-2">
                                                <div className="bg-blue-100 text-blue-700 w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold">2</div>
                                                <h3 className="text-sm font-bold text-gray-800 uppercase tracking-wide">Cronograma Geral</h3>
                                            </div>
                                            <div className="grid grid-cols-2 gap-6">
                                                <div className="input-wrapper">
                                                    <label className="input-label">Início</label>
                                                    <input type="date" className="input-field" value={newClass.inicio} onChange={e => setNewClass({...newClass, inicio: e.target.value})} />
                                                </div>
                                                <div className="input-wrapper">
                                                    <label className="input-label">Término</label>
                                                    <input type="date" className="input-field" value={newClass.termino} onChange={e => setNewClass({...newClass, termino: e.target.value})} />
                                                </div>
                                            </div>
                                        </div>
                                        
                                        <div className={`flex flex-col gap-6 p-4 rounded-xl border ${newClass.modalidade === 'Técnica' ? 'bg-purple-50/30 border-purple-200' : 'bg-blue-50/30 border-blue-200'}`}>
                                            <div className={`flex items-center gap-3 border-b pb-2 mb-2 ${newClass.modalidade === 'Técnica' ? 'border-purple-200' : 'border-blue-200'}`}>
                                                <div className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold text-white ${newClass.modalidade === 'Técnica' ? 'bg-purple-600' : 'bg-blue-600'}`}>3</div>
                                                <h3 className={`text-sm font-bold uppercase tracking-wide ${newClass.modalidade === 'Técnica' ? 'text-purple-900' : 'text-blue-900'}`}>Equipe Docente e Passagens</h3>
                                            </div>
                                            
                                            <div className="grid grid-cols-2 gap-6">
                                                <div className="input-wrapper">
                                                    <label className="input-label text-blue-700">Instrutor 1 (Início)</label>
                                                    <select className="input-field border-blue-200" value={newClass.instrutor1} onChange={e => setNewClass({...newClass, instrutor1: e.target.value})}>
                                                        <option value="">Deixar em branco p/ IA preencher...</option>
                                                        {newClass.curso ? getRankedInstructorOptions(newClass.curso, [newClass.instrutor2, newClass.instrutor3], 'instrutor1', newClass.modalidade, [], null, newClass.inicio).map(opt => (
                                                            <option key={opt.nome} value={opt.nome}>{opt.emoji} {safeString(opt.nome)} {safeString(opt.tip)}</option>
                                                        )) : <option disabled>Selecione um curso</option>}
                                                    </select>
                                                </div>
                                                <div className="input-wrapper">
                                                    <label className="input-label text-orange-600">Data da Passagem 1</label>
                                                    <input type="date" className="input-field border-orange-200 text-orange-800" value={newClass.dataTransferencia} onChange={e => setNewClass({...newClass, dataTransferencia: e.target.value})} />
                                                </div>
                                                <div className="input-wrapper">
                                                    <label className="input-label text-green-700">Instrutor 2 (Recebe P1)</label>
                                                    <select className="input-field border-green-200" value={newClass.instrutor2} onChange={e => setNewClass({...newClass, instrutor2: e.target.value})}>
                                                        <option value="">Deixar em branco p/ IA preencher...</option>
                                                        {newClass.curso ? getRankedInstructorOptions(newClass.curso, [newClass.instrutor1, newClass.instrutor3], 'instrutor2', newClass.modalidade, [], null, newClass.dataTransferencia).map(opt => (
                                                            <option key={opt.nome} value={opt.nome}>{opt.emoji} {safeString(opt.nome)} {safeString(opt.tip)}</option>
                                                        )) : <option disabled>Selecione um curso</option>}
                                                    </select>
                                                </div>
                                            </div>

                                            {newClass.modalidade === 'Técnica' && (
                                                <div className="grid grid-cols-2 gap-6 bg-purple-50 p-3 rounded-lg border border-purple-100 shadow-sm mt-2">
                                                    <div className="input-wrapper">
                                                        <label className="input-label text-purple-700">Data da Passagem 2</label>
                                                        <input type="date" className="input-field border-purple-200 text-purple-800" value={newClass.dataTransferencia2} onChange={e => setNewClass({...newClass, dataTransferencia2: e.target.value})} />
                                                    </div>
                                                    <div className="input-wrapper">
                                                        <label className="input-label text-purple-700">Instrutor 3 (Recebe P2)</label>
                                                        <select className="input-field border-purple-200" value={newClass.instrutor3} onChange={e => setNewClass({...newClass, instrutor3: e.target.value})}>
                                                            <option value="">Deixar em branco p/ IA preencher...</option>
                                                            {getRankedInstructorOptions(newClass.curso, [newClass.instrutor1, newClass.instrutor2], 'instrutor3', newClass.modalidade, [], null, newClass.dataTransferencia2).map(opt => (
                                                                <option key={opt.nome} value={opt.nome}>{opt.emoji} {safeString(opt.nome)} {safeString(opt.tip)}</option>
                                                            ))}
                                                        </select>
                                                    </div>
                                                </div>
                                            )}
                                        </div>

                                        <button type="submit" className="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-lg text-lg transition transform active:scale-[0.99] flex justify-center items-center gap-2 mt-2">
                                            <Icons.Plus /> Confirmar Criação
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL COBERTURA */}
                    {isSubModalOpen && (
                        <div className="modal-overlay z-[13000]">
                            <div className="modal-window">
                                <div className="modal-header bg-slate-50"><span>Substituição / Transferência</span><button onClick={() => setIsSubModalOpen(false)} className="opacity-50 hover:opacity-100 transition p-2">✕</button></div>
                                <div className="modal-body">
                                    <form onSubmit={handleCreateSub} className="flex flex-col gap-8">
                                        
                                        <div className="flex gap-4 p-2 bg-slate-100 rounded-xl">
                                            <label className={`flex-1 flex justify-center items-center p-3 rounded-lg font-bold text-sm cursor-pointer transition border ${!newSub.isDefinitive ? 'bg-blue-600 text-white border-blue-700 shadow-md' : 'bg-transparent text-slate-500 border-transparent hover:bg-slate-200'}`}>
                                                <input type="radio" className="hidden" name="subType" checked={!newSub.isDefinitive} onChange={() => setNewSub({...newSub, isDefinitive: false})} />
                                                Cobertura Temporária (Atestado/Férias)
                                            </label>
                                            <label className={`flex-1 flex justify-center items-center p-3 rounded-lg font-bold text-sm cursor-pointer transition border ${newSub.isDefinitive ? 'bg-purple-600 text-white border-purple-700 shadow-md' : 'bg-transparent text-slate-500 border-transparent hover:bg-slate-200'}`}>
                                                <input type="radio" className="hidden" name="subType" checked={newSub.isDefinitive} onChange={() => setNewSub({...newSub, isDefinitive: true})} />
                                                Transferência Definitiva (Troca de Titular)
                                            </label>
                                        </div>

                                        {!newSub.isDefinitive && (
                                            <div className="flex flex-col gap-6 fade-in">
                                                <div className="grid grid-cols-12 gap-6">
                                                    <div className="col-span-6 input-wrapper">
                                                        <label className="input-label">Início da Cobertura</label>
                                                        <input type="date" className="input-field" value={newSub.dataInicio} onChange={e => setNewSub({...newSub, dataInicio: e.target.value})} required={!newSub.isDefinitive} />
                                                    </div>
                                                    <div className="col-span-6 input-wrapper">
                                                        <label className="input-label">Fim da Cobertura</label>
                                                        <input type="date" className="input-field" value={newSub.dataFim} onChange={e => setNewSub({...newSub, dataFim: e.target.value})} required={!newSub.isDefinitive} />
                                                    </div>
                                                </div>
                                                {subDaysCount > 0 && (
                                                    <div className="text-center text-sm font-bold text-blue-600 bg-blue-50 p-2 rounded-lg border border-blue-100">
                                                        Duração de {subDaysCount} dia(s)
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        <div className="input-wrapper">
                                            <label className="input-label">Turma Envolvida</label>
                                            <select className="input-field font-bold border-blue-300" value={newSub.turmaId} onChange={e => setNewSub({...newSub, turmaId: e.target.value})} required>
                                                <option value="">1º Passo: Selecione a Turma...</option>
                                                {uniqueClasses.map(id => {
                                                    const t = data.find(d => String(d.id) === String(id));
                                                    return <option key={id} value={id}>Turma {safeString(id)} - {t?.curso} ({getSafeModalidade(t)})</option>
                                                })}
                                            </select>
                                        </div>

                                        <div className={`p-6 rounded-2xl border flex flex-col gap-6 ${newSub.isDefinitive ? 'bg-purple-50/50 border-purple-100' : 'bg-blue-50/50 border-blue-100'}`}>
                                            <h3 className={`text-sm font-bold uppercase tracking-wide border-b pb-2 mb-2 ${newSub.isDefinitive ? 'text-purple-900 border-purple-200' : 'text-blue-900 border-blue-200'}`}>
                                                {newSub.isDefinitive ? 'Troca de Titularidade (Inteligente)' : 'Profissional de Cobertura'}
                                            </h3>
                                            <div className="grid grid-cols-2 gap-8">
                                                <div className="input-wrapper">
                                                    <label className="input-label text-red-600">Instrutor Atual (Que sairá)</label>
                                                    <select className="input-field border-red-200" value={newSub.instrutorAusente} onChange={e => setNewSub({...newSub, instrutorAusente: e.target.value})} required>
                                                        <option value="">Selecione...</option>
                                                        {uniqueInstrutores.map(i => <option key={i} value={i}>{safeString(i)}</option>)}
                                                    </select>
                                                </div>
                                                <div className="input-wrapper">
                                                    <label className="input-label text-green-600">Novo Instrutor (Substituto)</label>
                                                    <select className="input-field border-green-200 font-bold text-green-800" value={newSub.instrutorSubstituto} onChange={e => setNewSub({...newSub, instrutorSubstituto: e.target.value})} required>
                                                        <option value="">Quem assume?</option>
                                                        {newSub.turmaId ? 
                                                            (() => {
                                                                const tObj = data.find(d => String(d.id) === String(newSub.turmaId));
                                                                if (!tObj) return null;
                                                                // Usa a viewDate ou a data do início da cobertura para calcular a carga com precisão
                                                                return getRankedInstructorOptions(tObj.curso, [newSub.instrutorAusente], 'sub', getSafeModalidade(tObj), [], null, newSub.dataInicio || viewDate).map(opt => (
                                                                    <option key={opt.nome} value={opt.nome}>{opt.emoji} {safeString(opt.nome)} ({safeString(opt.tip)})</option>
                                                                ));
                                                            })()
                                                        : uniqueInstrutores.filter(name => !BLOCKED_INSTRUCTORS.includes(normalizeText(name))).map(i => <option key={i} value={i}>{safeString(i)}</option>)}
                                                    </select>
                                                    {newSub.turmaId && <span className="text-[10px] text-green-600 mt-1 font-bold">↑ Opções sugeridas pela Inteligência do Sistema</span>}
                                                </div>
                                            </div>
                                        </div>
                                        <div className="input-wrapper">
                                            <label className="input-label">Motivo ou Observação</label>
                                            <input className="input-field" placeholder={newSub.isDefinitive ? "Ex: Desligamento, Remanejamento..." : "Ex: Atestado médico, Licença..."} value={newSub.motivo} onChange={e => setNewSub({...newSub, motivo: e.target.value})} required />
                                        </div>
                                        <button type="submit" className={`w-full py-4 text-white font-bold rounded-xl shadow-lg text-lg transition transform active:scale-[0.99] flex justify-center items-center gap-2 mt-2 ${newSub.isDefinitive ? 'bg-purple-600 hover:bg-purple-700' : 'bg-blue-600 hover:bg-blue-700'}`}>
                                            <Icons.Switch /> {newSub.isDefinitive ? 'Efetivar Transferência Definitiva' : 'Registrar Cobertura Temporária'}
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL CONFIGURAÇÃO DE E-MAIL */}
                    {emailConfigModal && (
                        <div className="modal-overlay z-[15000]">
                            <div className="modal-window max-w-lg bg-white shadow-2xl border-2 border-blue-200">
                                <div className="bg-gradient-to-r from-blue-700 to-indigo-800 text-white p-5 flex justify-between items-center shadow-md">
                                    <div>
                                        <h2 className="text-xl font-bold flex items-center gap-2"><Icons.Calendar /> Exportar Resumo por Período</h2>
                                    </div>
                                    <button onClick={() => setEmailConfigModal(false)} className="bg-white/20 hover:bg-white/40 p-2 rounded-full transition">✕</button>
                                </div>
                                <div className="p-6 bg-slate-50 flex flex-col gap-6">
                                    <p className="text-sm text-slate-600 leading-relaxed bg-blue-50 p-4 border border-blue-100 rounded-lg">
                                        Escolha o período e/ou a Analista que deseja enviar para <b>{selectedInstructorDetail?.nome}</b>. O sistema formatará um e-mail pronto para o Outlook.
                                    </p>
                                    
                                    <div className="grid grid-cols-2 gap-6 bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                                        <div className="input-wrapper">
                                            <label className="input-label text-blue-700">Mês Inicial</label>
                                            <input type="month" className="input-field border-blue-200 font-bold text-blue-900" 
                                                value={emailPeriod.start} 
                                                onChange={e => setEmailPeriod({...emailPeriod, start: e.target.value})} 
                                            />
                                        </div>
                                        <div className="input-wrapper">
                                            <label className="input-label text-blue-700">Mês Final</label>
                                            <input type="month" className="input-field border-blue-200 font-bold text-blue-900" 
                                                value={emailPeriod.end} 
                                                onChange={e => setEmailPeriod({...emailPeriod, end: e.target.value})} 
                                            />
                                        </div>
                                    </div>

                                    {/* NOVO: Caixa de Seleção do Analista */}
                                    <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm mt-[-10px]">
                                        <div className="input-wrapper">
                                            <label className="input-label text-purple-700 flex items-center gap-1"><Icons.User /> Filtro por Analista (Opcional)</label>
                                            <select className="input-field border-purple-200 font-bold text-purple-900" value={emailPeriod.analista || ''} onChange={e => setEmailPeriod({...emailPeriod, analista: e.target.value})}>
                                                <option value="">Todas as Turmas (Sem Filtro)</option>
                                                {uniqueAnalistas.map(a => <option key={a} value={a}>{safeString(a)}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    
                                    {!isCopyValid && emailPeriod.start && emailPeriod.end && (
                                        <div className="text-xs font-bold text-red-600 bg-red-50 p-2 rounded text-center">
                                            ⚠️ O Mês Final deve ser igual ou superior ao Mês Inicial.
                                        </div>
                                    )}

                                    <div className="flex gap-3 mt-2 border-t pt-5 border-slate-200">
                                        <button onClick={() => {
                                            handleCopyEmail(selectedInstructorDetail, { analista: emailPeriod.analista }); 
                                            setEmailConfigModal(false);
                                        }} className="flex-1 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl transition text-sm border border-slate-300">
                                            Copiar TUDO (Aplicando Filtro Acima)
                                        </button>
                                        <button onClick={() => {
                                            handleCopyEmail(selectedInstructorDetail, emailPeriod);
                                            setEmailConfigModal(false);
                                        }} disabled={!isCopyValid} className={`flex-1 py-3 text-white font-bold rounded-xl transition text-sm shadow flex items-center justify-center gap-2 ${isCopyValid ? 'bg-blue-600 hover:bg-blue-700 cursor-pointer' : 'bg-blue-300 cursor-not-allowed'}`}>
                                            <Icons.Copy /> Confirmar e Copiar Período
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
