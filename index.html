<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.G.T - Gestão de Turmas (v100 Mega Painel)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Bibliotecas React e Utilitários -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style type="text/tailwindcss">
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; user-select: none; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }

        .comp-table th { @apply text-xs font-bold text-slate-500 uppercase tracking-wider py-4 px-4 text-left bg-slate-50 border-b border-slate-200 text-blue-900; }
        .comp-table td { @apply text-sm py-3 px-4 border-b border-slate-100 text-slate-700 align-middle; }
        
        .log-table th { @apply bg-slate-100 text-slate-600; }
        .log-table td { @apply text-xs border-slate-100; }

        .custom-alert { position: fixed; top: 20px; right: 20px; z-index: 11000; padding: 1rem; border-radius: 0.75rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 0.75rem; min-width: 300px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        /* MODAIS */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999; 
            background-color: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center; 
        }
        .modal-window { 
            background: #ffffff; width: 95%; max-width: 750px; 
            border-radius: 6px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden; display: flex; flex-direction: column;
            max-height: 90vh;
            animation: fadeIn 0.3s ease-out;
            border: 1px solid #e2e8f0;
        }
        .modal-header { 
            background: white; border-bottom: 1px solid #e2e8f0;
            color: #1e293b; padding: 1.5rem 2rem; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .modal-header span { font-size: 1.2rem; font-weight: 700; color: #0f172a; }
        .modal-body { 
            padding: 2.5rem; overflow-y: auto; background-color: #f8fafc;
            display: flex; flex-direction: column; gap: 2rem;
        }

        /* INPUTS */
        .input-wrapper { display: flex; flex-direction: column; gap: 0.5rem; } 
        .input-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; color: #64748b; margin-left: 2px; }
        .input-field { width: 100%; padding: 0.75rem 1rem; border: 1px solid #cbd5e1; border-radius: 0.5rem; background-color: white; font-size: 0.9rem; color: #334155; font-weight: 500; transition: all 0.2s; }
        .input-field:focus { border-color: #3b82f6; ring: 1px solid #bfdbfe; outline: none; }
        select.input-field { background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e"); background-position: right 0.5rem center; background-repeat: no-repeat; background-size: 1.5em 1.5em; padding-right: 2.5rem; appearance: none; }

        @media print {
            html, body { height: auto !important; overflow: visible !important; background: white !important; }
            body * { visibility: hidden; }
            .printable-content, .printable-content * { visibility: visible !important; }
            .printable-content { position: absolute !important; left: 0 !important; top: 0 !important; width: 100% !important; height: auto !important; max-height: none !important; overflow: visible !important; background: white !important; display: block !important; z-index: 9999 !important; margin: 0 !important; padding: 0 !important; }
            .modal-content, .modal-window { max-width: 100% !important; width: 100% !important; height: auto !important; max-height: none !important; overflow: visible !important; border: none !important; box-shadow: none !important; border-radius: 0 !important; position: static !important; }
            .overflow-y-auto, .modal-body { overflow: visible !important; height: auto !important; max-height: none !important; display: block !important; }
            .recharts-responsive-container { width: 100% !important; height: 300px !important; page-break-inside: avoid; }
            .no-print, button { display: none !important; }
            @page { margin: 1cm; size: landscape; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const safeString = (val) => {
            if (val === null || val === undefined) return "";
            if (typeof val === 'object') return ""; 
            return String(val);
        };

        const { useState, useEffect, useMemo, useRef, Component } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, PieChart, Pie, Cell } = Recharts;

        // --- ESTRUTURA DOS LEQUES DE CURSOS (APZ) ---
        const CURSOS_POR_MODALIDADE = {
            'Aperfeiçoamento': ['Administrativo', 'Administrativo (Sescoop)', 'Vendas', 'Supermercado'],
            'Técnica': ['Administrativo', 'ADM Sescoop']
        };

        const INITIAL_DB = [];

        const getSafeModalidade = (row) => {
            if (row.modalidade) return row.modalidade;
            const cNorm = normalizeText(row.curso);
            if (cNorm.includes('tecnica') || cNorm.includes('empresas')) return 'Técnica';
            return 'Aperfeiçoamento';
        };

        class ErrorBoundary extends Component {
            constructor(props) { super(props); this.state = { hasError: false }; }
            static getDerivedStateFromError(error) { return { hasError: true }; }
            componentDidCatch(error, errorInfo) { console.error("Crash UI:", error, errorInfo); }
            handleReset = () => { localStorage.clear(); window.location.reload(); }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="flex flex-col items-center justify-center min-h-screen bg-gray-50 p-4 text-center">
                            <h2 className="text-xl font-bold text-slate-800 mb-2">Sistema Indisponível</h2>
                            <p className="text-gray-500 mb-4 text-sm">Ocorreu um erro ao carregar os dados. Tente reiniciar.</p>
                            <button onClick={this.handleReset} className="bg-blue-600 text-white px-6 py-2.5 rounded-lg font-bold shadow hover:bg-blue-700 transition">Reiniciar Aplicação</button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const Icons = {
            Users: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>,
            User: () => <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>,
            UserPlus: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" /></svg>,
            ChartBar: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>,
            Upload: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4-4m0 0L8 8m4-4v12" /></svg>,
            Plus: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4" /></svg>,
            Switch: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" /></svg>,
            Maximize: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 4l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" /></svg>,
            Refresh: () => <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>,
            Check: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7" /></svg>,
            FileText: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>,
            Download: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4-4m0 0l-4-4m4 4V4" /></svg>,
            Printer: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" /></svg>,
            Alert: () => <svg className="w-4 h-4 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>,
            Save: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" /></svg>,
            Edit: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>,
            Sync: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>,
            Robot: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>,
            Copy: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>,
            Calendar: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
        };

        const DB_KEY = 'senacData_v45'; 
        const SUB_KEY = 'senacSubs_v45';
        const LOG_KEY = 'senacLogs_v65';
        
        // Blocklist
        const BLOCKED_INSTRUCTORS = ['fabio', 'lilian'];
        
        // Whitelist Técnica
        const TECNICA_WHITELIST = ['juliana', 'viviane', 'ana claudia', 'jean', 'tatiane', 'katia'];

        const normalizeText = (text) => {
            if (!text || typeof text !== 'string') return "";
            return text.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
        };

        const formatDatePTBR = (iso) => { const s = safeString(iso); if(!s) return ''; const p = s.split('-'); return p.length === 3 ? `${p[2]}/${p[1]}/${p[0]}` : s; };

        const fmtDate = (val) => { 
            if (!val) return ''; 
            if (val instanceof Date) {
                const d = new Date(val.getTime() + Math.abs(val.getTimezoneOffset() * 60000));
                return d.toISOString().split('T')[0]; 
            }
            const s = safeString(val); 
            if (s.match(/^\d{2}\/\d{2}\/\d{4}$/)) { const [d, m, y] = s.split('/'); return `${y}-${m}-${d}`; } 
            if (s.match(/^\d{4}-\d{2}-\d{2}/)) return s.substring(0, 10);
            return s; 
        };

        const getMonthName = (yyyy_mm) => {
            if (!yyyy_mm) return '';
            const [y, m] = yyyy_mm.split('-');
            const months = ['janeiro', 'fevereiro', 'março', 'abril', 'maio', 'junho', 'julho', 'agosto', 'setembro', 'outubro', 'novembro', 'dezembro'];
            return `${months[parseInt(m, 10) - 1]} de ${y}`;
        };

        function App() {
            const [data, setData] = useState([]);
            const [substitutions, setSubstitutions] = useState([]);
            const [logs, setLogs] = useState([]);
            const [isSaving, setIsSaving] = useState(false);
            const [lastSaved, setLastSaved] = useState(null);
            const [viewDate, setViewDate] = useState(new Date().toISOString().split('T')[0]);
            const [selectedInstructorDetail, setSelectedInstructorDetail] = useState(null);
            const [notification, setNotification] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            
            // ---> AQUI ESTÁ A NOSSA VARIÁVEL NOVA SALVADORA! <---
            const [dashboardView, setDashboardView] = useState('instructors');
            
            const [reportType, setReportType] = useState('geral');
            const fileInputRef = useRef(null);

            const [filters, setFilters] = useState({ instrutor: '', analista: '', modalidade: '', curso: '', turma: '', dataTransferencia: '' });
            const [isFormOpen, setIsFormOpen] = useState(false);
            
            // Estado para Inclusão de Instrutor (Onboarding)
            const [isNewInstModalOpen, setIsNewInstModalOpen] = useState(false);
            const [newInstData, setNewInstData] = useState({ name: '', isTecnica: false, selectedClasses: [] });

        	
            
// Memória dinâmica para os instrutores da Técnica
const [tecnicaWhitelist, setTecnicaWhitelist] = useState(() => {
    try {
        const saved = localStorage.getItem('senacWhitelist_v1');
        return saved ? JSON.parse(saved) : ['juliana', 'viviane', 'ana claudia', 'jean', 'tatiane', 'katia'];
    } catch(e) { return ['juliana', 'viviane', 'ana claudia', 'jean', 'tatiane', 'katia']; }
});

// Função para ligar/desligar a permissão da técnica de um instrutor
const toggleTecnicaPermission = (nome) => {
    const normName = normalizeText(nome);
    let newList;
    if (tecnicaWhitelist.includes(normName)) {
        newList = tecnicaWhitelist.filter(n => n !== normName); // Se já tem, remove
    } else {
        newList = [...tecnicaWhitelist, normName]; // Se não tem, adiciona
    }
    setTecnicaWhitelist(newList);
    localStorage.setItem('senacWhitelist_v1', JSON.stringify(newList));
};
            
            const [isSubModalOpen, setIsSubModalOpen] = useState(false);
            const [newSub, setNewSub] = useState({ 
                isDefinitive: false, 
                dataInicio: '', dataFim: '', 
                turmaId: '', instrutorAusente: '', instrutorSubstituto: '', motivo: '' 
            });
            
            const [importSummaryModal, setImportSummaryModal] = useState(null);

            const [newClass, setNewClass] = useState({ id: '', modalidade: 'Aperfeiçoamento', curso: 'Administrativo', analista: '', alunos: '', inicio: '', termino: '', instrutor1: '', instrutor2: '', instrutor3: '', dataTransferencia: '', dataTransferencia2: '' });
            const [isEditModalOpen, setIsEditModalOpen] = useState(false);
            const [editingClass, setEditingClass] = useState(null);

            const [emailConfigModal, setEmailConfigModal] = useState(false);
            const [emailPeriod, setEmailPeriod] = useState({ start: '', end: '' });

            useEffect(() => {
                try {
                    const rawData = localStorage.getItem(DB_KEY);
                    const rawSubs = localStorage.getItem(SUB_KEY);
                    const rawLogs = localStorage.getItem(LOG_KEY);
                    
                    if (rawData) {
                        const parsed = JSON.parse(rawData).map(r => ({...r, modalidade: getSafeModalidade(r)}));
                        setData(parsed);
                    } else {
                        setData(INITIAL_DB);
                    }

                    if (rawSubs) setSubstitutions(JSON.parse(rawSubs));
                    if (rawLogs) setLogs(JSON.parse(rawLogs));
                } catch (e) {
                    console.error("Erro no carregamento inicial", e);
                }
            }, []);

            const persist = (newData, newSubs, newLogs) => {
                setIsSaving(true);
                setData(newData);
                setSubstitutions(newSubs);
                if(newLogs) setLogs(newLogs);
              
                localStorage.setItem(DB_KEY, JSON.stringify(newData));
                localStorage.setItem(SUB_KEY, JSON.stringify(newSubs));
                if(newLogs) localStorage.setItem(LOG_KEY, JSON.stringify(newLogs));
              
                setLastSaved(new Date());
                setTimeout(() => setIsSaving(false), 500);
            };

            const addLog = (type, classId, before, after) => {
                const newLog = { id: Date.now(), timestamp: new Date().toISOString(), type, classId, before: typeof before === 'object' ? JSON.stringify(before) : safeString(before), after: typeof after === 'object' ? JSON.stringify(after) : safeString(after) };
                return [newLog, ...logs];
            };

            const showNotify = (msg, type = 'success') => {
                setNotification({ msg: safeString(msg), type });
                setTimeout(() => setNotification(null), 4000);
            };

            const hardReset = () => {
                if(confirm("Deseja apagar TODOS os dados e zerar o painel?")) {
                    localStorage.clear();
                    window.location.reload();
                }
            };

            const handleOpenEdit = (classData) => {
                // Adicionamos o 'originalId' para o sistema lembrar qual era o número antes da edição
                setEditingClass({...classData, modalidade: getSafeModalidade(classData), originalId: classData.id});
                setIsEditModalOpen(true);
            };

            const handleSaveEdit = (e) => {
                e.preventDefault();
                if (!editingClass) return;
              
                // Confere se o novo número da turma já existe no sistema
                if (String(editingClass.id) !== String(editingClass.originalId)) {
                    const idExists = data.some(d => String(d.id) === String(editingClass.id));
                    if (idExists) {
                        showNotify("Erro: Já existe outra turma com este número no sistema!", "error");
                        return;
                    }
                }

                const oldData = data.find(d => String(d.id) === String(editingClass.originalId));
                const changes = [];
                if (oldData) {
                    if (oldData.id != editingClass.id) changes.push(`ID Turma: ${oldData.id} -> ${editingClass.id}`);
                    if (oldData.alunos != editingClass.alunos) changes.push(`Alunos: ${oldData.alunos} -> ${editingClass.alunos}`);
                    if (oldData.modalidade != editingClass.modalidade) changes.push(`APZ: ${oldData.modalidade || 'N/A'} -> ${editingClass.modalidade}`);
                    if (oldData.curso != editingClass.curso) changes.push(`Curso: ${oldData.curso} -> ${editingClass.curso}`);
                    if (oldData.instrutor1 != editingClass.instrutor1) changes.push(`Instrutor 1: ${oldData.instrutor1} -> ${editingClass.instrutor1}`);
                    if (oldData.instrutor2 != editingClass.instrutor2) changes.push(`Instrutor 2: ${oldData.instrutor2 || 'N/A'} -> ${editingClass.instrutor2}`);
                    if (oldData.instrutor3 != editingClass.instrutor3) changes.push(`Instrutor 3: ${oldData.instrutor3 || 'N/A'} -> ${editingClass.instrutor3}`);
                    if (oldData.dataTransferencia != editingClass.dataTransferencia) changes.push(`Passagem 1: ${formatDatePTBR(oldData.dataTransferencia)} -> ${formatDatePTBR(editingClass.dataTransferencia)}`);
                    if (oldData.dataTransferencia2 != editingClass.dataTransferencia2) changes.push(`Passagem 2: ${formatDatePTBR(oldData.dataTransferencia2)} -> ${formatDatePTBR(editingClass.dataTransferencia2)}`);
                }
              
                const newLogs = changes.length > 0 ? addLog("Edição", editingClass.id, "Dados Anteriores", changes.join('; ')) : logs;

                const newData = data.map(d => {
                    if (String(d.id) === String(editingClass.originalId)) {
                        const updated = { ...editingClass, alunos: parseInt(editingClass.alunos) || 0 };
                        delete updated.originalId; 
                        delete updated.autoAssignedLogs; 
                        return updated;
                    }
                    return d;
                });

                // Atualiza também as substituições vinculadas caso o número da turma mude
                let newSubs = substitutions;
                if (String(editingClass.id) !== String(editingClass.originalId)) {
                    newSubs = substitutions.map(sub => {
                        if (String(sub.turmaId) === String(editingClass.originalId)) {
                            return { ...sub, turmaId: editingClass.id };
                        }
                        return sub;
                    });
                }

                persist(newData, newSubs, newLogs);
                showNotify(`Turma ${editingClass.id} atualizada com sucesso!`);
                setIsEditModalOpen(false);
                setEditingClass(null);
            };

            const canonicalNameMap = useMemo(() => {
                const map = {};
                const allNames = data.flatMap(d => [d.instrutor1, d.instrutor2, d.instrutor3, d.analista]);
                allNames.forEach(name => {
                    const sName = safeString(name);
                    if(!sName) return;
                    const key = normalizeText(sName);
                    if (!map[key]) map[key] = sName;
                });
                return map;
            }, [data]);

            const getCanonical = (name) => {
                const sName = safeString(name);
                if (!sName) return '';
                return canonicalNameMap[normalizeText(sName)] || sName;
            };

            const uniqueInstrutores = useMemo(() => {
                const raw = data.flatMap(d => [d.instrutor1, d.instrutor2, d.instrutor3]).map(safeString).filter(Boolean);
                return [...new Set(raw.map(n => getCanonical(n)))].sort();
            }, [data, canonicalNameMap]);

            const uniqueAnalistas = useMemo(() => {
                const raw = data.map(d => safeString(d.analista)).filter(Boolean);
                return [...new Set(raw.map(n => getCanonical(n)))].sort();
            }, [data, canonicalNameMap]);

            const uniqueCursos = useMemo(() => {
                const dbCursos = [...new Set(data.map(d => safeString(d.curso)).filter(Boolean))];
                return dbCursos.sort();
            }, [data]);
            
            const uniqueModalidades = ['Aperfeiçoamento', 'Técnica'];
            const uniqueClasses = useMemo(() => [...new Set(data.map(d => safeString(d.id)).filter(Boolean))].sort(), [data]);
            const uniqueDates = useMemo(() => [...new Set(data.map(d => safeString(d.dataTransferencia)).filter(Boolean))].sort(), [data]);

            const getActiveInfoOnDate = (row, dateObj) => {
                if (!dateObj || isNaN(dateObj.getTime())) return { inst: null, status: 'Desconhecido' };
                
                const start = (row.inicio && row.inicio.length === 10) ? new Date(row.inicio + 'T00:00:00') : new Date('1970-01-01T00:00:00');
                const end = (row.termino && row.termino.length === 10) ? new Date(row.termino + 'T00:00:00') : null;

                if (dateObj < start) return { inst: null, status: 'Agendado' };
                if (end && dateObj > end) return { inst: null, status: 'Finalizado' };

                let currentInst = safeString(row.instrutor1);
                let status = 'Ativo';

                let events = [];
                if (row.instrutor2 && safeString(row.dataTransferencia).length === 10) {
                    events.push({ d: new Date(row.dataTransferencia + 'T00:00:00'), inst: row.instrutor2, tag: 'Transferido (P1)' });
                }
                if (row.instrutor3 && safeString(row.dataTransferencia2).length === 10) {
                    events.push({ d: new Date(row.dataTransferencia2 + 'T00:00:00'), inst: row.instrutor3, tag: 'Transferido (P2)' });
                }
                events.sort((a,b) => a.d - b.d);

                events.forEach(ev => {
                    if (dateObj >= ev.d) {
                        currentInst = safeString(ev.inst);
                        status = ev.tag;
                    }
                });
                return { inst: getCanonical(currentInst), status };
            };

            const processedData = useMemo(() => {
                const target = new Date(viewDate + 'T00:00:00');
                return data.map(row => {
                    const info = getActiveInfoOnDate(row, target);
                    return { ...row, instrutorAtual: info.inst, status: info.status, modalidade: getSafeModalidade(row), autoAssignedLogs: row.autoAssignedLogs };
                });
            }, [data, viewDate, canonicalNameMap]);

            // NOVO: Agrupamento de Turmas Ativas para o Modal de Onboarding
            const groupedActiveClassesForOnboarding = useMemo(() => {
                const targetDateObj = new Date(viewDate + 'T00:00:00');
                const actives = processedData.filter(c => c.status !== 'Finalizado' && c.status !== 'Agendado');
                
                const groups = {};
                actives.forEach(cls => {
                    const key = `${cls.curso} (${cls.modalidade})`;
                    if (!groups[key]) groups[key] = [];
                    groups[key].push(cls);
                });
                return groups;
            }, [processedData, viewDate]);

            // NOVO: Lógica para incluir e transferir em lote para Novo Instrutor
            const handleOnboardInstructor = (e) => {
                e.preventDefault();
                const cleanName = safeString(newInstData.name).trim();
                if (!cleanName) { showNotify("Digite o nome do instrutor.", "error"); return; }
                
                // Salva a permissão da técnica permanentemente no sistema
                if (newInstData.isTecnica) {
                    const normName = normalizeText(cleanName);
                    if (!tecnicaWhitelist.includes(normName)) {
                        const updatedList = [...tecnicaWhitelist, normName];
                        setTecnicaWhitelist(updatedList);
                        localStorage.setItem('senacWhitelist_v1', JSON.stringify(updatedList));
                    }
                }

                if (newInstData.selectedClasses.length === 0) {
                    showNotify(`Instrutor(a) ${cleanName} habilitado(a) no sistema! (Sem turmas iniciais)`);
                    setIsNewInstModalOpen(false);
                    setNewInstData({ name: '', isTecnica: false, selectedClasses: [] });
                    return; 
                }

                const targetDateObj = new Date(viewDate + 'T00:00:00');
                let changesLog = [];
                
                const newData = data.map(d => {
                    if (newInstData.selectedClasses.includes(d.id)) {
                        let updated = { ...d };
                        const info = getActiveInfoOnDate(updated, targetDateObj);
                        const activeInst = getCanonical(info.inst);
                        
                        if (activeInst) {
                            if (getCanonical(updated.instrutor1) === activeInst) updated.instrutor1 = cleanName;
                            if (getCanonical(updated.instrutor2) === activeInst) updated.instrutor2 = cleanName;
                            if (getCanonical(updated.instrutor3) === activeInst) updated.instrutor3 = cleanName;
                        } else {
                            updated.instrutor1 = cleanName;
                        }
                        changesLog.push(`${updated.id} (${updated.curso}) repassada para ${cleanName}`);
                        return updated;
                    }
                    return d;
                });

                const newLogs = addLog("Onboarding de Instrutor", "Lote", "Múltiplas", changesLog.join(' | '));
                persist(newData, substitutions, newLogs);
                
                showNotify(`Sucesso! ${cleanName} cadastrado(a) assumindo ${newInstData.selectedClasses.length} turma(s)!`);
                setIsNewInstModalOpen(false);
                setNewInstData({ name: '', isTecnica: false, selectedClasses: [] });
            };

         
            const filteredRows = useMemo(() => processedData.filter(row => {
                if (row.status === 'Finalizado') return false;
                
                // Filtros originais
                const matchAnalista = filters.analista === '' || row.analista === filters.analista;
                const matchModalidade = filters.modalidade === '' || row.modalidade === filters.modalidade;
                const matchCurso = filters.curso === '' || row.curso === filters.curso;
                const matchDate = filters.dataTransferencia === '' || row.dataTransferencia === filters.dataTransferencia;
                const matchId = filters.turma === '' || safeString(row.id).includes(filters.turma);
                
                // NOVO: Filtros de Data de Início e Término
                const rowInicio = fmtDate(row.inicio || row.dataInicio);
                const rowFim = fmtDate(row.termino || row.dataFim);
                
                const matchDataInicio = !filters.dataInicio || (rowInicio && rowInicio >= filters.dataInicio);
                const matchDataFim = !filters.dataFim || (rowFim && rowFim <= filters.dataFim);

                // O sistema agora exige que as datas também batam!
                return matchAnalista && matchModalidade && matchCurso && matchDate && matchId && matchDataInicio && matchDataFim;
            }), [processedData, filters]);

            const filteredReportData = useMemo(() => {
                if (reportType === 'logs') return logs;
                if (reportType === 'subs') return substitutions;
                return filteredRows;
            }, [reportType, logs, substitutions, filteredRows]);

            // NOVO: Função para Exportar para Excel com as datas em Dia/Mês/Ano
            const exportClassesToExcel = () => {
                if (!filteredRows || filteredRows.length === 0) {
                    setNotification({ type: 'error', msg: 'Não há turmas para exportar com os filtros atuais.' });
                    setTimeout(() => setNotification(null), 3000);
                    return;
                }

                const dataToExport = filteredRows.map(t => ({
                    "Turma": safeString(t.id),
                    "Curso": safeString(t.curso),
                    "Modalidade": safeString(t.modalidade),
                    "Analista": safeString(t.analista),
                    "Instrutor Principal": safeString(t.instrutorAtual || t.instrutor1),
                    "Data Início": formatDatePTBR(t.inicio || t.dataInicio),
                    "Data Término": formatDatePTBR(t.termino || t.dataFim),
                    "Status": safeString(t.status || 'Ativa')
                }));

                const ws = XLSX.utils.json_to_sheet(dataToExport);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Visao_Gerencial");
                
                const today = new Date();
                const dateStr = `${String(today.getDate()).padStart(2, '0')}-${String(today.getMonth() + 1).padStart(2, '0')}-${today.getFullYear()}`;
                
                XLSX.writeFile(wb, `Relatorio_Turmas_${dateStr}.xlsx`);
                
                setNotification({ type: 'success', msg: 'Excel exportado com sucesso!' });
                setTimeout(() => setNotification(null), 3000);
            };

            const getRankedInstructorOptions = (targetCourse, excludedInstructors = [], slotType = 'any', targetModalidade = 'Aperfeiçoamento', pendingData = [], customPool = null, evaluationDate = null) => {
                const stats = {};
                const isTecnica = targetModalidade === 'Técnica';
                const pool = customPool || uniqueInstrutores;
                
                const normalizedExcludes = (Array.isArray(excludedInstructors) ? excludedInstructors : [excludedInstructors])
                    .filter(Boolean)
                    .map(normalizeText);

                let allowedInstructors = pool.filter(name => !BLOCKED_INSTRUCTORS.includes(normalizeText(name)));
                if (isTecnica) {
                    allowedInstructors = allowedInstructors.filter(name => tecnicaWhitelist.includes(normalizeText(name)));
                }

                allowedInstructors.forEach(name => {
                    if (normalizeText(name).includes('nao atribuido')) return;
                    stats[name] = { nome: name, totalAlunos: 0, totalTurmas: 0, turmasDoCurso: 0, countAsInst1: 0, countAsInst2: 0 };
                });

                const normalizedTarget = normalizeText(targetCourse);
                const allData = [...data, ...pendingData];
                
                const evalDateStr = (evaluationDate && evaluationDate.length === 10) ? evaluationDate : viewDate;
                const targetDateObj = new Date(evalDateStr + 'T00:00:00'); 

                allData.forEach(row => {
                    const i1 = getCanonical(safeString(row.instrutor1));
                    const i2 = getCanonical(safeString(row.instrutor2));
                    if (i1 && stats[i1]) stats[i1].countAsInst1++;
                    if (i2 && stats[i2]) stats[i2].countAsInst2++;

                    const info = getActiveInfoOnDate(row, targetDateObj);
                    
                    if (info.status === 'Finalizado' || info.status === 'Agendado') return; 

                    const activeInst = info.inst;
                    if (activeInst && stats[activeInst]) {
                        stats[activeInst].totalAlunos += parseInt(row.alunos) || 0;
                        stats[activeInst].totalTurmas += 1;
                        if (normalizeText(row.curso) === normalizedTarget && getSafeModalidade(row) === targetModalidade) {
                            stats[activeInst].turmasDoCurso += 1;
                        }
                    }
                });

                return Object.values(stats)
                    .filter(i => !normalizedExcludes.includes(normalizeText(i.nome)))
                    .map(inst => {
                        let score = inst.totalAlunos; 
                        let tip = `[${inst.totalAlunos} Alunos na data]`;
                        let type = "good";
                        let emoji = "✅";
                        let flags = [];
                        
                        const isEquipeTecnica = tecnicaWhitelist.includes(normalizeText(inst.nome));

                        if (inst.turmasDoCurso >= 3) {
                            score += 300; 
                            emoji = "⚠️"; type = "warning";
                            flags.push(`⚠️ Concentração (${inst.turmasDoCurso}x)`);
                        } else if (inst.turmasDoCurso >= 2) {
                            score += 50;
                        } else if (inst.turmasDoCurso === 0) {
                            score -= 30; 
                            flags.push(`⭐ Novo no Curso`);
                        }

                        if (inst.totalAlunos >= 250) {
                            score += 50000; emoji = "🔴"; type = "bad"; 
                            flags.push(`🔴 Carga Máxima (Não Alocar)`);
                        } else if (inst.totalAlunos >= 200) {
                            score += 300; if(emoji === "✅" || emoji === "⭐") emoji = "🟡"; type = "warning"; 
                            flags.push(`🟡 Carga Alta`);
                        }

                        if (inst.totalAlunos < 100) {
                            score -= 1000; 
                            if(emoji === "✅" || emoji === "⭐") emoji = "🚀";
                            flags.push(`🚀 Urgente: Ocioso`);
                        } else if (inst.totalAlunos < 150) {
                            score -= 500;
                            if(emoji === "✅" || emoji === "⭐") emoji = "🚀";
                            flags.push(`🚀 Prioridade de Carga`);
                        }

                        if (isEquipeTecnica) {
                            if (inst.totalAlunos < 200) {
                                score -= 2000; 
                                if(emoji === "✅" || emoji === "⭐" || emoji === "🚀") emoji = "🔥";
                                flags.push(`🔥 Foco Técnica`);
                            } 
                            if (!isTecnica && inst.totalAlunos >= 150) {
                                score += 300;
                                flags.push(`🛡️ Preferência Técnica`);
                            }
                        }

                        const totalRoles = inst.countAsInst1 + inst.countAsInst2;
                        const ratio1 = totalRoles > 0 ? inst.countAsInst1 / totalRoles : 0;
                        if (slotType === 'instrutor1' && inst.countAsInst1 >= 3 && ratio1 > 0.7) {
                            score += 150; 
                            if(emoji !== "🔴" && emoji !== "🟠" && emoji !== "🔥") emoji = "⛔"; 
                            flags.push(`⛔ Equilíbrio P1/P2`);
                        }

                        if (flags.length > 0) tip += " - " + flags.join(" | ");

                        return { ...inst, score, label: `(${inst.totalAlunos} alunos)`, emoji, type, tip };
                    })
                    .sort((a,b) => a.score - b.score);
            };

            const getRankedAnalystOptions = (targetCourse, pendingData = [], customPool = null) => {
                const stats = {};
                const pool = customPool || uniqueAnalistas;
                
                pool.forEach(name => { 
                    if(normalizeText(name).includes('nao atribuido')) return;
                    stats[name] = { nome: name, totalTurmas: 0, turmasDoCurso: 0 }; 
                });
                
                const normalizedTarget = normalizeText(targetCourse);
                const allData = [...data, ...pendingData];
                const targetDateObj = new Date(viewDate + 'T00:00:00'); 

                allData.forEach(row => { 
                    const info = getActiveInfoOnDate(row, targetDateObj);
                    if (info.status === 'Finalizado' || !row.analista) return; 

                    let an = safeString(row.analista);
                    if (!stats[an]) {
                        const normRaw = normalizeText(an);
                        an = Object.keys(stats).find(k => normalizeText(k) === normRaw);
                    }
                    if(an && stats[an]) { 
                        stats[an].totalTurmas += 1; 
                        if(normalizeText(row.curso) === normalizedTarget) { 
                            stats[an].turmasDoCurso += 1; 
                        } 
                    } 
                });
                
                return Object.values(stats).map(an => { 
                    let score = an.totalTurmas; let type = "good"; let emoji = "👤"; let tip = `[Total: ${an.totalTurmas} turmas ativas]`; 
                    if (an.turmasDoCurso >= 2) { score += 1000; type="bad"; emoji="⚠️"; tip += ` - ⚠️ Sobrecarga neste Curso (${an.turmasDoCurso}x)`; 
                    } else if (an.turmasDoCurso === 1) { score += 20; emoji = "🔷"; tip += ` - 🔷 Já possui 1 do Curso`; 
                    } else { score -= 10; type="ideal"; emoji="⭐"; tip += ` - ⭐ Disponível`; } 
                    return { ...an, score, type, emoji, tip }; 
                }).sort((a,b) => a.score - b.score);
            };

            const smartAssignClass = (item, pendingData = [], customInstPool = null, customAnalystPool = null) => {
                let newItem = { ...item };
                let autoAssigned = {}; 
                
                const checkEmpty = (val) => {
                    if (!val) return true;
                    const norm = normalizeText(String(val));
                    return norm === '' || norm === 'nao atribuido' || norm === 'a definir' || norm === '-' || norm === '0' || norm === 'null' || norm === 'undefined';
                };

                const checkAndReplace = (role, currentName, evalDate) => {
                    if (checkEmpty(currentName)) {
                        let excludes = [];
                        if (role === 'instrutor1') excludes = [newItem.instrutor2, newItem.instrutor3];
                        if (role === 'instrutor2') excludes = [newItem.instrutor1, newItem.instrutor3];
                        if (role === 'instrutor3') excludes = [newItem.instrutor1, newItem.instrutor2];

                        let validEvalDate = (evalDate && evalDate.length === 10) ? evalDate : ((newItem.inicio && newItem.inicio.length === 10) ? newItem.inicio : viewDate);

                        const options = getRankedInstructorOptions(newItem.curso, excludes, role, newItem.modalidade, pendingData, customInstPool, validEvalDate);
                        if (options.length > 0) { 
                            newItem[role] = options[0].nome; 
                            autoAssigned[role] = { nome: options[0].nome, reason: `Vaga preenchida (Baseado na carga calculada p/ data: ${formatDatePTBR(validEvalDate)})` }; 
                        }
                    }
                };

                checkAndReplace('instrutor1', newItem.instrutor1, newItem.inicio);
                checkAndReplace('instrutor2', newItem.instrutor2, newItem.dataTransferencia);
                
                if (newItem.modalidade === 'Técnica' || newItem.dataTransferencia2) {
                    checkAndReplace('instrutor3', newItem.instrutor3, newItem.dataTransferencia2);
                }
                
                if (checkEmpty(newItem.analista)) {
                    const aOptions = getRankedAnalystOptions(newItem.curso, pendingData, customAnalystPool);
                    if (aOptions.length > 0) { 
                        newItem.analista = aOptions[0].nome; 
                        autoAssigned['analista'] = { nome: aOptions[0].nome, reason: 'Vaga de Analista preenchida' }; 
                    }
                }
                
                if (Object.keys(autoAssigned).length > 0) {
                    newItem.autoAssignedLogs = autoAssigned;
                }
                
                return { resultItem: newItem, autoAssigned };
            };

            const globalInstructorStats = useMemo(() => {
                const stats = {};
                uniqueInstrutores.forEach(n => { 
                    stats[n] = { nome: n, totalAlunos: 0, totalTurmas: 0, autoAssignedCount: 0, cursos: {}, alerts: [] }; 
                });
              
                data.forEach(row => {
                    if (row.status !== 'Finalizado' && row.autoAssignedLogs) {
                        const assignedNames = Object.values(row.autoAssignedLogs).map(log => getCanonical(typeof log === 'object' ? log.nome : log));
                        assignedNames.forEach(name => { if (stats[name]) stats[name].autoAssignedCount++; });
                    }
                });

                processedData.forEach(row => { 
                    const inst = row.instrutorAtual; 
                    if(stats[inst] && row.status !== 'Finalizado' && row.status !== 'Agendado') { 
                        stats[inst].totalAlunos += parseInt(row.alunos) || 0; 
                        stats[inst].totalTurmas += 1; 
                        const c = row.curso || 'Outros'; 
                        stats[inst].cursos[c] = (stats[inst].cursos[c] || 0) + 1; 
                    } 
                });
              
                Object.values(stats).forEach(st => { 
                    if (BLOCKED_INSTRUCTORS.includes(normalizeText(st.nome))) {
                        st.alerts.push({ msg: `🚫 Bloqueado para novas turmas`, type: 'red' });
                    } else if (st.totalAlunos >= 300) {
                        st.alerts.push({ msg: `Estouro: ${st.totalAlunos} alunos`, type: 'red' });
                    } else if (st.totalAlunos >= 250) {
                        st.alerts.push({ msg: `Sobrecarga: ${st.totalAlunos} alunos`, type: 'orange' }); 
                    }
                    
                    Object.entries(st.cursos).forEach(([curso, qtd]) => { if (qtd > 2) st.alerts.push({ msg: `Concentração: ${qtd}x ${curso}`, type: 'orange' }); }); 
                    if (st.autoAssignedCount > 0) {
                        st.alerts.push({ msg: `🤖 Recebeu ${st.autoAssignedCount} turma(s) via Automação`, type: 'purple' });
                    }
                });
                return stats;
            }, [processedData, data, uniqueInstrutores]);

            const dashboardInstructors = useMemo(() => {
                const aggr = {};
                filteredRows.forEach(row => { 
                    if (row.status === 'Agendado') return;
                    const inst = row.instrutorAtual; 
                    if (!inst || typeof inst !== 'string') return; 
                    
                    if (!aggr[inst]) aggr[inst] = { nome: inst, totalAlunos: 0, totalTurmas: 0, alerts: [], turmasPreview: [] }; 
                    aggr[inst].totalAlunos += parseInt(row.alunos) || 0; 
                    aggr[inst].totalTurmas += 1; 
                    
                    const isAutoAssignedForThisInstructor = row.autoAssignedLogs && Object.values(row.autoAssignedLogs).some(log => getCanonical(typeof log === 'object' ? log.nome : log) === inst);
                    const myLogEntry = row.autoAssignedLogs ? Object.values(row.autoAssignedLogs).find(log => getCanonical(typeof log === 'object' ? log.nome : log) === inst) : null;
                    
                    aggr[inst].turmasPreview.push({ 
                        id: row.id, 
                        curso: row.curso, 
                        modalidade: row.modalidade, 
                        isAuto: isAutoAssignedForThisInstructor,
                        autoReason: myLogEntry && typeof myLogEntry === 'object' ? myLogEntry.reason : null
                    });
                });
                let result = Object.values(aggr);
                if (filters.instrutor) result = result.filter(i => i.nome === filters.instrutor);
                result = result.map(i => { const global = globalInstructorStats[i.nome]; return { ...i, alerts: global ? global.alerts : [] }; });
                return result.sort((a,b) => b.totalAlunos - a.totalAlunos);
            }, [filteredRows, filters.instrutor, globalInstructorStats]);

            const handleFullBackupExport = () => {
                try {
                    const wb = XLSX.utils.book_new();
                    const mappedData = data.map(item => ({
                        "Turma": item.id,
                        "APZ": item.modalidade || getSafeModalidade(item),
                        "Analistas": item.analista,
                        "Alunos": item.alunos,
                        "Início": item.inicio ? new Date(item.inicio).toISOString().split('T')[0] : '',
                        "Término": item.termino ? new Date(item.termino).toISOString().split('T')[0] : '',
                        "Passagem 1": item.dataTransferencia ? new Date(item.dataTransferencia).toISOString().split('T')[0] : '',
                        "Passagem 2": item.dataTransferencia2 ? new Date(item.dataTransferencia2).toISOString().split('T')[0] : '',
                        "Instrutor 1": item.instrutor1,
                        "Instrutor 2": item.instrutor2,
                        "Instrutor 3": item.instrutor3,
                        "Curso": item.curso
                    }));
                    const wsData = XLSX.utils.json_to_sheet(mappedData);
                    XLSX.utils.book_append_sheet(wb, wsData, "Turmas_DB");
                    const wsSubs = XLSX.utils.json_to_sheet(substitutions);
                    XLSX.utils.book_append_sheet(wb, wsSubs, "Subs_DB");
                    const wsLogs = XLSX.utils.json_to_sheet(logs);
                    XLSX.utils.book_append_sheet(wb, wsLogs, "Logs_DB");
                    
                    const now = new Date();
                    const fileName = `SGT_Backup_${now.toISOString().split('T')[0]}_${now.getHours()}h${now.getMinutes()}.xlsx`;
                    XLSX.writeFile(wb, fileName);
                    showNotify("Backup Completo baixado com sucesso!");
                } catch (err) {
                    showNotify("Erro ao gerar backup.", "error");
                }
            };

            const sanitizeName = (val) => {
                if (!val) return '';
                const s = safeString(val).trim();
                if (s.toLowerCase() === 'não atribuido' || s.toLowerCase() === 'nao atribuido' || s === '-' || s === '0') return '';
                return s;
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const wb = XLSX.read(evt.target.result, { type: 'array', cellDates: true });
                        
                        if (wb.SheetNames.includes("Turmas_DB") || wb.SheetNames.includes("Subs_DB")) {
                            let importedClasses = 0; let importedSubs = 0;
                            let newDB = [...data];
                            let newSubsDB = [...substitutions];
                            let newLogsDB = [...logs];

                            if (wb.SheetNames.includes("Turmas_DB")) { 
                                const ws = wb.Sheets["Turmas_DB"]; 
                                const jsonData = XLSX.utils.sheet_to_json(ws); 
                                newDB = jsonData.map(row => ({
                                    id: safeString(row['Turma'] || row['id']),
                                    modalidade: safeString(row['APZ'] || row['modalidade'] || 'Aperfeiçoamento'),
                                    curso: safeString(row['Curso'] || row['curso'] || 'Administrativo'),
                                    analista: safeString(row['Analistas'] || row['analista']),
                                    alunos: parseInt(row['Alunos'] || row['alunos']) || 0,
                                    inicio: fmtDate(row['Início'] || row['inicio']),
                                    termino: fmtDate(row['Término'] || row['termino']),
                                    dataTransferencia: fmtDate(row['Passagem 1'] || row['dataTransferencia']),
                                    dataTransferencia2: fmtDate(row['Passagem 2'] || row['dataTransferencia2']),
                                    instrutor1: safeString(row['Instrutor 1'] || row['instrutor1']),
                                    instrutor2: safeString(row['Instrutor 2'] || row['instrutor2']),
                                    instrutor3: safeString(row['Instrutor 3'] || row['instrutor3'])
                                }));
                                importedClasses = newDB.length; 
                            }
                            if (wb.SheetNames.includes("Subs_DB")) { 
                                const ws = wb.Sheets["Subs_DB"]; 
                                newSubsDB = XLSX.utils.sheet_to_json(ws); 
                                importedSubs = newSubsDB.length; 
                            }
                            if (wb.SheetNames.includes("Logs_DB")) { 
                                const ws = wb.Sheets["Logs_DB"]; 
                                newLogsDB = XLSX.utils.sheet_to_json(ws); 
                            }
                            
                            persist(newDB, newSubsDB, newLogsDB);
                            showNotify(`Sincronização Completa! Turmas: ${importedClasses}, Subs: ${importedSubs}.`);
                            return;
                        }

                        if (confirm("Deseja realizar a Importação Inteligente? O sistema irá varrer a planilha e preencher apenas as vagas em BRANCO, mantendo 100% dos dados preenchidos inalterados.")) {
                            const ws = wb.Sheets[wb.SheetNames[0]];
                            let jsonData = XLSX.utils.sheet_to_json(ws, { header: 1 });
                            let headIdx = -1;
                            
                            for(let r=0; r<20; r++) { 
                                const row = (jsonData[r] || []).map(c => normalizeText(safeString(c))); 
                                if(row.some(c => c.includes('turma') || c.includes('apz'))) { headIdx = r; break; } 
                            }
                            if (headIdx === -1) { showNotify("Cabeçalho não encontrado.", "error"); return; }
                            
                            let map = { id: -1, apz: -1, analista: -1, alunos: -1, inicio: -1, termino: -1, p1: -1, p2: -1, i1: -1, i2: -1, i3: -1, curso: -1 };
                            const headRow = jsonData[headIdx].map(c => normalizeText(safeString(c)));
                            
                            headRow.forEach((val, i) => { 
                                if(val === 'turma' || val === 'id' || val.includes('turma')) map.id = i; 
                                else if(val === 'apz' || val === 'modalidade' || val.includes('apz')) map.apz = i; 
                                else if(val === 'curso' || val === 'cursos' || val.includes('curso')) map.curso = i; 
                                else if(val.includes('analista')) map.analista = i; 
                                else if(val.includes('aluno')) map.alunos = i; 
                                else if(val.includes('inicio') || val.includes('início')) map.inicio = i; 
                                else if(val.includes('termino') || val.includes('término')) map.termino = i; 
                                else if(val.includes('passagem 1') || val.includes('transf 1') || val === 'passagem1') map.p1 = i; 
                                else if(val.includes('passagem 2') || val.includes('transf 2') || val === 'passagem2') map.p2 = i; 
                                else if(val.includes('instrutor 1') || val === 'instrutor1') map.i1 = i; 
                                else if(val.includes('instrutor 2') || val === 'instrutor2') map.i2 = i; 
                                else if(val.includes('instrutor 3') || val === 'instrutor3') map.i3 = i; 
                            });

                            const incomingNamesRaw = new Set();
                            const incomingAnalystsRaw = new Set();
                            for(let i = headIdx + 1; i < jsonData.length; i++) {
                                const row = jsonData[i];
                                if(row && row[map.id]) {
                                    if(map.i1 !== -1) { const n = sanitizeName(row[map.i1]); if(n) incomingNamesRaw.add(n); }
                                    if(map.i2 !== -1) { const n = sanitizeName(row[map.i2]); if(n) incomingNamesRaw.add(n); }
                                    if(map.i3 !== -1) { const n = sanitizeName(row[map.i3]); if(n) incomingNamesRaw.add(n); }
                                    if(map.analista !== -1) { const n = sanitizeName(row[map.analista]); if(n) incomingAnalystsRaw.add(n); }
                                }
                            }

                            const combinedInsts = [...new Set([...uniqueInstrutores, ...Array.from(incomingNamesRaw)])].filter(Boolean);
                            const combinedAnalysts = [...new Set([...uniqueAnalistas, ...Array.from(incomingAnalystsRaw)])].filter(Boolean);
                            
                            const newRows = []; 
                            const batchSummary = []; 

                            for(let i = headIdx + 1; i < jsonData.length; i++) { 
                                const row = jsonData[i]; 
                                if(row && row[map.id]) { 
                                    const apzStr = map.apz !== -1 ? safeString(row[map.apz]) : '';
                                    const derivedModalidade = (apzStr.toLowerCase().includes('tecnica') || apzStr.toLowerCase().includes('técnica')) ? 'Técnica' : 'Aperfeiçoamento';
                                    
                                    let item = { 
                                        id: safeString(row[map.id]), 
                                        modalidade: derivedModalidade, 
                                        curso: map.curso !== -1 ? safeString(row[map.curso]) : 'Administrativo', 
                                        analista: map.analista !== -1 ? sanitizeName(row[map.analista]) : '', 
                                        alunos: parseInt(row[map.alunos]) || 0, 
                                        inicio: fmtDate(row[map.inicio]), 
                                        termino: fmtDate(row[map.termino]), 
                                        dataTransferencia: fmtDate(row[map.p1]), 
                                        dataTransferencia2: fmtDate(row[map.p2]), 
                                        instrutor1: map.i1 !== -1 ? sanitizeName(row[map.i1]) : '', 
                                        instrutor2: map.i2 !== -1 ? sanitizeName(row[map.i2]) : '',
                                        instrutor3: map.i3 !== -1 ? sanitizeName(row[map.i3]) : '' 
                                    };
                                    
                                    const { resultItem, autoAssigned } = smartAssignClass(item, newRows, combinedInsts, combinedAnalysts);
                                    if (Object.keys(autoAssigned).length > 0) {
                                        batchSummary.push({ turmaId: resultItem.id, curso: resultItem.curso, modalidade: resultItem.modalidade, changes: autoAssigned });
                                    }
                                    newRows.push(resultItem); 
                                } 
                            }
                            
                            if(newRows.length > 0) { 
                                const dataMap = new Map();
                                data.forEach(d => dataMap.set(String(d.id), d));
                                
                                let newOrUpdatedCount = 0;
                                newRows.forEach(row => {
                                    dataMap.set(String(row.id), row);
                                    newOrUpdatedCount++;
                                });
                                
                                const mergedData = Array.from(dataMap.values());
                                const newLogs = addLog("Importação", "Lote", "Inteligente", `${newOrUpdatedCount} turmas criadas ou atualizadas.`);
                                
                                persist(mergedData, substitutions, newLogs);
                                
                                if (batchSummary.length > 0) {
                                    setImportSummaryModal(batchSummary); 
                                } else {
                                    showNotify(`Sucesso! ${newOrUpdatedCount} turmas importadas da planilha sem nenhuma vaga em branco.`); 
                                }
                            }
                        }
                    } catch (err) { showNotify("Erro ao ler arquivo. Verifique se é um Excel válido.", "error"); }
                };
                reader.readAsArrayBuffer(file); e.target.value = null;
            };

            const handleCreateClass = (e) => { 
                e.preventDefault(); 
                const { resultItem, autoAssigned } = smartAssignClass({ ...newClass, alunos: parseInt(newClass.alunos)||0 });
                const newLogs = addLog("Criação", resultItem.id, "Inexistente", `Criada: ${resultItem.curso} (${resultItem.alunos} alunos) [${resultItem.modalidade}]`);
                
                const existingIdx = data.findIndex(d => String(d.id) === String(resultItem.id));
                let newData = [...data];
                if (existingIdx >= 0) {
                    newData[existingIdx] = resultItem;
                } else {
                    newData.push(resultItem);
                }

                persist(newData, substitutions, newLogs); 
                setIsFormOpen(false); 
                setNewClass({ id: '', modalidade: 'Aperfeiçoamento', curso: 'Administrativo', analista: '', alunos: '', inicio: '', termino: '', instrutor1: '', instrutor2: '', instrutor3: '', dataTransferencia: '', dataTransferencia2: '' }); 
                
                if (Object.keys(autoAssigned).length > 0) {
                    setImportSummaryModal([{ turmaId: resultItem.id, curso: resultItem.curso, modalidade: resultItem.modalidade, changes: autoAssigned }]);
                } else {
                    showNotify("Turma salva com sucesso!");
                }
            };
            
            const handleCreateSub = (e) => { 
                e.preventDefault(); 
                if (newSub.isDefinitive) {
                    const newData = data.map(d => {
                        if (String(d.id) === String(newSub.turmaId)) {
                            const updated = { ...d };
                            if (updated.instrutor1 === newSub.instrutorAusente) updated.instrutor1 = newSub.instrutorSubstituto;
                            if (updated.instrutor2 === newSub.instrutorAusente) updated.instrutor2 = newSub.instrutorSubstituto;
                            if (updated.instrutor3 === newSub.instrutorAusente) updated.instrutor3 = newSub.instrutorSubstituto;
                            return updated;
                        }
                        return d;
                    });
                    const newLogs = addLog("Transferência Definitiva", newSub.turmaId, newSub.instrutorAusente, newSub.instrutorSubstituto);
                    persist(newData, substitutions, newLogs);
                    showNotify(`Transferência Definitiva realizada com sucesso!`);
                } else {
                    persist(data, [...substitutions, { ...newSub, id: Date.now() }], logs); 
                    showNotify(`Cobertura Temporária registrada com sucesso!`);
                }
                setIsSubModalOpen(false); 
                setNewSub({ isDefinitive: false, dataInicio: '', dataFim: '', turmaId: '', instrutorAusente: '', instrutorSubstituto: '', motivo: '' }); 
            };
            
            const ClassChain = ({ cls, currentInst }) => {
                const cInst = getCanonical(currentInst);
                const isTecnica = cls.modalidade === 'Técnica';
                
                return (
                    <div className="mt-2 pt-2 border-t border-slate-100 flex flex-col gap-1 w-full bg-slate-50 p-2 rounded-lg">
                        <span className="text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-1">Cadeia Docente:</span>
                        <div className="flex items-center flex-wrap gap-x-1 gap-y-1 text-[10px] font-bold">
                            <span className={`px-1.5 py-0.5 rounded border ${getCanonical(cls.instrutor1) === cInst ? 'bg-blue-600 text-white border-blue-700' : 'bg-white text-slate-600 border-slate-300'}`} title="Instrutor 1 (Início)">
                                {cls.instrutor1 || 'A Definir'}
                            </span>
                            
                            <span className="text-slate-300 text-[8px] font-black">➔</span>
                            <span className={`px-1.5 py-0.5 rounded border flex flex-col items-center ${getCanonical(cls.instrutor2) === cInst ? 'bg-green-600 text-white border-green-700 shadow' : 'bg-white text-slate-600 border-slate-300'}`} title="Instrutor 2 (Passagem 1)">
                                {cls.instrutor2 || 'A Definir'}
                            </span>
                            
                            {(isTecnica || cls.instrutor3) && (
                                <>
                                    <span className="text-slate-300 text-[8px] font-black">➔</span>
                                    <span className={`px-1.5 py-0.5 rounded border flex flex-col items-center ${getCanonical(cls.instrutor3) === cInst ? 'bg-purple-600 text-white border-purple-700 shadow' : 'bg-white text-slate-600 border-slate-300'}`} title="Instrutor 3 (Passagem 2)">
                                        {cls.instrutor3 || 'A Definir'}
                                    </span>
                                </>
                            )}
                        </div>
                    </div>
                )
            };

            const getOrganizedInstructorData = (instructorName) => {
                const fullProfile = globalInstructorStats[instructorName];
                if (!fullProfile) return null;

                const allInvolvedClasses = data.filter(d => getCanonical(d.instrutor1) === instructorName || getCanonical(d.instrutor2) === instructorName || getCanonical(d.instrutor3) === instructorName); 
                const target = new Date(viewDate + 'T00:00:00');
                const activeClasses = []; const incomingClasses = []; const outgoingClasses = []; const historyClasses = []; const futureClasses = [];
              
                const monthlyData = [];
                for (let i = 0; i < 6; i++) {
                    const monthDate = new Date(target.getFullYear(), target.getMonth() + i, 1);
                    const monthEnd = new Date(target.getFullYear(), target.getMonth() + i + 1, 0);
                    const monthLabel = monthDate.toLocaleDateString('pt-BR', { month: 'short', year: '2-digit' });
                    let studentsInMonth = 0;

                    allInvolvedClasses.forEach(cls => {
                        const start = new Date(cls.inicio + 'T00:00:00');
                        const end = new Date(cls.termino + 'T00:00:00');
                        
                        let events = [ { date: start, inst: getCanonical(cls.instrutor1) } ];
                        if (cls.dataTransferencia && cls.instrutor2) events.push({ date: new Date(cls.dataTransferencia + 'T00:00:00'), inst: getCanonical(cls.instrutor2) });
                        if (cls.dataTransferencia2 && cls.instrutor3) events.push({ date: new Date(cls.dataTransferencia2 + 'T00:00:00'), inst: getCanonical(cls.instrutor3) });
                        events.sort((a,b) => a.date - b.date);
                        events.push({ date: end, inst: null });
                        
                        for (let j = 0; j < events.length - 1; j++) {
                            if (events[j].inst === instructorName) {
                                let instStart = events[j].date;
                                let instEnd = events[j+1].date;
                                if (instStart <= monthEnd && instEnd >= monthDate) {
                                    studentsInMonth += parseInt(cls.alunos) || 0;
                                }
                            }
                        }
                    });
                    monthlyData.push({ month: monthLabel, alunos: studentsInMonth });
                }

                allInvolvedClasses.forEach(cls => {
                    const start = new Date(cls.inicio + 'T00:00:00'); 
                    const end = new Date(cls.termino + 'T00:00:00'); 
                    
                    let d1 = cls.dataTransferencia && cls.dataTransferencia.length === 10 ? new Date(cls.dataTransferencia + 'T00:00:00') : null;
                    let d2 = cls.dataTransferencia2 && cls.dataTransferencia2.length === 10 ? new Date(cls.dataTransferencia2 + 'T00:00:00') : null;
                    
                    let isInst1 = getCanonical(cls.instrutor1) === instructorName;
                    let isInst2 = getCanonical(cls.instrutor2) === instructorName;
                    let isInst3 = getCanonical(cls.instrutor3) === instructorName;

                    let transfDate = d1; let transfDate2 = d2;
                    let instA = cls.instrutor2; let instB = cls.instrutor3;
                    let rawDate1 = cls.dataTransferencia; let rawDate2 = cls.dataTransferencia2;
                    let tagA = 'P1'; let tagB = 'P2';

                    if (d1 && d2 && d2 < d1) {
                        transfDate = d2; transfDate2 = d1;
                        instA = cls.instrutor3; instB = cls.instrutor2;
                        rawDate1 = cls.dataTransferencia2; rawDate2 = cls.dataTransferencia;
                        tagA = 'P2'; tagB = 'P1';
                        let temp2 = isInst2; isInst2 = isInst3; isInst3 = temp2;
                    }

                    if (target < start) {
                        if (isInst1 || isInst2 || isInst3) { 
                            let prev = isInst1 ? "Titular (Início)" : (isInst2 ? `Receberá ${tagA}` : `Receberá ${tagB}`);
                            futureClasses.push({...cls, statusDetail: `Agendada (${prev})`}); 
                        }
                        return;
                    }

                    if (target > end) { historyClasses.push({...cls, statusDetail: 'Finalizada'}); return; }
                    
                    if (isInst1) {
                         if (transfDate && target > transfDate) { historyClasses.push({...cls, statusDetail: `Repassado (${tagA})`});
                         } else { activeClasses.push({...cls, statusDetail: transfDate ? 'Titular (A Transf.)' : 'Titular'}); if (transfDate) outgoingClasses.push({...cls, transferNote: `Passará para ${instA} em ${formatDatePTBR(rawDate1)}`}); }
                    } else if (isInst2) {
                        if (transfDate) {
                            if (target < transfDate) { incomingClasses.push({...cls, transferNote: `Receberá de ${cls.instrutor1} em ${formatDatePTBR(rawDate1)}`});
                            } else if (transfDate2 && target > transfDate2) { historyClasses.push({...cls, statusDetail: `Repassado (${tagB})`});
                            } else { activeClasses.push({...cls, statusDetail: transfDate2 ? 'Sucessor 1 (A Transf.)' : 'Sucessor'}); if (transfDate2) outgoingClasses.push({...cls, transferNote: `Passará para ${instB} em ${formatDatePTBR(rawDate2)}`}); }
                        }
                    } else if (isInst3) {
                         if (transfDate2) {
                             if (target < transfDate2) { incomingClasses.push({...cls, transferNote: `Receberá de ${instA} em ${formatDatePTBR(rawDate2)}`});
                             } else { activeClasses.push({...cls, statusDetail: 'Sucessor Final'}); }
                         }
                    }
                });

                substitutions.forEach(sub => {
                    if (getCanonical(sub.instrutorSubstituto) === instructorName) {
                        const subStart = new Date(sub.dataInicio + 'T00:00:00'); const subEnd = new Date(sub.dataFim + 'T00:00:00');
                        if (target >= subStart && target <= subEnd) {
                            const originalClass = data.find(d => String(d.id) === String(sub.turmaId));
                            if (originalClass) {
                                activeClasses.push({ ...originalClass, isSubstitution: true, subDataInicio: sub.dataInicio, subDataFim: sub.dataFim, statusDetail: `🔄 Cobrindo ${sub.instrutorAusente} até ${formatDatePTBR(sub.dataFim)}`, obs: sub.motivo });
                            }
                        }
                    }
                });
              
                activeClasses.sort((a,b) => new Date(a.inicio) - new Date(b.inicio)); 
                return { ...fullProfile, monthlyData, organized: { activeClasses, incomingClasses, outgoingClasses, historyClasses, futureClasses } };
            };

            const openInstructorModal = (instPartial) => { const detailed = getOrganizedInstructorData(instPartial.nome); if (detailed) { setSelectedInstructorDetail(detailed); } };

            const handleOpenTransferModal = (turmaObj) => {
                setNewSub({ ...newSub, isDefinitive: false, turmaId: String(turmaObj.id), instrutorAusente: selectedInstructorDetail.nome });
                setIsSubModalOpen(true);
                setSelectedInstructorDetail(null); 
            };
            
            const handleCopyImportSummary = () => {
                if (!importSummaryModal) return;
                
                let txt = "RELATÓRIO DE PREENCHIMENTO ATIVO - S.G.T\n";
                txt += "===========================================\n\n";
                
                importSummaryModal.forEach(item => {
                    txt += `Turma: ${item.turmaId}\n`;
                    txt += `Curso: ${item.curso} (${item.modalidade})\n`;
                    txt += `Intervenções em Vagas Abertas:\n`;
                    Object.entries(item.changes).forEach(([role, log]) => {
                        const nome = typeof log === 'object' ? log.nome : log;
                        const reason = typeof log === 'object' ? log.reason : 'Vaga preenchida';
                        txt += `  - ${role.replace('instrutor', 'Instrutor ')}: ${nome}\n    Motivo: ${reason}\n`;
                    });
                    txt += `-------------------------------------------\n`;
                });
                
                const textArea = document.createElement("textarea");
                textArea.value = txt;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    showNotify("Relatório da IA copiado para a área de transferência!");
                } catch (err) {
                    showNotify("Erro ao copiar o texto.", "error");
                }
                document.body.removeChild(textArea);
            };

            const handleCopyEmail = (instructor, period) => {
                if (!instructor || !instructor.organized) return;
