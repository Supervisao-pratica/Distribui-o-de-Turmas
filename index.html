                                                        className="text-xs bg-green-50 text-green-700 border border-green-200 px-2 py-1 rounded hover:bg-green-100 transition flex items-center gap-1"
                                                    >
                                                        {rec.nome} ({rec.totalAlunos} alunos)
                                                    </button>
                                                ))}
                                            </div>
                                        )}
                                    </div>

                                    {/* INSTRUTOR 2 COM SUGESTÕES */}
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">Instrutor 2 (Opcional)</label>
                                        <input 
                                            type="text" 
                                            list="all-instructors" 
                                            className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500" 
                                            value={newClass.instrutor2} 
                                            onChange={e => setNewClass({...newClass, instrutor2: e.target.value})} 
                                            placeholder="Digite ou selecione..." 
                                        />

                                        {modalSuggestions.i2.length > 0 && (
                                            <div className="mt-2 flex flex-wrap gap-2">
                                                <span className="text-xs font-bold text-gray-500 w-full flex items-center gap-1"><Icons.Bulb /> Perspectiva (Disponíveis):</span>
                                                {modalSuggestions.i2.filter(r => r.nome !== newClass.instrutor1).map(rec => (
                                                    <button 
                                                        key={rec.nome}
                                                        type="button"
                                                        onClick={() => setNewClass(prev => ({ ...prev, instrutor2: rec.nome }))}
                                                        className="text-xs bg-blue-50 text-blue-700 border border-blue-200 px-2 py-1 rounded hover:bg-blue-100 transition flex items-center gap-1"
                                                    >
                                                        {rec.nome}
                                                    </button>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                    
                                    {/* LISTA DE TODOS OS INSTRUTORES PARA O DATALIST */}
                                    <datalist id="all-instructors">
                                        {uniqueInstrutores.map(inst => <option key={inst} value={inst} />)}
                                    </datalist>

                                    <div className="md:col-span-2 pt-4 flex gap-3">
                                        <button type="button" onClick={() => setIsFormOpen(false)} className="flex-1 py-3 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300 font-bold">Cancelar</button>
                                        <button type="submit" className="flex-1 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-bold shadow-lg">Salvar Turma</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
                </ErrorBoundary>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
