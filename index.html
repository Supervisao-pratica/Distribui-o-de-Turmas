<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Senac Portão - Gestão Completa</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- VERSÕES ESTÁVEIS (React, Recharts, SheetJS) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .alert-pulse { animation: pulse-border 2s infinite; }
        @keyframes pulse-border { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .clickable-badge:hover { transform: scale(1.05); cursor: pointer; }
        .transition-card { transition: all 0.3s ease; }
        .transition-card:hover { transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, Component } = React;
        
        // --- ERROR BOUNDARY ---
        class ErrorBoundary extends Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            componentDidCatch(error, errorInfo) {
                console.error("Erro no Dashboard:", error, errorInfo);
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen flex items-center justify-center bg-red-50 p-4">
                            <div className="bg-white p-8 rounded-xl shadow-xl max-w-lg text-center">
                                <h1 className="text-2xl font-bold text-red-600 mb-4">Ops! Algo deu errado.</h1>
                                <p className="text-gray-600 mb-4">Ocorreu um erro ao processar os dados.</p>
                                <button onClick={() => window.location.reload()} className="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700">
                                    Recarregar Página
                                </button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // --- ÍCONES ---
        const Icons = {
            Users: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>,
            BookOpen: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>,
            Upload: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>,
            Download: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>,
            Alert: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>,
            Plus: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4" /></svg>,
            Filter: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" /></svg>,
            Switch: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" /></svg>,
            Calendar: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
            Search: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>,
            Check: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7" /></svg>,
            Clock: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
            Bulb: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" /></svg>,
            ArrowRight: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>,
            Refresh: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
        };

        const MOCK_DATA = [
            { id: '202500029', curso: 'Administrativo', analista: 'Bianca', alunos: 31, inicio: '2025-02-17', termino: '2026-02-11', instrutor1: 'Sheila', instrutor2: 'Bruna', dataTransferencia: '2026-02-04' },
            { id: '202500118', curso: 'Administrativo', analista: 'Bianca', alunos: 31, inicio: '2025-02-17', termino: '2026-02-11', instrutor1: 'Bruna', instrutor2: 'Jaqueline', dataTransferencia: '2026-02-04' },
            { id: '202501228', curso: 'Supermercado', analista: 'Bianca', alunos: 28, inicio: '2025-12-02', termino: '2026-12-01', instrutor1: 'Luciano', instrutor2: 'Claire', dataTransferencia: '2026-02-04' }
        ];

        const COURSE_OPTIONS = [
            'Administrativo',
            'Administrativo - Aprendizagem Técnica',
            'Vendas',
            'Supermercado',
            'Logística',
            'Informática',
            'Outro'
        ];

        // --- COMPONENTE PRINCIPAL ---
        function App() {
            const [data, setData] = useState(MOCK_DATA);
            const [substitutions, setSubstitutions] = useState([]); 
            const [filters, setFilters] = useState({ instrutor: '', analista: '', curso: '', turma: '' });
            
            const [activeTab, setActiveTab] = useState('dashboard'); 
            const [isFormOpen, setIsFormOpen] = useState(false);
            const [isSubModalOpen, setIsSubModalOpen] = useState(false);
            
            const [redistributionData, setRedistributionData] = useState(null);
            const [isRedistributionModalOpen, setIsRedistributionModalOpen] = useState(false);

            const [newClass, setNewClass] = useState({
                id: '', curso: '', analista: '', alunos: '', inicio: '', termino: '', instrutor1: '', instrutor2: '', dataTransferencia: ''
            });
            const [newSub, setNewSub] = useState({
                data: '', turmaId: '', instrutorAusente: '', instrutorSubstituto: '', motivo: '', status: 'Pendente'
            });
            
            const [simData, setSimData] = useState({ curso: 'Administrativo', alunos: 30 });
            const [recommendations, setRecommendations] = useState(null);
            const [urgentSubs, setUrgentSubs] = useState([]);

            const fileInputRef = useRef(null);

            // --- 1. LÓGICA DE DADOS SEGUROS ---
            const safeDate = (val) => {
                if (!val) return '';
                if (val instanceof Date) return val.toISOString().split('T')[0];
                const str = String(val).trim();
                if (str.length < 8) return ''; 
                // Tenta formato DD/MM/YYYY
                if (str.match(/^\d{2}\/\d{2}\/\d{4}$/)) { const [dd,mm,yyyy] = str.split('/'); return `${yyyy}-${mm}-${dd}`; }
                // Tenta formato YYYY-MM-DD
                if (str.match(/^\d{4}-\d{2}-\d{2}$/)) return str;
                // Excel serial date (se vier como número)
                if (!isNaN(str) && Number(str) > 20000) {
                     // Lógica aproximada para serial do Excel
                     const excelEpoch = new Date(1899, 11, 30);
                     const date = new Date(excelEpoch.getTime() + Number(str) * 86400000);
                     return date.toISOString().split('T')[0];
                }
                return '';
            };
            
            const safeString = (val) => {
                if (val === null || val === undefined) return '';
                if (val instanceof Date) return val.toLocaleDateString('pt-BR');
                if (typeof val === 'object') return JSON.stringify(val); 
                return String(val).trim();
            };
            
            // Função para converter data ISO (YYYY-MM-DD) para PT-BR (DD/MM/AAAA)
            const formatDatePTBR = (isoDate) => {
                if (!isoDate) return '';
                const parts = isoDate.split('-');
                if (parts.length === 3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
                return isoDate;
            };

            const processedData = useMemo(() => {
                const today = new Date();
                today.setHours(0,0,0,0);

                return data.map(row => {
                    if (!row) return null;
                    let currentInstructor = row.instrutor1;
                    let status = 'Ativo';
                    let isFinished = false;

                    try {
                        if (row.termino) {
                            const terminoDate = new Date(row.termino + 'T00:00:00');
                            // AJUSTE: Se hoje > término, status Finalizado
                            if (!isNaN(terminoDate.getTime()) && today > terminoDate) {
                                status = 'Finalizado'; 
                                isFinished = true;
                            }
                        }
                        if (!isFinished && row.instrutor2 && row.dataTransferencia) {
                            const transferDate = new Date(row.dataTransferencia + 'T00:00:00'); 
                            if (!isNaN(transferDate.getTime())) {
                                if (today >= transferDate) {
                                    currentInstructor = row.instrutor2;
                                    status = 'Transferido';
                                }
                            }
                        }
                    } catch(e) { }

                    if (!currentInstructor || String(currentInstructor).trim() === '') currentInstructor = 'Não Atribuído';
                    return { ...row, instrutorAtual: currentInstructor, status, isFinished };
                }).filter(Boolean);
            }, [data]);

            // --- LÓGICA DE BALANCEAMENTO REVISADA ---
            const getRecommendationsFor = (course, excludeName) => {
                let totalTurmasCurso = 0;
                let instrutoresDoCurso = 0;
                const stats = {};
                
                processedData.forEach(row => {
                    if (row.isFinished || row.instrutorAtual === 'Não Atribuído') return;
                    const inst = row.instrutorAtual;
                    
                    if (!stats[inst]) stats[inst] = { nome: inst, totalAlunos: 0, totalTurmas: 0, cursos: {} };
                    
                    const qtdAlunos = parseInt(row.alunos) || 0;
                    stats[inst].totalAlunos += qtdAlunos;
                    stats[inst].totalTurmas += 1;
                    const c = row.curso || 'Outros';
                    stats[inst].cursos[c] = (stats[inst].cursos[c] || 0) + 1;
                });
                
                const allInstructors = Object.values(stats);
                allInstructors.forEach(inst => {
                    if (inst.cursos[course] > 0) {
                        totalTurmasCurso += inst.cursos[course];
                        instrutoresDoCurso++;
                    }
                });
                
                const mediaTurmasCurso = instrutoresDoCurso > 0 ? (totalTurmasCurso / instrutoresDoCurso) : 0;

                return allInstructors
                    .map(inst => {
                        const turmasDesteCurso = inst.cursos[course] || 0;
                        const cargaTotalAlunos = inst.totalAlunos;
                        const totalTurmasGeral = inst.totalTurmas;

                        let score = 1000 - cargaTotalAlunos; 
                        const diferencaMedia = turmasDesteCurso - mediaTurmasCurso;
                        score -= (diferencaMedia * 150); 
                        score -= (totalTurmasGeral * 50);

                        return {
                            ...inst,
                            score,
                            turmasDesteCurso,
                            cargaTotalAlunos
                        };
                    })
                    .sort((a, b) => b.score - a.score);
            };

            const assignInstructor2 = (turmaId, instructorName) => {
                const newData = data.map(row => {
                    if (row.id === turmaId) {
                        return { ...row, instrutor2: instructorName };
                    }
                    return row;
                });
                setData(newData);
            };

            const applyRedistribution = (candidate) => {
                const { instructor, course } = redistributionData;
                const newData = data.map(row => {
                    const isTargetClass = (row.instrutor1 === instructor) && (row.curso === course);
                    if (isTargetClass) {
                        return { ...row, instrutor1: candidate.nome };
                    }
                    return row;
                });
                setData(newData);
                setIsRedistributionModalOpen(false);
                alert(`Sucesso! Turmas de ${course} transferidas de ${instructor} para ${candidate.nome}.`);
            };

            const getNextWorkingDay = (dateString) => {
                if (!dateString) return '';
                try {
                    const date = new Date(dateString + 'T00:00:00');
                    date.setDate(date.getDate() + 1); 
                    return date.toLocaleDateString('pt-BR');
                } catch (e) { return ''; }
            };

            // --- LISTAS ÚNICAS ---
            const uniqueInstrutores = useMemo(() => {
                const set = new Set();
                processedData.forEach(d => { if (d.instrutor1) set.add(d.instrutor1); if (d.instrutor2) set.add(d.instrutor2); });
                return Array.from(set).filter(d => d !== 'Não Atribuído').sort();
            }, [processedData]);

            const uniqueAnalistas = useMemo(() => {
                return [...new Set(processedData.map(d => d.analista))].filter(Boolean).sort();
            }, [processedData]);

            const uniqueCursos = useMemo(() => {
                return [...new Set(processedData.map(d => d.curso))].filter(Boolean).sort();
            }, [processedData]);

            const uniqueTurmas = useMemo(() => {
                return processedData.map(d => d.id).sort();
            }, [processedData]);

            const filteredData = useMemo(() => {
                return processedData.filter(row => {
                    const iName = row.instrutorAtual || '';
                    const aName = row.analista || '';
                    const cName = row.curso || '';
                    const tId = row.id || '';
                    
                    const matchInstrutor = filters.instrutor === '' || iName === filters.instrutor;
                    const matchAnalista = filters.analista === '' || aName === filters.analista;
                    const matchCurso = filters.curso === '' || cName === filters.curso;
                    const matchTurma = filters.turma === '' || tId === filters.turma;

                    return matchInstrutor && matchAnalista && matchCurso && matchTurma;
                });
            }, [processedData, filters]);

            const selectedClassDetail = useMemo(() => {
                if (!filters.turma) return null;
                return processedData.find(d => d.id === filters.turma);
            }, [filters.turma, processedData]);

            const instructorStats = useMemo(() => {
                const stats = {};
                processedData.forEach(row => {
                    if (row.isFinished || row.instrutorAtual === 'Não Atribuído') return;
                    
                    const inst = row.instrutorAtual;
                    
                    if (!stats[inst]) stats[inst] = { nome: inst, totalAlunos: 0, totalTurmas: 0, analistas: new Set(), cursos: {}, myClasses: [] };
                    
                    const qtdAlunos = parseInt(row.alunos);
                    stats[inst].totalAlunos += isNaN(qtdAlunos) ? 0 : qtdAlunos;
                    stats[inst].totalTurmas += 1;
                    
                    if (row.analista) stats[inst].analistas.add(row.analista);
                    const curso = row.curso || 'Outros';
                    stats[inst].cursos[curso] = (stats[inst].cursos[curso] || 0) + 1;
                });

                // AJUSTE: Usar processedData aqui para garantir que temos o status 'isFinished'
                processedData.forEach(row => {
                    if (row.instrutor1 && stats[row.instrutor1]) {
                        stats[row.instrutor1].myClasses.push(row);
                    }
                });

                const allStats = Object.values(stats);
                const count = allStats.length || 1;
                const avgAlunos = allStats.reduce((acc, i) => acc + i.totalAlunos, 0) / count;
                const avgTurmas = allStats.reduce((acc, i) => acc + i.totalTurmas, 0) / count;

                return allStats.map(inst => {
                    const overloadAlunos = inst.totalAlunos > avgAlunos * 1.3;
                    const overloadTurmas = inst.totalTurmas > avgTurmas * 1.3;
                    let dominantCourse = 'Outro';
                    let maxCount = 0;
                    Object.entries(inst.cursos).forEach(([c, q]) => {
                        if(q > maxCount) { maxCount = q; dominantCourse = c; }
                    });

                    return {
                        ...inst,
                        dominantCourse,
                        analistas: Array.from(inst.analistas).join(', '),
                        alert: overloadAlunos || overloadTurmas,
                        alertType: overloadAlunos && overloadTurmas ? 'Crítico' : (overloadAlunos ? 'Alunos' : (overloadTurmas ? 'Turmas' : null))
                    };
                }).sort((a,b) => b.totalAlunos - a.totalAlunos);
            }, [processedData, data]);

            // --- Handlers ---
            const handleRedistributeClick = (instructor) => {
                const course = instructor.dominantCourse || 'Administrativo';
                const candidates = getRecommendationsFor(course, instructor.nome);
                setRedistributionData({
                    instructor: instructor.nome,
                    course: course,
                    candidates: candidates
                });
                setIsRedistributionModalOpen(true);
            };

            const instructor2Suggestions = useMemo(() => {
                if (!newClass.curso) return [];
                return getRecommendationsFor(newClass.curso, newClass.instrutor1).slice(0, 5);
            }, [newClass.curso, newClass.instrutor1, processedData]);

            // --- UPLOAD & EXPORT ---
            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const dataBuffer = evt.target.result;
                        const wb = XLSX.read(dataBuffer, { type: 'array', cellDates: true });
                        let targetSheetName = wb.SheetNames[0];
                        
                        const ws = wb.Sheets[targetSheetName];
                        const jsonData = XLSX.utils.sheet_to_json(ws, { header: 1 });
                        
                        let headerRowIndex = 0;
                        let headerRow = jsonData[0] || [];
                        
                        for(let r=0; r<Math.min(jsonData.length, 5); r++) {
                            const rowStr = jsonData[r].map(c => String(c).toLowerCase()).join(' ');
                            if(rowStr.includes('turma') && rowStr.includes('curso')) {
                                headerRowIndex = r;
                                headerRow = jsonData[r];
                                break;
                            }
                        }

                        const map = {
                            id: -1, curso: -1, analista: -1, alunos: -1, inicio: -1, termino: -1, 
                            i1: -1, i2: -1, dt: -1
                        };

                        headerRow.forEach((cell, idx) => {
                            const val = String(cell).toLowerCase().trim();
                            if(val === 'turma') map.id = idx;
                            else if(val === 'curso') map.curso = idx;
                            else if(val === 'analista') map.analista = idx;
                            else if(val === 'alunos' || val === 'total') map.alunos = idx;
                            else if(val.includes('início') || val === 'inicio') map.inicio = idx;
                            else if(val.includes('término') || val === 'termino') map.termino = idx;
                            else if(val.includes('instrutor 1')) map.i1 = idx;
                            else if(val.includes('instrutor 2') && map.i2 === -1) map.i2 = idx;
                            else if(val.includes('transferência') || val.includes('transferencia')) map.dt = idx;
                        });

                        if (map.id === -1) map.id = 0;
                        if (map.curso === -1) map.curso = 1;
                        if (map.analista === -1) map.analista = 2;
                        if (map.alunos === -1) map.alunos = 3;
                        if (map.inicio === -1) map.inicio = 4;
                        if (map.termino === -1) map.termino = 5;
                        if (map.i1 === -1) map.i1 = 6;
                        if (map.i2 === -1) map.i2 = 7; 
                        if (map.dt === -1) map.dt = 8; 
                        
                        const newRows = [];
                        for(let i = headerRowIndex + 1; i < jsonData.length; i++) {
                            const row = jsonData[i];
                            if(row && (row[map.id] || row[map.curso])) {
                                let dtTransfer = safeDate(row[map.dt]);
                                let i2Name = safeString(row[map.i2]);
                                if (i2Name.match(/\d{4}-\d{2}-\d{2}/) || i2Name.match(/\d{2}\/\d{2}/)) {
                                    i2Name = ''; 
                                }

                                newRows.push({
                                    id: safeString(row[map.id]),
                                    curso: safeString(row[map.curso]),
                                    analista: safeString(row[map.analista]),
                                    alunos: parseInt(row[map.alunos]) || 0, 
                                    inicio: safeDate(row[map.inicio]),
                                    termino: safeDate(row[map.termino]),
                                    instrutor1: safeString(row[map.i1]),
                                    instrutor2: i2Name,
                                    dataTransferencia: dtTransfer
                                });
                            }
                        }
                        
                        if (newRows.length > 0) { 
                            setData(newRows); 
                            alert(`Importação concluída! ${newRows.length} turmas carregadas.`); 
                        } else {
                            alert("Nenhum dado válido encontrado.");
                        }
                    } catch (err) { console.error(err); alert("Erro ao ler o arquivo."); }
                };
                reader.readAsArrayBuffer(file);
                e.target.value = null; 
            };

            const handleExport = () => {
                try {
                    const wb = XLSX.utils.book_new();
                    
                    const exportRows = data.map(row => {
                        const today = new Date(); today.setHours(0,0,0,0);
                        let currInst = row.instrutor1;
                        let st = 'Ativo';
                        
                        // Lógica de Status (AJUSTADA PARA FINALIZADO)
                        try {
                            if (row.termino) { 
                                const t = new Date(row.termino+'T00:00:00'); 
                                if (!isNaN(t) && today > t) st = 'Finalizado'; 
                            }
                            if (st !== 'Finalizado' && row.instrutor2 && row.dataTransferencia) {
                                const tf = new Date(row.dataTransferencia+'T00:00:00');
                                if (!isNaN(tf) && today >= tf) currInst = row.instrutor2;
                            }
                        } catch(e) {}

                        return [
                            row.id, 
                            row.curso, 
                            row.analista, 
                            row.alunos, 
                            formatDatePTBR(row.inicio),   
                            formatDatePTBR(row.termino),  
                            row.instrutor1, 
                            row.instrutor2,               
                            formatDatePTBR(row.dataTransferencia), 
                            currInst, 
                            st
                        ];
                    });
                    
                    const ws = XLSX.utils.aoa_to_sheet([
                        ['Turma', 'Curso', 'Analista', 'Alunos', 'Início', 'Término', 'Instrutor 1', 'Instrutor 2', 'Data Transferência', 'Resp. Atual', 'Status'], 
                        ...exportRows
                    ]);
                    
                    XLSX.utils.book_append_sheet(wb, ws, "Base de Turmas");
                    
                    const subExportRows = substitutions.map(s => [formatDatePTBR(s.data), s.turmaId, s.instrutorAusente, s.instrutorSubstituto, s.motivo, s.status]);
                    const wsSub = XLSX.utils.aoa_to_sheet([['Data', 'Turma ID', 'Instrutor Ausente', 'Instrutor Substituto', 'Motivo', 'Status'], ...subExportRows]);
                    XLSX.utils.book_append_sheet(wb, wsSub, "Substituicoes");
                    
                    XLSX.writeFile(wb, "Senac_Gestao_Turmas.xlsx");
                } catch (err) { alert("Erro ao exportar: " + err.message); }
            };

            useEffect(() => {
                if (newSub.turmaId && newSub.data) {
                    const turma = processedData.find(t => t.id === newSub.turmaId);
                    if (turma) {
                        const subDate = new Date(newSub.data + 'T00:00:00');
                        let titularNaData = turma.instrutor1;
                        if (turma.instrutor2 && turma.dataTransferencia) {
                            const transfDate = new Date(turma.dataTransferencia + 'T00:00:00');
                            if (subDate >= transfDate) titularNaData = turma.instrutor2;
                        }
                        let sugestao = '';
                        if (titularNaData === turma.instrutor1 && turma.instrutor2) sugestao = turma.instrutor2;
                        else if (titularNaData === turma.instrutor2 && turma.instrutor1) sugestao = turma.instrutor1;
                        if (!sugestao) {
                            const candidates = getRecommendationsFor(turma.curso, titularNaData);
                            if (candidates.length > 0) sugestao = candidates[0].nome;
                        }
                        setNewSub(prev => ({ ...prev, instrutorAusente: titularNaData, instrutorSubstituto: prev.instrutorSubstituto || sugestao }));
                    }
                }
            }, [newSub.turmaId, newSub.data, processedData]);

            const handleAddClass = (e) => { e.preventDefault(); setData([...data, { ...newClass }]); setIsFormOpen(false); alert("Turma adicionada!"); };
            const handleAddSub = (e) => { e.preventDefault(); setSubstitutions([...substitutions, { ...newSub, status: 'Pendente' }]); setIsSubModalOpen(false); alert("Substituição agendada!"); };
            
            const handleSimulate = () => {
                if (!simData.curso || !simData.alunos) return;
                const scores = getRecommendationsFor(simData.curso, '').map(inst => ({
                    ...inst,
                    projectedAlunos: inst.totalAlunos + parseInt(simData.alunos),
                    currentCourseCount: inst.cursos[simData.curso] || 0
                }));
                setRecommendations(scores);
            };
            const acceptSuggestion = (instrutorNome) => { setNewClass(prev => ({ ...prev, curso: simData.curso, alunos: simData.alunos, instrutor1: instrutorNome })); setIsFormOpen(true); };

            const Charts = () => {
                if (!window.Recharts) return null;
                const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = window.Recharts;
                const chartStats = useMemo(() => {
                    const stats = {};
                    filteredData.forEach(row => {
                        if (row.isFinished || row.instrutorAtual === 'Não Atribuído') return;
                        const inst = row.instrutorAtual;
                        if (!stats[inst]) stats[inst] = { nome: inst, totalAlunos: 0, totalTurmas: 0 };
                        stats[inst].totalAlunos += (parseInt(row.alunos) || 0);
                        stats[inst].totalTurmas += 1;
                    });
                    return Object.values(stats).sort((a,b) => b.totalAlunos - a.totalAlunos);
                }, [filteredData]);
                return (
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8 fade-in">
                        <div className="bg-white p-4 rounded-lg shadow border border-gray-200 h-96">
                            <h3 className="font-bold text-gray-700 mb-4 text-center">Total de Jovens (Filtrado)</h3>
                            <ResponsiveContainer width="100%" height="90%">
                                <BarChart data={chartStats} layout="horizontal" margin={{top:20, right:30, left:20, bottom:50}}>
                                    <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                    <XAxis dataKey="nome" angle={-45} textAnchor="end" interval={0} height={60} tick={{fontSize:10}} />
                                    <YAxis />
                                    <Tooltip contentStyle={{borderRadius:'8px'}} />
                                    <Bar dataKey="totalAlunos" name="Alunos" fill="#004587" radius={[4, 4, 0, 0]} />
                                </BarChart>
                            </ResponsiveContainer>
                        </div>
                        <div className="bg-white p-4 rounded-lg shadow border border-gray-200 h-96">
                            <h3 className="font-bold text-gray-700 mb-4 text-center">Total de Turmas (Filtrado)</h3>
                            <ResponsiveContainer width="100%" height="90%">
                                <BarChart data={chartStats} layout="horizontal" margin={{top:20, right:30, left:20, bottom:50}}>
                                    <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                    <XAxis dataKey="nome" angle={-45} textAnchor="end" interval={0} height={60} tick={{fontSize:10}} />
                                    <YAxis allowDecimals={false} />
                                    <Tooltip contentStyle={{borderRadius:'8px'}} />
                                    <Bar dataKey="totalTurmas" name="Turmas" fill="#F68B1F" radius={[4, 4, 0, 0]} />
                                </BarChart>
                            </ResponsiveContainer>
                        </div>
                    </div>
                );
            };

            return (
                <ErrorBoundary>
                <div className="min-h-screen pb-20">
                    <input type="file" ref={fileInputRef} onChange={handleFileUpload} accept=".csv,.xlsx,.xls,.xlsm" className="hidden" />

                    <nav className="bg-white border-b border-gray-200 sticky top-0 z-30 shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 py-3 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-3">
                                <img src="https://upload.wikimedia.org/wikipedia/commons/8/86/Senac_logo.svg" alt="Senac Logo" className="h-10 w-auto" />
                                <div className="border-l pl-3 border-gray-300">
                                    <h1 className="text-xl font-bold text-blue-900 leading-tight">Unidade Portão</h1>
                                    <p className="text-xs text-gray-500 uppercase tracking-wide">Gestão de Distribuição</p>
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setIsSubModalOpen(true)} className="flex items-center gap-2 px-4 py-2 bg-purple-50 text-purple-700 rounded-lg hover:bg-purple-100 transition text-sm font-semibold shadow-sm"> <Icons.Switch /> Substituir </button>
                                <button onClick={() => setIsFormOpen(true)} className="flex items-center gap-2 px-4 py-2 bg-blue-50 text-blue-700 rounded-lg hover:bg-blue-100 transition text-sm font-semibold shadow-sm"> <Icons.Plus /> Turma </button>
                                <button onClick={handleExport} className="flex items-center gap-2 px-4 py-2 bg-green-50 text-green-700 rounded-lg hover:bg-green-100 transition text-sm font-semibold shadow-sm"> <Icons.Download /> Salvar </button>
                                <button onClick={() => fileInputRef.current.click()} className="flex items-center gap-2 px-4 py-2 bg-orange-50 text-orange-700 rounded-lg hover:bg-orange-100 transition text-sm font-semibold shadow-sm"> <Icons.Upload /> Carregar </button>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto px-4 py-8">
                        {urgentSubs.length > 0 && (
                            <div className="bg-white border-l-4 border-red-500 p-4 mb-8 rounded-lg shadow-lg fade-in alert-pulse ring-1 ring-red-100">
                                <div className="flex justify-between items-start">
                                    <div>
                                        <h3 className="font-bold text-red-800 text-lg flex items-center gap-2"><Icons.Clock /> Substituições para Hoje/Amanhã</h3>
                                        <p className="text-red-600 text-sm">Confirme as trocas para efetivar no sistema.</p>
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mt-3">
                                    {urgentSubs.map((sub, idx) => (
                                        <div key={idx} className="bg-red-50 p-3 rounded border border-red-200 flex flex-col gap-2">
                                            <div className="flex justify-between items-center text-sm font-bold text-gray-700">
                                                <span>{sub.data}</span>
                                                <span className="bg-white px-2 rounded text-xs border">Turma {sub.turmaId}</span>
                                            </div>
                                            <div className="flex items-center justify-between text-sm">
                                                <span className="text-red-600 font-semibold">{sub.instrutorAusente}</span>
                                                <span className="text-gray-400">➔</span>
                                                <span className="text-green-700 font-bold">{sub.instrutorSubstituto}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        <div className="flex space-x-4 mb-6 border-b border-gray-200 overflow-x-auto">
                            <button onClick={() => setActiveTab('dashboard')} className={`py-2 px-4 font-semibold border-b-2 transition whitespace-nowrap ${activeTab === 'dashboard' ? 'border-orange-500 text-orange-600' : 'border-transparent text-gray-500 hover:text-gray-700'}`}>Visão Geral</button>
                            <button onClick={() => setActiveTab('simulator')} className={`py-2 px-4 font-semibold border-b-2 transition whitespace-nowrap ${activeTab === 'simulator' ? 'border-blue-500 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'}`}>Simulador de Distribuição</button>
                            <button onClick={() => setActiveTab('subs')} className={`py-2 px-4 font-semibold border-b-2 transition whitespace-nowrap ${activeTab === 'subs' ? 'border-purple-500 text-purple-600' : 'border-transparent text-gray-500 hover:text-gray-700'}`}>Histórico ({substitutions.length})</button>
                        </div>

                        {activeTab === 'dashboard' && (
                            <div className="fade-in">
                                {/* FILTROS */}
                                <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200 mb-8 grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                                    <div>
                                        <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Filtrar por Instrutor</label>
                                        <select value={filters.instrutor} onChange={e => setFilters({...filters, instrutor: e.target.value})} className="w-full p-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                                            <option value="">Todos os Instrutores</option>
                                            {uniqueInstrutores.map(i => <option key={i} value={i}>{i}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Filtrar por Analista</label>
                                        <select value={filters.analista} onChange={e => setFilters({...filters, analista: e.target.value})} className="w-full p-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                                            <option value="">Todos os Analistas</option>
                                            {uniqueAnalistas.map(a => <option key={a} value={a}>{a}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Filtrar por Curso</label>
                                        <select value={filters.curso} onChange={e => setFilters({...filters, curso: e.target.value})} className="w-full p-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                                            <option value="">Todos os Cursos</option>
                                            {uniqueCursos.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Buscar Turma (ID)</label>
                                        <input list="turmas-list" value={filters.turma} onChange={e => setFilters({...filters, turma: e.target.value})} placeholder="Digite o ID da Turma..." className="w-full p-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" />
                                        <datalist id="turmas-list">
                                            {uniqueTurmas.map(t => <option key={t} value={t} />)}
                                        </datalist>
                                    </div>
                                </div>
                                
                                <div className="text-right pb-2 text-sm text-gray-400 font-mono">{filteredData.length} registros filtrados</div>

                                {/* DETALHE DA TURMA (SELECIONADA) */}
                                {selectedClassDetail && (
                                    <div className={`mb-8 border rounded-xl p-6 shadow-md fade-in ${selectedClassDetail.isFinished ? 'bg-red-50 border-red-200' : 'bg-blue-50 border-blue-200'}`}>
                                        <div className="flex justify-between items-start mb-4">
                                            <div>
                                                <h3 className={`text-2xl font-bold flex items-center gap-2 ${selectedClassDetail.isFinished ? 'text-red-900' : 'text-blue-900'}`}>
                                                    <Icons.BookOpen /> Turma {selectedClassDetail.id}
                                                    {selectedClassDetail.isFinished && <span className="bg-red-600 text-white text-xs px-2 py-1 rounded uppercase ml-2">Finalizado</span>}
                                                </h3>
                                                <p className={`${selectedClassDetail.isFinished ? 'text-red-700' : 'text-blue-700'} font-medium`}>{selectedClassDetail.curso}</p>
                                            </div>
                                            <span className={`bg-white px-3 py-1 rounded-full text-xs font-bold border ${selectedClassDetail.isFinished ? 'border-red-200 text-red-600' : 'border-blue-200 text-blue-600'}`}>
                                                Analista: {selectedClassDetail.analista}
                                            </span>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                            <div className="bg-white p-4 rounded-lg border border-gray-100">
                                                <p className="text-xs text-gray-500 uppercase font-bold mb-1">Instrutor Titular (1)</p>
                                                <p className="text-lg font-bold text-gray-800">{selectedClassDetail.instrutor1}</p>
                                                <p className="text-xs text-gray-400 mt-1">Início: {selectedClassDetail.inicio ? formatDatePTBR(selectedClassDetail.inicio) : '-'}</p>
                                            </div>
                                            <div className="bg-white p-4 rounded-lg border border-gray-100 flex flex-col justify-center items-center">
                                                <div className="text-2xl text-blue-300">➔</div>
                                                <p className="text-xs font-bold text-blue-600 mt-1">Transição: {selectedClassDetail.dataTransferencia ? formatDatePTBR(selectedClassDetail.dataTransferencia) : 'Não agendada'}</p>
                                            </div>
                                            <div className="bg-white p-4 rounded-lg border border-gray-100">
                                                <p className="text-xs text-gray-500 uppercase font-bold mb-1">Instrutor Secundário (2)</p>
                                                <p className={`text-lg font-bold ${selectedClassDetail.instrutor2 ? 'text-gray-800' : 'text-red-400 italic'}`}>
                                                    {selectedClassDetail.instrutor2 || 'Pendente'}
                                                </p>
                                                <p className="text-xs text-gray-400 mt-1">Início Estimado: {getNextWorkingDay(selectedClassDetail.dataTransferencia) || '-'}</p>
                                            </div>
                                        </div>
                                        <div className={`mt-4 pt-4 border-t text-center ${selectedClassDetail.isFinished ? 'border-red-200' : 'border-blue-200'}`}>
                                            <p className={`text-sm font-bold ${selectedClassDetail.isFinished ? 'text-red-800' : 'text-blue-800'}`}>
                                                Responsável Hoje: <span className="bg-yellow-300 px-2 py-0.5 rounded text-yellow-900">{selectedClassDetail.instrutorAtual}</span>
                                            </p>
                                        </div>
                                    </div>
                                )}

                                <Charts />
                                <h2 className="text-xl font-bold text-gray-800 mb-4 border-l-4 border-orange-500 pl-3">Visão Geral dos Instrutores</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 mb-12">
                                    {instructorStats.filter(i => {
                                        const matchInst = filters.instrutor === '' || i.nome === filters.instrutor;
                                        const matchAnalista = filters.analista === '' || i.analistas.includes(filters.analista);
                                        const matchCurso = filters.curso === '' || (i.cursos[filters.curso] > 0);
                                        return matchInst && matchAnalista && matchCurso;
                                    }).map(inst => (
                                        <div key={inst.nome} className={`bg-white rounded-xl shadow-sm border-2 p-5 relative transition-card ${inst.alert ? 'border-red-400' : 'border-transparent'}`}>
                                            {inst.alert && (
                                                <button 
                                                    onClick={() => handleRedistributeClick(inst)}
                                                    className="absolute -top-3 -right-3 bg-red-500 hover:bg-red-600 text-white text-xs font-bold px-3 py-1 rounded-full shadow flex items-center gap-1 animate-pulse clickable-badge transition-transform"
                                                    title="Clique para ver sugestões de redistribuição"
                                                >
                                                    <Icons.Alert /> Redistribuir: {inst.alertType}
                                                </button>
                                            )}
                                            
                                            <div className="flex justify-between items-start mb-4">
                                                <div>
                                                    <h3 className="text-lg font-bold text-gray-900">{inst.nome}</h3>
                                                    <p className="text-sm text-gray-500 flex items-center gap-1 mt-1">
                                                        <span className="bg-gray-100 px-2 py-0.5 rounded text-gray-600 font-medium text-xs">Analista(s):</span> 
                                                        <span className="font-semibold text-blue-600">{inst.analistas || 'N/A'}</span>
                                                    </p>
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-2 gap-4 mb-4">
                                                <div className="bg-blue-50 p-3 rounded-lg text-center">
                                                    <span className="block text-2xl font-bold text-blue-800">{inst.totalAlunos}</span>
                                                    <span className="text-xs text-blue-600 font-semibold uppercase">Jovens</span>
                                                </div>
                                                <div className="bg-orange-50 p-3 rounded-lg text-center">
                                                    <span className="block text-2xl font-bold text-orange-800">{inst.totalTurmas}</span>
                                                    <span className="text-xs text-orange-600 font-semibold uppercase">Turmas</span>
                                                </div>
                                            </div>

                                            <div className="border-t border-gray-100 pt-3">
                                                <p className="text-xs font-bold text-gray-400 uppercase mb-2">Distribuição de Cursos</p>
                                                <div className="space-y-2 max-h-32 overflow-y-auto pr-1">
                                                    {Object.entries(inst.cursos).map(([curso, qtd]) => (
                                                        <div key={curso} className={`flex justify-between text-sm items-center ${filters.curso === curso ? 'bg-yellow-50 font-bold p-1 rounded' : ''}`}>
                                                            <span className="text-gray-600 truncate w-40" title={curso}>{curso}</span>
                                                            <div className="flex items-center gap-2">
                                                                <div className="w-16 h-1.5 bg-gray-100 rounded-full overflow-hidden">
                                                                    <div className="h-full bg-blue-500" style={{width: `${(qtd/inst.totalTurmas)*100}%`}}></div>
                                                                </div>
                                                                <span className="font-mono text-xs font-bold text-gray-500 whitespace-nowrap">{qtd} turmas</span>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>

                                            {/* GESTÃO DE TRANSIÇÃO DENTRO DO CARD */}
                                            {inst.myClasses && inst.myClasses.length > 0 && (
                                                <div className="border-t border-gray-100 pt-3 mt-2">
                                                    <p className="text-xs font-bold text-gray-400 uppercase mb-2 flex items-center gap-1">
                                                        <Icons.Switch /> Gestão de Transição (Inst. 1 ➔ 2)
                                                    </p>
                                                    <div className="space-y-2 max-h-40 overflow-y-auto pr-1">
                                                        {inst.myClasses.map(cls => (
                                                            <div key={cls.id} className={`p-2 rounded border text-xs ${cls.isFinished ? 'bg-red-50 border-red-200 opacity-75' : 'bg-gray-50 border-gray-100'}`}>
                                                                <div className="flex justify-between font-bold text-gray-700">
                                                                    <span className={cls.isFinished ? 'text-red-700' : ''}>
                                                                        Turma {cls.id} {cls.isFinished && '(Finalizada)'}
                                                                    </span>
                                                                    <span className="text-blue-600">{cls.curso.substring(0, 15)}...</span>
                                                                </div>
                                                                <div className="flex items-center gap-1 text-gray-500 mt-1">
                                                                    <span>Fim I1: {cls.dataTransferencia ? formatDatePTBR(cls.dataTransferencia) : 'N/A'}</span>
                                                                    <Icons.ArrowRight />
                                                                    <span>Início I2: {getNextWorkingDay(cls.dataTransferencia) || 'N/A'}</span>
                                                                </div>
                                                                <div className="mt-1 flex items-center justify-between">
                                                                    <span className="font-semibold text-gray-600">
                                                                        I2: {cls.instrutor2 || <span className="text-red-400 italic">Pendente</span>}
                                                                    </span>
                                                                    {(!cls.instrutor2 || cls.instrutor2 === '') && cls.dataTransferencia && !cls.isFinished && (
                                                                        <button 
                                                                            onClick={() => {
                                                                                const best = getRecommendationsFor(cls.curso, inst.nome)[0];
                                                                                if(best) assignInstructor2(cls.id, best.nome);
                                                                                else alert("Sem sugestão disponível");
                                                                            }}
                                                                            className="px-2 py-0.5 bg-green-100 text-green-700 rounded hover:bg-green-200 border border-green-200 flex items-center gap-1"
                                                                            title="Aplicar melhor sugestão automaticamente"
                                                                        >
                                                                            <Icons.Bulb /> Sugerir
                                                                        </button>
                                                                    )}
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'simulator' && (
                            <div className="fade-in max-w-4xl mx-auto">
                                <div className="bg-white rounded-xl shadow-lg border border-blue-100 overflow-hidden mb-8">
                                    <div className="bg-gradient-to-r from-blue-900 to-blue-800 p-6 text-white">
                                        <h2 className="text-xl font-bold flex items-center gap-2"><Icons.Search /> Simulador de Distribuição</h2>
                                        <p className="text-blue-200 text-sm mt-1">Preencha os dados da nova turma para ver quem está mais apto a assumir.</p>
                                    </div>
                                    <div className="p-6 grid grid-cols-1 md:grid-cols-2 gap-6 items-end">
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-1">Curso da Nova Turma</label>
                                            <select className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" value={simData.curso} onChange={e => setSimData({...simData, curso: e.target.value})}>
                                                {COURSE_OPTIONS.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-1">Quantidade de Jovens</label>
                                            <input type="number" className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" value={simData.alunos} onChange={e => setSimData({...simData, alunos: e.target.value})} />
                                        </div>
                                    </div>
                                    <div className="px-6 pb-6">
                                        <button onClick={handleSimulate} className="w-full py-3 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 shadow transition transform hover:scale-[1.01]"> Analisar Carga e Recomendar </button>
                                    </div>
                                </div>

                                {recommendations && (
                                    <div className="space-y-4">
                                        <h3 className="text-lg font-bold text-gray-800 pl-2 border-l-4 border-green-500">Ranking de Recomendação</h3>
                                        {recommendations.map((inst, idx) => (
                                            <div key={inst.nome} className={`bg-white p-4 rounded-xl shadow-sm border flex flex-col md:flex-row items-center justify-between gap-4 transition ${idx === 0 ? 'border-green-400 ring-1 ring-green-100' : 'border-gray-200'}`}>
                                                <div className="flex items-center gap-4 flex-1">
                                                    <div className={`w-8 h-8 flex items-center justify-center rounded-full font-bold text-sm ${idx === 0 ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'}`}>#{idx + 1}</div>
                                                    <div>
                                                        <h4 className="font-bold text-gray-800 text-lg">{inst.nome}</h4>
                                                        <div className="flex gap-4 text-xs text-gray-500 mt-1">
                                                            <span>Atual: <strong>{inst.totalAlunos}</strong> alunos</span>
                                                            <span>Turmas deste curso: <strong>{inst.turmasDesteCurso}</strong></span>
                                                            <span>Carga Total: <strong>{inst.cargaTotalAlunos}</strong></span>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-3">
                                                    {idx === 0 && <span className="text-xs font-bold text-green-600 bg-green-50 px-2 py-1 rounded">Melhor Opção</span>}
                                                    <button onClick={() => acceptSuggestion(inst.nome)} className="px-4 py-2 bg-gray-900 text-white text-sm font-bold rounded-lg hover:bg-gray-700 flex items-center gap-2"> <Icons.Check /> Criar Turma </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'subs' && (
                            /* ... histórico ... */
                            <div className="bg-white rounded-xl shadow border border-gray-200 overflow-hidden fade-in">
                                <div className="p-6 border-b border-gray-200 flex justify-between items-center">
                                    <div>
                                        <h3 className="text-lg font-bold text-gray-800">Registro de Substituições</h3>
                                        <p className="text-sm text-gray-500">Histórico de trocas por ausência.</p>
                                    </div>
                                    <button onClick={() => setIsSubModalOpen(true)} className="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 font-bold text-sm shadow"> + Nova Substituição </button>
                                </div>
                                {substitutions.length === 0 ? (
                                    <div className="p-12 text-center text-gray-400">Nenhuma substituição registrada.</div>
                                ) : (
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-sm text-left text-gray-500">
                                            <thead className="text-xs text-gray-700 uppercase bg-gray-50">
                                                <tr>
                                                    <th className="px-6 py-3">Data</th>
                                                    <th className="px-6 py-3">Turma</th>
                                                    <th className="px-6 py-3 text-red-600">Instrutor Ausente</th>
                                                    <th className="px-6 py-3 text-green-600">Substituto</th>
                                                    <th className="px-6 py-3">Motivo</th>
                                                    <th className="px-6 py-3">Status</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {substitutions.map((sub, idx) => (
                                                    <tr key={idx} className="bg-white border-b hover:bg-gray-50">
                                                        <td className="px-6 py-4 font-mono">{formatDatePTBR(sub.data)}</td>
                                                        <td className="px-6 py-4 font-bold">{sub.turmaId}</td>
                                                        <td className="px-6 py-4 text-red-500 font-medium">{sub.instrutorAusente}</td>
                                                        <td className="px-6 py-4 text-green-600 font-bold bg-green-50">{sub.instrutorSubstituto}</td>
                                                        <td className="px-6 py-4">{sub.motivo}</td>
                                                        <td className="px-6 py-4"> <span className={`px-2 py-1 rounded text-xs font-bold ${sub.status === 'Confirmada' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}`}> {sub.status || 'Pendente'} </span> </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* MODAL REDISTRIBUIÇÃO (NOVO) */}
                    {isRedistributionModalOpen && redistributionData && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 backdrop-blur-sm fade-in">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[80vh] flex flex-col">
                                <div className="p-6 border-b border-gray-100 flex justify-between items-center bg-red-600 text-white rounded-t-2xl flex-shrink-0">
                                    <h3 className="text-xl font-bold flex items-center gap-2"><Icons.Alert /> Redistribuir: {redistributionData.instructor}</h3>
                                    <button onClick={() => setIsRedistributionModalOpen(false)} className="hover:bg-white/20 p-1 rounded-full text-white">✕</button>
                                </div>
                                <div className="p-6 flex-1 overflow-y-auto">
                                    <p className="text-gray-600 text-sm mb-4">
                                        Este instrutor está sobrecarregado. Abaixo estão <strong>todos os instrutores</strong>, ordenados pela melhor capacidade de absorver turmas de <strong>{redistributionData.course}</strong>:
                                    </p>
                                    <div className="space-y-3">
                                        {redistributionData.candidates.map((cand, idx) => (
                                            <div 
                                                key={cand.nome} 
                                                onClick={() => applyRedistribution(cand)}
                                                className={`border rounded-lg p-3 flex justify-between items-center transition cursor-pointer hover:shadow-md ${idx < 3 ? 'border-green-200 bg-green-50' : 'border-gray-200 bg-white'}`}
                                            >
                                                <div className="flex items-center gap-3">
                                                    <span className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold ${idx < 3 ? 'bg-green-100 text-green-700' : 'bg-gray-200 text-gray-600'}`}>#{idx+1}</span>
                                                    <div>
                                                        <p className="font-bold text-gray-800">{cand.nome}</p>
                                                        <p className="text-xs text-gray-500">
                                                            {cand.turmasDesteCurso} turmas de {redistributionData.course} | Total Alunos: {cand.cargaTotalAlunos}
                                                        </p>
                                                    </div>
                                                </div>
                                                <button className={`px-3 py-1 border text-xs font-bold rounded transition ${idx < 3 ? 'bg-white border-green-200 text-green-700 hover:bg-green-600 hover:text-white' : 'bg-white border-gray-300 text-gray-500 hover:bg-gray-600 hover:text-white'}`}>
                                                    Selecionar
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="p-4 border-t border-gray-100 text-center flex-shrink-0">
                                    <button onClick={() => setIsRedistributionModalOpen(false)} className="text-sm text-gray-500 underline hover:text-gray-800">Fechar Janela</button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* ... (Modais de Nova Turma e Substituição mantidos iguais) ... */}
                    {isFormOpen && (
                        /* ... código modal turma ... */
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 backdrop-blur-sm fade-in">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
                                <div className="p-6 border-b border-gray-100 flex justify-between items-center bg-blue-900 text-white rounded-t-2xl">
                                    <h3 className="text-xl font-bold flex items-center gap-2"><Icons.Plus /> Adicionar Nova Turma</h3>
                                    <button onClick={() => setIsFormOpen(false)} className="hover:bg-white/20 p-1 rounded-full text-white">✕</button>
                                </div>
                                <form onSubmit={handleAddClass} className="p-6 grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="md:col-span-2">
                                        <label className="block text-sm font-bold text-gray-700 mb-1">ID da Turma</label>
                                        <input required type="text" className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500" value={newClass.id} onChange={e => setNewClass({...newClass, id: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">Curso</label>
                                        <select required className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500" value={newClass.curso} onChange={e => setNewClass({...newClass, curso: e.target.value})}>
                                            <option value="">Selecione...</option>
                                            {COURSE_OPTIONS.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">Total de Jovens</label>
                                        <input required type="number" className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500" value={newClass.alunos} onChange={e => setNewClass({...newClass, alunos: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">Analista</label>
                                        <input required type="text" className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500" value={newClass.analista} onChange={e => setNewClass({...newClass, analista: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">Data Transferência</label>
                                        <input type="date" className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500" value={newClass.dataTransferencia} onChange={e => setNewClass({...newClass, dataTransferencia: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">Início</label>
                                        <input required type="date" className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500" value={newClass.inicio} onChange={e => setNewClass({...newClass, inicio: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">Término</label>
                                        <input required type="date" className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500" value={newClass.termino} onChange={e => setNewClass({...newClass, termino: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">Instrutor 1</label>
                                        <input required type="text" className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500" value={newClass.instrutor1} onChange={e => setNewClass({...newClass, instrutor1: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1 flex justify-between">
                                            <span>Instrutor 2 (Opcional)</span>
                                            {newClass.curso && <span className="text-xs text-blue-500 font-normal"><Icons.Bulb /> Sugestões abaixo</span>}
                                        </label>
                                        <input type="text" className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500" value={newClass.instrutor2} onChange={e => setNewClass({...newClass, instrutor2: e.target.value})} placeholder="Digite ou selecione abaixo..." />
                                        
                                        {/* SUGESTÃO DE INSTRUTOR 2 */}
                                        {newClass.curso && (
                                            <div className="mt-2 flex gap-2 overflow-x-auto pb-2">
                                                {instructor2Suggestions.map(sug => (
                                                    <button 
                                                        key={sug.nome} 
                                                        type="button"
                                                        onClick={() => setNewClass({...newClass, instrutor2: sug.nome})}
                                                        className="whitespace-nowrap px-2 py-1 bg-blue-50 border border-blue-100 text-blue-700 text-xs rounded hover:bg-blue-100 transition"
                                                        title={`Carga: ${sug.totalAlunos}`}
                                                    >
                                                        + {sug.nome}
                                                    </button>
                                                ))}
                                            </div>
                                        )}
                                    </div>
