<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Senac Portão - Gestão Temporal</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- VERSÕES ESTÁVEIS (React, Recharts, SheetJS) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .timeline-line { position: absolute; left: 15px; top: 0; bottom: 0; width: 2px; background: #e2e8f0; z-index: 0; }
        .timeline-item { position: relative; z-index: 1; }
        .modal-backdrop { background-color: rgba(15, 23, 42, 0.7); backdrop-filter: blur(4px); }
        
        /* Estilo para tabela de comparação */
        .comp-table th { @apply text-xs font-bold text-gray-500 uppercase tracking-wider py-2 px-3 text-left bg-gray-50 border-b; }
        .comp-table td { @apply text-sm py-2 px-3 border-b border-gray-100; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, Component } = React;
        
        // --- ERROR BOUNDARY ---
        class ErrorBoundary extends Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            componentDidCatch(error, errorInfo) {
                console.error("Erro no Dashboard:", error, errorInfo);
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen flex items-center justify-center bg-red-50 p-4">
                            <div className="bg-white p-8 rounded-xl shadow-xl max-w-lg text-center">
                                <h1 className="text-2xl font-bold text-red-600 mb-4">Ops! Algo deu errado.</h1>
                                <button onClick={() => window.location.reload()} className="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700">Recarregar</button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // --- ÍCONES ---
        const Icons = {
            Users: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>,
            BookOpen: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>,
            Upload: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>,
            Download: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>,
            Alert: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>,
            Plus: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4" /></svg>,
            Filter: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" /></svg>,
            Switch: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" /></svg>,
            Calendar: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
            Search: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>,
            Check: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7" /></svg>,
            Clock: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
            Bulb: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" /></svg>,
            ArrowRight: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>,
            Refresh: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>,
            Eye: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>,
            Maximize: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 4l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" /></svg>,
            Trend: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>
        };

        const MOCK_DATA = [
            { id: '202500029', curso: 'Administrativo', analista: 'Bianca', alunos: 31, inicio: '2025-02-17', termino: '2026-02-11', instrutor1: 'Sheila', instrutor2: 'Bruna', dataTransferencia: '2026-02-04' },
            { id: '202500118', curso: 'Administrativo', analista: 'Bianca', alunos: 31, inicio: '2025-02-17', termino: '2026-02-11', instrutor1: 'Bruna', instrutor2: 'Jaqueline', dataTransferencia: '2026-02-04' },
            { id: '202501228', curso: 'Supermercado', analista: 'Bianca', alunos: 28, inicio: '2025-12-02', termino: '2026-12-01', instrutor1: 'Luciano', instrutor2: 'Claire', dataTransferencia: '2026-02-04' }
        ];

        const COURSE_OPTIONS = [
            'Administrativo',
            'Administrativo - Aprendizagem Técnica',
            'Vendas',
            'Supermercado',
            'Logística',
            'Informática',
            'Outro'
        ];

        // --- COMPONENTE PRINCIPAL ---
        function App() {
            const [data, setData] = useState(MOCK_DATA);
            const [substitutions, setSubstitutions] = useState([]); 
            
            // Estado Principal de Data (Cenário)
            const [viewDate, setViewDate] = useState(new Date().toISOString().split('T')[0]);

            const [filters, setFilters] = useState({ instrutor: '', analista: '', curso: '', turma: '', dataTransferencia: '' });
            
            const [activeTab, setActiveTab] = useState('dashboard'); 
            const [isFormOpen, setIsFormOpen] = useState(false);
            const [isSubModalOpen, setIsSubModalOpen] = useState(false);
            
            const [redistributionData, setRedistributionData] = useState(null);
            const [isRedistributionModalOpen, setIsRedistributionModalOpen] = useState(false);

            // Estado para o Modal "Janela Grande"
            const [selectedInstructorDetail, setSelectedInstructorDetail] = useState(null);

            const [newClass, setNewClass] = useState({
                id: '', curso: '', analista: '', alunos: '', inicio: '', termino: '', instrutor1: '', instrutor2: '', dataTransferencia: ''
            });
            const [newSub, setNewSub] = useState({
                data: '', turmaId: '', instrutorAusente: '', instrutorSubstituto: '', motivo: '', status: 'Pendente'
            });
            
            const [simData, setSimData] = useState({ curso: 'Administrativo', alunos: 30 });
            const [recommendations, setRecommendations] = useState(null);
            const [urgentSubs, setUrgentSubs] = useState([]);
            
            // Sugestões para o Modal de Nova Turma
            const [modalSuggestions, setModalSuggestions] = useState({ i1: [], i2: [] });

            const fileInputRef = useRef(null);

            // --- FUNÇÕES AUXILIARES ---
            const safeDate = (val) => {
                if (!val) return '';
                if (val instanceof Date) return val.toISOString().split('T')[0];
                const str = String(val).trim();
                if (str.length < 8) return ''; 
                if (str.match(/^\d{2}\/\d{2}\/\d{4}$/)) { const [dd,mm,yyyy] = str.split('/'); return `${yyyy}-${mm}-${dd}`; }
                if (str.match(/^\d{4}-\d{2}-\d{2}$/)) return str;
                if (!isNaN(str) && Number(str) > 20000) {
                     const excelEpoch = new Date(1899, 11, 30);
                     const date = new Date(excelEpoch.getTime() + Number(str) * 86400000);
                     return date.toISOString().split('T')[0];
                }
                return '';
            };
            
            const safeString = (val) => {
                if (val === null || val === undefined) return '';
                if (val instanceof Date) return val.toLocaleDateString('pt-BR');
                if (typeof val === 'object') return JSON.stringify(val); 
                return String(val).trim();
            };
            
            const formatDatePTBR = (isoDate) => {
                if (!isoDate) return '';
                const parts = isoDate.split('-');
                if (parts.length === 3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
                return isoDate;
            };

            const getNextWorkingDay = (dateString) => {
                if (!dateString) return '';
                try {
                    const date = new Date(dateString + 'T00:00:00');
                    date.setDate(date.getDate() + 1);
                    if (date.getDay() === 6) date.setDate(date.getDate() + 2);
                    else if (date.getDay() === 0) date.setDate(date.getDate() + 1);
                    return date.toLocaleDateString('pt-BR');
                } catch (e) { return ''; }
            };

            // --- PROCESSAMENTO PRINCIPAL COM BASE NA DATA DO CENÁRIO (VIEW DATE) ---
            const processedData = useMemo(() => {
                const targetDate = new Date(viewDate + 'T00:00:00');
                
                return data.map(row => {
                    if (!row) return null;
                    let currentInstructor = row.instrutor1;
                    let status = 'Ativo';
                    let isFinished = false;

                    try {
                        if (row.termino) {
                            const terminoDate = new Date(row.termino + 'T00:00:00');
                            // AJUSTE: Se data alvo > data término, finalizou.
                            if (!isNaN(terminoDate.getTime()) && targetDate > terminoDate) {
                                status = 'Finalizado'; 
                                isFinished = true;
                            }
                        }
                        // LÓGICA DE TRANSFERÊNCIA BASEADA NO CENÁRIO (CORRIGIDA COM >=)
                        if (!isFinished && row.instrutor2 && row.dataTransferencia) {
                            const transferDate = new Date(row.dataTransferencia + 'T00:00:00'); 
                            if (!isNaN(transferDate.getTime())) {
                                // CORREÇÃO AQUI: Se a data alvo for IGUAL ou MAIOR que a transferência, já trocou.
                                if (targetDate >= transferDate) {
                                    currentInstructor = row.instrutor2;
                                    status = 'Transferido';
                                }
                            }
                        }
                    } catch(e) { }

                    if (!currentInstructor || String(currentInstructor).trim() === '') currentInstructor = 'Não Atribuído';
                    return { ...row, instrutorAtual: currentInstructor, status, isFinished };
                }).filter(Boolean);
            }, [data, viewDate]); // Recalcula sempre que a data muda

            // --- LISTA COMPLETA DE INSTRUTORES (REFORÇADA) ---
            const uniqueInstrutores = useMemo(() => {
                const set = new Set();
                data.forEach(d => { 
                    if (d.instrutor1 && typeof d.instrutor1 === 'string') set.add(d.instrutor1.trim()); 
                    if (d.instrutor2 && typeof d.instrutor2 === 'string') set.add(d.instrutor2.trim()); 
                });
                return Array.from(set)
                    .filter(d => d && d !== '' && d !== 'Não Atribuído')
                    .sort();
            }, [data]);

            // --- ESTATÍSTICAS POR INSTRUTOR (AGORA COM CÁLCULO CUMULATIVO PARA LINHA DO TEMPO) ---
            const instructorStats = useMemo(() => {
                const stats = {};
                
                // Passo 1: Inicializa
                uniqueInstrutores.forEach(name => {
                    stats[name] = {
                        nome: name, 
                        totalAlunos: 0, 
                        totalTurmas: 0, 
                        analistas: new Set(), 
                        cursos: {},          
                        myClasses: [],       
                        receivedClasses: [], 
                        futureEvents: [],
                        futureTotal: 0,
                        detalheCursos: {} 
                    };
                });

                // Passo 2: Popula ESTADO ATUAL (BASEADO NO VIEW DATE)
                processedData.forEach(row => {
                    if (row.isFinished || row.instrutorAtual === 'Não Atribuído') return;
                    
                    const inst = row.instrutorAtual;
                    if (!stats[inst]) stats[inst] = { nome: inst, totalAlunos: 0, totalTurmas: 0, analistas: new Set(), cursos: {}, myClasses: [], receivedClasses: [], futureEvents: [], detalheCursos: {} };
                    
                    const qtdAlunos = parseInt(row.alunos);
                    stats[inst].totalAlunos += isNaN(qtdAlunos) ? 0 : qtdAlunos;
                    stats[inst].totalTurmas += 1;
                    if (row.analista) stats[inst].analistas.add(row.analista);
                    
                    const curso = row.curso || 'Outros';
                    stats[inst].cursos[curso] = (stats[inst].cursos[curso] || 0) + 1;

                    // Inicializa detalhe se não existir
                    if (!stats[inst].detalheCursos[curso]) stats[inst].detalheCursos[curso] = { atual: 0, entradas: 0, saidas: 0 };
                    stats[inst].detalheCursos[curso].atual++;

                    if (row.status === 'Transferido' && row.instrutor2 === inst && row.instrutor1 && row.instrutor1 !== inst) {
                        stats[inst].receivedClasses.push(row);
                    }
                });

                // Passo 3: Popula EVENTOS
                const targetDate = new Date(viewDate + 'T00:00:00');

                data.forEach(row => {
                    if(!row) return;
                    
                    if (row.instrutor1 && stats[row.instrutor1] && !stats[row.instrutor1].myClasses.find(c => c.id === row.id)) {
                             const processed = processedData.find(p => p.id === row.id);
                             if(processed) stats[row.instrutor1].myClasses.push(processed);
                    }

                    const curso = row.curso || 'Outros';

                    // GERA EVENTOS (APÓS A DATA DO CENÁRIO)
                    if (row.dataTransferencia && row.instrutor2) {
                        const transferDate = new Date(row.dataTransferencia + 'T00:00:00');
                        if (transferDate > targetDate) { // Evento futuro
                            // SAÍDA DO I1
                            if (stats[row.instrutor1]) {
                                stats[row.instrutor1].futureEvents.push({ type: 'exit', date: row.dataTransferencia, turma: row, detail: `Passa para ${row.instrutor2}` });
                                if(!stats[row.instrutor1].detalheCursos[curso]) stats[row.instrutor1].detalheCursos[curso] = { atual: 0, entradas: 0, saidas: 0 };
                                stats[row.instrutor1].detalheCursos[curso].saidas++;
                            }
                            // ENTRADA NO I2
                            if (stats[row.instrutor2]) {
                                stats[row.instrutor2].futureEvents.push({ type: 'entry', date: row.dataTransferencia, turma: row, detail: `Recebe de ${row.instrutor1}` });
                                if(!stats[row.instrutor2].detalheCursos[curso]) stats[row.instrutor2].detalheCursos[curso] = { atual: 0, entradas: 0, saidas: 0 };
                                stats[row.instrutor2].detalheCursos[curso].entradas++;
                            }
                        }
                    }
                    
                    if (row.termino) {
                        const terminoDate = new Date(row.termino + 'T00:00:00');
                        if (terminoDate > targetDate) {
                            let responsavelNoFim = row.instrutor1;
                            if (row.dataTransferencia && row.instrutor2) {
                                const transferDate = new Date(row.dataTransferencia + 'T00:00:00');
                                if (transferDate <= terminoDate) responsavelNoFim = row.instrutor2;
                            }
                            
                            if (stats[responsavelNoFim]) {
                                stats[responsavelNoFim].futureEvents.push({ type: 'end', date: row.termino, turma: row, detail: 'Turma Finaliza' });
                                if(!stats[responsavelNoFim].detalheCursos[curso]) stats[responsavelNoFim].detalheCursos[curso] = { atual: 0, entradas: 0, saidas: 0 };
                                stats[responsavelNoFim].detalheCursos[curso].saidas++; // Conta fim como saída
                            }
                        }
                    }
                });

                // Passo 4: TOTALIZADORES E CÁLCULO CUMULATIVO (RUNNING TOTAL CORRIGIDO)
                Object.values(stats).forEach(inst => {
                    // Ordena eventos
                    inst.futureEvents.sort((a,b) => new Date(a.date) - new Date(b.date));
                    
                    // Cálculo do Running Total - AGORA GARANTIDO O START PELO ATUAL
                    // O valor 'totalTurmas' já representa o status no VIEW DATE (processado no Passo 2)
                    let runningCount = inst.totalTurmas; 

                    inst.futureEvents.forEach(evt => {
                        if (evt.type === 'entry') runningCount++;
                        else runningCount--; // Exit or End
                        
                        // Guarda o saldo no próprio evento para exibir no card
                        if(runningCount < 0) runningCount = 0; // Proteção
                        evt.runningTotal = runningCount;
                    });
                    
                    // Final Total = O último valor do running count
                    // Se não houver eventos futuros, o futuro é igual ao atual.
                    inst.futureTotal = runningCount;

                    // Recalcula detalheCursos.final para consistência
                     Object.keys(inst.detalheCursos).forEach(c => {
                        const d = inst.detalheCursos[c];
                        d.final = d.atual + d.entradas - d.saidas;
                        if(d.final < 0) d.final = 0;
                    });
                });

                return Object.values(stats).sort((a,b) => b.totalAlunos - a.totalAlunos);
            }, [processedData, data, viewDate, uniqueInstrutores]);

            // --- ESTATÍSTICAS DO ANALISTA SELECIONADO ---
            const analystStats = useMemo(() => {
                if (!filters.analista) return null;
                
                let totalAlunos = 0;
                let totalTurmas = 0;
                const instrutoresRelacionados = new Set();

                processedData.forEach(row => {
                    if (row.isFinished || row.instrutorAtual === 'Não Atribuído') return;
                    if (row.analista === filters.analista) {
                        totalAlunos += (parseInt(row.alunos) || 0);
                        totalTurmas++;
                        instrutoresRelacionados.add(row.instrutorAtual);
                    }
                });

                return {
                    nome: filters.analista,
                    totalAlunos,
                    totalTurmas,
                    qtdInstrutores: instrutoresRelacionados.size
                };
            }, [processedData, filters.analista]);

            // --- OUTRAS LISTAS ---
            const uniqueTransferDates = useMemo(() => {
                const set = new Set();
                processedData.forEach(d => { if (d.dataTransferencia) set.add(d.dataTransferencia); });
                return Array.from(set).sort();
            }, [processedData]);

            const uniqueAnalistas = useMemo(() => [...new Set(processedData.map(d => d.analista))].filter(Boolean).sort(), [processedData]);
            const uniqueCursos = useMemo(() => [...new Set(processedData.map(d => d.curso))].filter(Boolean).sort(), [processedData]);
            const uniqueTurmas = useMemo(() => processedData.map(d => d.id).sort(), [processedData]);

            // --- FILTRAGEM ---
            const filteredData = useMemo(() => {
                return processedData.filter(row => {
                    const iName = row.instrutorAtual || '';
                    const aName = row.analista || '';
                    const cName = row.curso || '';
                    const tId = row.id || '';
                    const dt = row.dataTransferencia || '';
                    
                    const matchInstrutor = filters.instrutor === '' || iName === filters.instrutor;
                    const matchAnalista = filters.analista === '' || aName === filters.analista;
                    const matchCurso = filters.curso === '' || cName === filters.curso;
                    const matchTurma = filters.turma === '' || tId === filters.turma;
                    const matchData = filters.dataTransferencia === '' || dt === filters.dataTransferencia;

                    return matchInstrutor && matchAnalista && matchCurso && matchTurma && matchData;
                });
            }, [processedData, filters]);

            // --- Handlers Básicos ---
            const handleAddClass = (e) => { e.preventDefault(); setData([...data, { ...newClass }]); setIsFormOpen(false); alert("Turma adicionada!"); };
            const handleAddSub = (e) => { e.preventDefault(); setSubstitutions([...substitutions, { ...newSub, status: 'Pendente' }]); setIsSubModalOpen(false); alert("Substituição agendada!"); };
            
            // --- NOVO: Handler Inteligente de Curso para Sugestões ---
            const handleNewClassCourseChange = (e) => {
                const selectedCurso = e.target.value;
                setNewClass({ ...newClass, curso: selectedCurso });

                if (selectedCurso) {
                    const recsI1 = getRecommendationsFor(selectedCurso, '').slice(0, 3);
                    const recsI2 = getRecommendationsFor(selectedCurso, '').slice(0, 4); 
                    setModalSuggestions({ i1: recsI1, i2: recsI2 });
                } else {
                    setModalSuggestions({ i1: [], i2: [] });
                }
            };

             // --- UPLOAD & EXPORT (RESTAURADO) ---
             const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const dataBuffer = evt.target.result;
                        const wb = XLSX.read(dataBuffer, { type: 'array', cellDates: true });
                        let targetSheetName = wb.SheetNames[0];
                        const ws = wb.Sheets[targetSheetName];
                        const jsonData = XLSX.utils.sheet_to_json(ws, { header: 1 });
                        
                        let headerRowIndex = 0;
                        let headerRow = jsonData[0] || [];
                        
                        for(let r=0; r<Math.min(jsonData.length, 5); r++) {
                            const rowStr = jsonData[r].map(c => String(c).toLowerCase()).join(' ');
                            if(rowStr.includes('turma') && rowStr.includes('curso')) {
                                headerRowIndex = r;
                                headerRow = jsonData[r];
                                break;
                            }
                        }

                        const map = { id: -1, curso: -1, analista: -1, alunos: -1, inicio: -1, termino: -1, i1: -1, i2: -1, dt: -1 };

                        headerRow.forEach((cell, idx) => {
                            const val = String(cell).toLowerCase().trim();
                            if(val === 'turma') map.id = idx;
                            else if(val === 'curso') map.curso = idx;
                            else if(val === 'analista') map.analista = idx;
                            else if(val === 'alunos' || val === 'total') map.alunos = idx;
                            else if(val.includes('início') || val === 'inicio') map.inicio = idx;
                            else if(val.includes('término') || val === 'termino') map.termino = idx;
                            else if(val.includes('instrutor 1')) map.i1 = idx;
                            else if(val.includes('instrutor 2') && map.i2 === -1) map.i2 = idx;
                            else if(val.includes('transferência') || val.includes('transferencia') || val.includes('troca')) map.dt = idx;
                        });

                        // Fallbacks
                        if (map.id === -1) map.id = 0; if (map.curso === -1) map.curso = 1; if (map.analista === -1) map.analista = 2;
                        
                        if (map.dt === -1 && jsonData.length > headerRowIndex + 1) {
                            const sampleRow = jsonData[headerRowIndex + 1];
                            for (let j = 6; j < sampleRow.length; j++) {
                                if (j === map.inicio || j === map.termino) continue;
                                const val = safeDate(sampleRow[j]);
                                if (val && val.length > 5 && j !== map.i1 && j !== map.i2) { map.dt = j; break; }
                            }
                        }
                        
                        const newRows = [];
                        for(let i = headerRowIndex + 1; i < jsonData.length; i++) {
                            const row = jsonData[i];
                            if(row && (row[map.id] || row[map.curso])) {
                                newRows.push({
                                    id: safeString(row[map.id]),
                                    curso: safeString(row[map.curso]),
                                    analista: safeString(row[map.analista]),
                                    alunos: parseInt(row[map.alunos]) || 0, 
                                    inicio: safeDate(row[map.inicio]),
                                    termino: safeDate(row[map.termino]),
                                    instrutor1: safeString(row[map.i1]),
                                    instrutor2: safeString(row[map.i2]).match(/\d/) ? '' : safeString(row[map.i2]),
                                    dataTransferencia: safeDate(row[map.dt])
                                });
                            }
                        }
                        if (newRows.length > 0) { setData(newRows); alert(`Importação concluída! ${newRows.length} turmas carregadas.`); } 
                        else { alert("Nenhum dado válido encontrado."); }
                    } catch (err) { console.error(err); alert("Erro ao ler o arquivo."); }
                };
                reader.readAsArrayBuffer(file);
                e.target.value = null; 
            };

            const handleExport = () => {
                try {
                    const wb = XLSX.utils.book_new();
                    const exportRows = data.map(row => {
                        return [row.id, row.curso, row.analista, row.alunos, formatDatePTBR(row.inicio), formatDatePTBR(row.termino), row.instrutor1, row.instrutor2, formatDatePTBR(row.dataTransferencia)];
                    });
                    const ws = XLSX.utils.aoa_to_sheet([['Turma', 'Curso', 'Analista', 'Alunos', 'Início', 'Término', 'Instrutor 1', 'Instrutor 2', 'Data Transferência'], ...exportRows]);
                    XLSX.utils.book_append_sheet(wb, ws, "Base de Turmas");
                    XLSX.writeFile(wb, "Senac_Gestao_Turmas.xlsx");
                } catch (err) { alert("Erro ao exportar: " + err.message); }
            };
            
            // Reutiliza lógicas existentes
            const getRecommendationsFor = (course, excludeName) => {
                let totalTurmasCurso = 0; let instrutoresDoCurso = 0; const stats = {};
                processedData.forEach(row => {
                    if (row.isFinished || row.instrutorAtual === 'Não Atribuído') return;
                    const inst = row.instrutorAtual;
                    if (!stats[inst]) stats[inst] = { nome: inst, totalAlunos: 0, totalTurmas: 0, cursos: {} };
                    const qtdAlunos = parseInt(row.alunos) || 0;
                    stats[inst].totalAlunos += qtdAlunos;
                    stats[inst].totalTurmas += 1;
                    const c = row.curso || 'Outros';
                    stats[inst].cursos[c] = (stats[inst].cursos[c] || 0) + 1;
                });
                const allInstructors = Object.values(stats);
                allInstructors.forEach(inst => { if (inst.cursos[course] > 0) { totalTurmasCurso += inst.cursos[course]; instrutoresDoCurso++; } });
                const mediaTurmasCurso = instrutoresDoCurso > 0 ? (totalTurmasCurso / instrutoresDoCurso) : 0;
                return allInstructors.map(inst => {
                    const turmasDesteCurso = inst.cursos[course] || 0; const cargaTotalAlunos = inst.totalAlunos; const totalTurmasGeral = inst.totalTurmas;
                    let score = 1000 - cargaTotalAlunos; const diferencaMedia = turmasDesteCurso - mediaTurmasCurso; score -= (diferencaMedia * 150); score -= (totalTurmasGeral * 50);
                    return { ...inst, score, turmasDesteCurso, cargaTotalAlunos };
                }).sort((a, b) => b.score - a.score);
            };
            const assignInstructor2 = (turmaId, instructorName) => {
                const newData = data.map(row => { if (row.id === turmaId) return { ...row, instrutor2: instructorName }; return row; });
                setData(newData);
            };
            const handleRedistributeClick = (instructor) => {
                const course = Object.keys(instructor.cursos).reduce((a, b) => instructor.cursos[a] > instructor.cursos[b] ? a : b, 'Administrativo');
                const candidates = getRecommendationsFor(course, instructor.nome);
                setRedistributionData({ instructor: instructor.nome, course: course, candidates: candidates });
                setIsRedistributionModalOpen(true);
            };
            const applyRedistribution = (candidate) => {
                const { instructor, course } = redistributionData;
                const newData = data.map(row => { if ((row.instrutor1 === instructor) && (row.curso === course)) return { ...row, instrutor1: candidate.nome }; return row; });
                setData(newData); setIsRedistributionModalOpen(false); alert(`Sucesso!`);
            };

            // Gráficos
            const Charts = () => {
                if (!window.Recharts) return null;
                const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = window.Recharts;
                const chartStats = useMemo(() => {
                    const stats = {};
                    filteredData.forEach(row => {
                        if (row.isFinished || row.instrutorAtual === 'Não Atribuído') return;
                        const inst = row.instrutorAtual;
                        if (!stats[inst]) stats[inst] = { nome: inst, totalAlunos: 0, totalTurmas: 0 };
                        stats[inst].totalAlunos += (parseInt(row.alunos) || 0);
                        stats[inst].totalTurmas += 1;
                    });
                    return Object.values(stats).sort((a,b) => b.totalAlunos - a.totalAlunos);
                }, [filteredData]);
                return (
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8 fade-in">
                        <div className="bg-white p-4 rounded-lg shadow border border-gray-200 h-96">
                            <h3 className="font-bold text-gray-700 mb-4 text-center">Total de Jovens (Data: {formatDatePTBR(viewDate)})</h3>
                            <ResponsiveContainer width="100%" height="90%">
                                <BarChart data={chartStats} layout="horizontal" margin={{top:20, right:30, left:20, bottom:50}}>
                                    <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                    <XAxis dataKey="nome" angle={-45} textAnchor="end" interval={0} height={60} tick={{fontSize:10}} />
                                    <YAxis />
                                    <Tooltip contentStyle={{borderRadius:'8px'}} cursor={{fill: '#f0f9ff'}} />
                                    <Bar dataKey="totalAlunos" name="Alunos" fill="#004587" radius={[4, 4, 0, 0]} />
                                </BarChart>
                            </ResponsiveContainer>
                        </div>
                        <div className="bg-white p-4 rounded-lg shadow border border-gray-200 h-96">
                            <h3 className="font-bold text-gray-700 mb-4 text-center">Total de Turmas (Data: {formatDatePTBR(viewDate)})</h3>
                            <ResponsiveContainer width="100%" height="90%">
                                <BarChart data={chartStats} layout="horizontal" margin={{top:20, right:30, left:20, bottom:50}}>
                                    <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                    <XAxis dataKey="nome" angle={-45} textAnchor="end" interval={0} height={60} tick={{fontSize:10}} />
                                    <YAxis allowDecimals={false} />
                                    <Tooltip contentStyle={{borderRadius:'8px'}} cursor={{fill: '#fff7ed'}} />
                                    <Bar dataKey="totalTurmas" name="Turmas" fill="#F68B1F" radius={[4, 4, 0, 0]} />
                                </BarChart>
                            </ResponsiveContainer>
                        </div>
                    </div>
                );
            };

            return (
                <ErrorBoundary>
                <div className="min-h-screen pb-20 bg-slate-50">
                    <input type="file" ref={fileInputRef} onChange={handleFileUpload} className="hidden" accept=".csv,.xlsx,.xls,.xlsm" />

                    {/* TOPO: SELETOR DE CENÁRIO E BOTÕES RESTAURADOS */}
                    <div className="bg-blue-900 text-white p-3 sticky top-0 z-40 shadow-lg">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-3">
                                <h1 className="text-lg font-bold">Unidade Portão | Gestão Temporal</h1>
                            </div>
                            
                            <div className="flex items-center gap-2 bg-blue-800 p-2 rounded-lg border border-blue-700">
                                <span className="text-xs font-bold uppercase text-blue-200 tracking-wider">Simular Cenário Em:</span>
                                <input 
                                    type="date" 
                                    className="bg-white text-blue-900 font-bold rounded px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
                                    value={viewDate}
                                    onChange={(e) => setViewDate(e.target.value)}
                                />
                                <button onClick={() => setViewDate(new Date().toISOString().split('T')[0])} className="text-xs bg-blue-700 hover:bg-blue-600 px-2 py-1 rounded text-white" title="Voltar para Hoje">Hoje</button>
                            </div>

                            <div className="flex gap-2">
                                <button onClick={() => fileInputRef.current.click()} className="flex items-center gap-2 px-3 py-1.5 bg-blue-800 hover:bg-blue-700 border border-blue-600 text-white rounded text-sm font-bold transition shadow-sm"> <Icons.Upload /> Importar </button>
                                <button onClick={handleExport} className="flex items-center gap-2 px-3 py-1.5 bg-green-600 hover:bg-green-500 text-white rounded text-sm font-bold transition shadow-sm"> <Icons.Download /> Baixar </button>
                                <div className="w-px bg-blue-700 mx-1"></div>
                                <button onClick={() => setIsFormOpen(true)} className="flex items-center gap-2 px-3 py-1.5 bg-blue-500 hover:bg-blue-400 text-white rounded text-sm font-bold transition shadow-sm"> <Icons.Plus /> Turma </button>
                                <button onClick={() => setIsSubModalOpen(true)} className="flex items-center gap-2 px-3 py-1.5 bg-purple-500 hover:bg-purple-400 text-white rounded text-sm font-bold transition shadow-sm"> <Icons.Switch /> Substituir </button>
                            </div>
                        </div>
                    </div>

                    <main className="max-w-7xl mx-auto px-4 py-8">
                        {/* FILTROS SECUNDÁRIOS */}
                        <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200 mb-8 grid grid-cols-1 md:grid-cols-5 gap-4 items-end fade-in">
                            <div><label className="block text-xs font-bold text-gray-500 mb-1">INSTRUTOR</label><select value={filters.instrutor} onChange={e => setFilters({...filters, instrutor: e.target.value})} className="w-full p-2 bg-gray-50 border rounded text-sm"><option value="">Todos</option>{uniqueInstrutores.map(i => <option key={i} value={i}>{i}</option>)}</select></div>
                            <div><label className="block text-xs font-bold text-gray-500 mb-1">ANALISTA</label><select value={filters.analista} onChange={e => setFilters({...filters, analista: e.target.value})} className="w-full p-2 bg-gray-50 border rounded text-sm"><option value="">Todos</option>{uniqueAnalistas.map(a => <option key={a} value={a}>{a}</option>)}</select></div>
                            <div><label className="block text-xs font-bold text-gray-500 mb-1">CURSO</label><select value={filters.curso} onChange={e => setFilters({...filters, curso: e.target.value})} className="w-full p-2 bg-gray-50 border rounded text-sm"><option value="">Todos</option>{uniqueCursos.map(c => <option key={c} value={c}>{c}</option>)}</select></div>
                            <div><label className="block text-xs font-bold text-gray-500 mb-1">DATA ESPECÍFICA (Transf.)</label><select value={filters.dataTransferencia} onChange={e => setFilters({...filters, dataTransferencia: e.target.value})} className="w-full p-2 bg-gray-50 border rounded text-sm"><option value="">Todas</option>{uniqueTransferDates.map(d => <option key={d} value={d}>{formatDatePTBR(d)}</option>)}</select></div>
                            <div><label className="block text-xs font-bold text-gray-500 mb-1">BUSCAR ID</label><input value={filters.turma} onChange={e => setFilters({...filters, turma: e.target.value})} placeholder="Ex: 2025..." className="w-full p-2 bg-gray-50 border rounded text-sm" /></div>
                        </div>

                        {/* --- PAINEL DE RESUMO DO ANALISTA (Se Selecionado) --- */}
                        {analystStats && (
                            <div className="mb-8 bg-gradient-to-r from-indigo-50 to-blue-50 border border-indigo-100 rounded-xl p-6 fade-in shadow-sm flex flex-col md:flex-row justify-between items-center gap-6">
                                <div>
                                    <h2 className="text-2xl font-bold text-indigo-900 flex items-center gap-2">
                                        <div className="bg-indigo-200 p-2 rounded-full"><Icons.Users /></div>
                                        Analista: {analystStats.nome}
                                    </h2>
                                    <p className="text-indigo-600 text-sm mt-1">Visão filtrada da carteira deste analista.</p>
                                </div>
                                <div className="flex gap-6">
                                    <div className="text-center">
                                        <span className="block text-2xl font-bold text-indigo-800">{analystStats.totalAlunos}</span>
                                        <span className="text-xs uppercase font-bold text-indigo-500">Jovens</span>
                                    </div>
                                    <div className="w-px bg-indigo-200"></div>
                                    <div className="text-center">
                                        <span className="block text-2xl font-bold text-indigo-800">{analystStats.totalTurmas}</span>
                                        <span className="text-xs uppercase font-bold text-indigo-500">Turmas Ativas</span>
                                    </div>
                                    <div className="w-px bg-indigo-200"></div>
                                    <div className="text-center">
                                        <span className="block text-2xl font-bold text-indigo-800">{analystStats.qtdInstrutores}</span>
                                        <span className="text-xs uppercase font-bold text-indigo-500">Instrutores</span>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* GRÁFICOS */}
                        <Charts />

                        {/* CARDS DOS INSTRUTORES */}
                        <h2 className="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                            <span className="w-1 h-6 bg-blue-600 rounded block"></span>
                            Visão Geral da Equipe (Em {formatDatePTBR(viewDate)})
                        </h2>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 mb-12">
                            {instructorStats.filter(i => {
                                const matchInst = filters.instrutor === '' || i.nome === filters.instrutor;
                                const matchAnalista = filters.analista === '' || i.analistas.has(filters.analista); // Set check
                                const matchCurso = filters.curso === '' || (i.cursos[filters.curso] > 0);
                                const hasDate = filters.dataTransferencia === '' || i.myClasses.some(c => c.dataTransferencia === filters.dataTransferencia) || i.receivedClasses.some(c => c.dataTransferencia === filters.dataTransferencia);
                                return matchInst && matchAnalista && matchCurso && hasDate;
                            }).map(inst => {
                                // Filtros internos das listas (CRUCIAL: Filtra também pelo Analista aqui)
                                const applyFilters = (list) => list.filter(c => {
                                    const matchDate = filters.dataTransferencia === '' || c.dataTransferencia === filters.dataTransferencia;
                                    const matchCurso = filters.curso === '' || c.curso === filters.curso;
                                    const matchAnalista = filters.analista === '' || c.analista === filters.analista; // <--- FILTRO DE ANALISTA DENTRO DO CARD
                                    return matchDate && matchCurso && matchAnalista;
                                });

                                const filteredMyClasses = applyFilters(inst.myClasses);
                                const filteredReceived = applyFilters(inst.receivedClasses);
                                const activeMyClasses = filteredMyClasses.filter(c => !c.isFinished && c.status !== 'Transferido');
                                
                                return (
                                <div key={inst.nome} className="bg-white rounded-xl shadow-sm border border-gray-200 p-5 relative transition-card hover:border-blue-300">
                                    <div className="flex justify-between items-start mb-4">
                                        <div>
                                            <h3 className="text-lg font-bold text-gray-900">{inst.nome}</h3>
                                            <p className="text-xs text-gray-500 mt-1">Carga na data selecionada</p>
                                        </div>
                                        <button 
                                            onClick={() => setSelectedInstructorDetail(inst)}
                                            className="bg-blue-50 text-blue-600 hover:bg-blue-100 p-2 rounded-full transition"
                                            title="Ver Detalhes e Linha do Tempo"
                                        >
                                            <Icons.Maximize />
                                        </button>
                                    </div>

                                    <div className="grid grid-cols-2 gap-3 mb-4">
                                        <div className="bg-blue-50 p-2 rounded text-center border border-blue-100">
                                            <span className="block text-xl font-bold text-blue-800">{inst.totalAlunos}</span>
                                            <span className="text-[10px] text-blue-600 uppercase font-bold">Jovens</span>
                                        </div>
                                        <div className="bg-orange-50 p-2 rounded text-center border border-orange-100">
                                            <span className="block text-xl font-bold text-orange-800">{inst.totalTurmas}</span>
                                            <span className="text-[10px] text-orange-600 uppercase font-bold">Turmas</span>
                                        </div>
                                    </div>

                                    {/* Mini Lista Resumida */}
                                    <div className="border-t border-gray-100 pt-3">
                                        <p className="text-xs font-bold text-gray-400 mb-2 uppercase">
                                            {filters.analista ? `Turmas de ${filters.analista}` : `Resumo Ativo (${formatDatePTBR(viewDate)})`}
                                        </p>
                                        <div className="space-y-1 max-h-32 overflow-hidden relative">
                                            {[...activeMyClasses, ...filteredReceived].slice(0, 3).map(c => (
                                                <div key={c.id} className="text-xs flex justify-between bg-gray-50 p-1.5 rounded">
                                                    <span className="font-bold text-gray-700">T.{c.id}</span>
                                                    <span className="truncate w-32">{c.curso}</span>
                                                </div>
                                            ))}
                                            
                                            {([...activeMyClasses, ...filteredReceived].length === 0) && (
                                                <p className="text-xs text-gray-400 italic">Nenhuma turma encontrada para este filtro.</p>
                                            )}

                                            {inst.totalTurmas > 3 && (
                                                <button onClick={() => setSelectedInstructorDetail(inst)} className="w-full text-center text-xs text-blue-600 font-bold hover:underline mt-1">
                                                    + {inst.totalTurmas - 3} turmas (Clique para ver)
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )})}
                        </div>
                    </main>

                    {/* --- MODAL GIGANTE DE DETALHES DO INSTRUTOR --- */}
                    {selectedInstructorDetail && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop fade-in">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-5xl h-[90vh] flex flex-col overflow-hidden">
                                {/* Header Modal */}
                                <div className="bg-blue-900 text-white p-6 flex justify-between items-center shrink-0">
                                    <div>
                                        <h2 className="text-2xl font-bold flex items-center gap-2">
                                            <Icons.Users /> Detalhamento: {selectedInstructorDetail.nome}
                                        </h2>
                                        <p className="text-blue-200 text-sm mt-1">
                                            Visão Completa em <strong>{formatDatePTBR(viewDate)}</strong> e Projeção Futura
                                        </p>
                                    </div>
                                    <button onClick={() => setSelectedInstructorDetail(null)} className="bg-white/10 hover:bg-white/20 p-2 rounded-full text-white transition">✕</button>
                                </div>

                                {/* Corpo Modal (Scrollável) */}
                                <div className="flex-1 overflow-y-auto p-6 bg-gray-50">
                                    <div className="flex gap-4 mb-6">
                                        {/* CARTÃO RESUMO ATUAL */}
                                        <div className="flex-1 bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                                            <h4 className="text-xs font-bold text-gray-500 uppercase mb-2">Cenário Atual ({formatDatePTBR(viewDate)})</h4>
                                            <div className="flex justify-between items-end">
                                                <div>
                                                    <span className="text-3xl font-bold text-blue-900">{selectedInstructorDetail.totalTurmas}</span>
                                                    <span className="text-sm text-gray-500 ml-1">Turmas</span>
                                                </div>
                                                <div className="text-right">
                                                     <span className="block text-xl font-bold text-blue-700">{selectedInstructorDetail.totalAlunos}</span>
                                                     <span className="text-xs text-gray-400">Jovens</span>
                                                </div>
                                            </div>
                                        </div>

                                        {/* CARTÃO PROJEÇÃO FUTURA */}
                                        <div className="flex-1 bg-indigo-50 p-4 rounded-xl shadow-sm border border-indigo-200">
                                            <h4 className="text-xs font-bold text-indigo-500 uppercase mb-2">Projeção Futura (Final)</h4>
                                            <div className="flex justify-between items-end">
                                                <div>
                                                    <span className="text-3xl font-bold text-indigo-900">{selectedInstructorDetail.futureTotal}</span>
                                                    <span className="text-sm text-indigo-600 ml-1">Turmas</span>
                                                </div>
                                                <div className="text-right">
                                                    {(() => {
                                                        const diff = selectedInstructorDetail.futureTotal - selectedInstructorDetail.totalTurmas;
                                                        if (diff > 0) {
                                                            return <span className="text-sm font-bold px-2 py-1 rounded bg-green-100 text-green-700">▲ +{diff} Turmas</span>;
                                                        } else if (diff < 0) {
                                                            return <span className="text-sm font-bold px-2 py-1 rounded bg-red-100 text-red-700">▼ {diff} Turmas</span>;
                                                        } else {
                                                            return <span className="text-sm font-bold px-2 py-1 rounded bg-gray-100 text-gray-600">▬ Estável</span>;
                                                        }
                                                    })()}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                        
                                        {/* COLUNA 1: TABELA COMPARATIVA & TURMAS ATIVAS */}
                                        <div className="lg:col-span-2 space-y-6">
                                            {/* TABELA COMPARATIVA DE CURSOS EXPANDIDA */}
                                            <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                                                <div className="bg-gray-50 px-4 py-2 border-b border-gray-200 font-bold text-gray-700 text-sm flex items-center gap-2">
                                                    <Icons.Trend /> Movimentação por Curso
                                                </div>
                                                <table className="min-w-full comp-table">
                                                    <thead>
                                                        <tr>
                                                            <th>Curso</th>
                                                            <th className="text-center bg-blue-50">Atual</th>
                                                            <th className="text-center text-green-700 bg-green-50">+ Entradas</th>
                                                            <th className="text-center text-red-700 bg-red-50">- Saídas/Fim</th>
                                                            <th className="text-center bg-indigo-50 text-indigo-800">Final</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {Object.keys(selectedInstructorDetail.detalheCursos).sort().map(curso => {
                                                            const d = selectedInstructorDetail.detalheCursos[curso];
                                                            // Se tudo for zero, ignora (opcional)
                                                            if (d.atual === 0 && d.entradas === 0 && d.saidas === 0 && d.final === 0) return null;
                                                            return (
                                                                <tr key={curso}>
                                                                    <td className="font-medium text-gray-700">{curso}</td>
                                                                    <td className="text-center font-bold text-blue-800 bg-blue-50/50">{d.atual}</td>
                                                                    <td className="text-center font-bold text-green-600 bg-green-50/50">{d.entradas > 0 ? `+${d.entradas}` : '-'}</td>
                                                                    <td className="text-center font-bold text-red-500 bg-red-50/50">{d.saidas > 0 ? `-${d.saidas}` : '-'}</td>
                                                                    <td className="text-center font-bold text-indigo-700 bg-indigo-50/50">{d.final}</td>
                                                                </tr>
                                                            );
                                                        })}
                                                        {Object.keys(selectedInstructorDetail.detalheCursos).length === 0 && (
                                                            <tr><td colSpan="5" className="text-center text-gray-400 italic">Sem registros de movimentação para este instrutor.</td></tr>
                                                        )}
                                                    </tbody>
                                                </table>
                                            </div>

                                            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                                                <h3 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2 border-b pb-2">
                                                    <span className="text-green-600">●</span> Turmas Ativas ({selectedInstructorDetail.totalTurmas})
                                                    <span className="text-xs font-normal text-gray-500 ml-auto">Baseado na data {formatDatePTBR(viewDate)}</span>
                                                </h3>
                                                
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                    {/* TURMAS PRÓPRIAS */}
                                                    {selectedInstructorDetail.myClasses.filter(c => !c.isFinished && c.status !== 'Transferido').map(cls => (
                                                        <div key={cls.id} className="bg-green-50 border border-green-200 p-4 rounded-lg relative overflow-hidden group hover:shadow-md transition">
                                                            <div className="absolute top-0 right-0 w-3 h-3 bg-green-500 rounded-bl"></div>
                                                            <div className="flex justify-between items-start mb-2">
                                                                <div>
                                                                    <span className="font-bold text-gray-800 text-lg">T.{cls.id}</span>
                                                                    <p className="text-sm text-green-800 font-medium">{cls.curso}</p>
                                                                </div>
                                                                <span className="bg-white px-2 py-1 rounded text-xs font-bold border border-green-100 text-green-700">{cls.alunos} Alunos</span>
                                                            </div>
                                                            <div className="text-xs text-gray-500 space-y-1">
                                                                <p>Início: {formatDatePTBR(cls.inicio)}</p>
                                                                <p className="font-semibold text-gray-600">
                                                                    Troca Prevista: {cls.dataTransferencia ? formatDatePTBR(cls.dataTransferencia) : 'Sem previsão'}
                                                                    {cls.dataTransferencia && cls.instrutor2 && ` ➔ ${cls.instrutor2}`}
                                                                </p>
                                                                <p className="text-blue-600 font-bold mt-1">Analista: {cls.analista}</p>
                                                            </div>
                                                        </div>
                                                    ))}
                                                    
                                                    {/* TURMAS RECEBIDAS */}
                                                    {selectedInstructorDetail.receivedClasses.map(cls => (
                                                        <div key={cls.id} className="bg-blue-50 border border-blue-200 p-4 rounded-lg relative overflow-hidden group hover:shadow-md transition">
                                                            <div className="absolute top-0 right-0 px-2 py-0.5 bg-blue-500 text-white text-[10px] font-bold rounded-bl">RECEBIDA</div>
                                                            <div className="flex justify-between items-start mb-2">
                                                                <div>
                                                                    <span className="font-bold text-gray-800 text-lg">T.{cls.id}</span>
                                                                    <p className="text-sm text-blue-800 font-medium">{cls.curso}</p>
                                                                </div>
                                                                <span className="bg-white px-2 py-1 rounded text-xs font-bold border border-blue-100 text-blue-700">{cls.alunos} Alunos</span>
                                                            </div>
                                                            <div className="text-xs text-gray-500 space-y-1">
                                                                <p>Veio de: <strong>{cls.instrutor1}</strong> em {formatDatePTBR(cls.dataTransferencia)}</p>
                                                                <p>Término: {formatDatePTBR(cls.termino)}</p>
                                                                <p className="text-blue-600 font-bold mt-1">Analista: {cls.analista}</p>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                                
                                                {selectedInstructorDetail.totalTurmas === 0 && (
                                                    <div className="text-center py-8 text-gray-400 italic bg-gray-50 rounded border border-dashed">
                                                        Nenhuma turma ativa nesta data.
                                                    </div>
                                                )}
                                            </div>
                                        </div>

                                        {/* COLUNA 2: LINHA DO TEMPO FUTURA */}
                                        <div className="lg:col-span-1">
                                            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200 h-full relative overflow-hidden">
                                                <h3 className="text-lg font-bold text-gray-800 mb-6 flex items-center gap-2 border-b pb-2">
                                                    <Icons.Calendar /> Futuro (Após {formatDatePTBR(viewDate)})
                                                </h3>
                                                
                                                <div className="relative pl-2 space-y-6">
                                                    {/* Linha vertical */}
                                                    <div className="timeline-line"></div>
                                                    
                                                    {selectedInstructorDetail.futureEvents.length === 0 ? (
                                                        <p className="text-sm text-gray-400 italic pl-6">Nenhuma movimentação futura prevista.</p>
                                                    ) : (
                                                        selectedInstructorDetail.futureEvents.map((evt, i) => (
                                                            <div key={i} className="timeline-item flex gap-4 fade-in">
                                                                {/* Bolinha do Timeline */}
                                                                <div className={`w-8 h-8 rounded-full flex items-center justify-center border-2 shrink-0 z-10 bg-white 
                                                                    ${evt.type === 'entry' ? 'border-green-500 text-green-600' : 
                                                                      evt.type === 'exit' ? 'border-orange-500 text-orange-600' : 
                                                                      'border-red-500 text-red-600'}`}>
                                                                    {evt.type === 'entry' ? '+' : evt.type === 'exit' ? '➔' : '■'}
                                                                </div>
                                                                
                                                                <div className="bg-gray-50 border border-gray-200 rounded p-3 flex-1 text-sm shadow-sm relative">
                                                                    <div className="absolute right-2 top-2 bg-gray-100 px-2 py-1 rounded text-xs font-bold text-gray-600">
                                                                        Saldo: {evt.runningTotal}
                                                                    </div>
                                                                    <div className="flex justify-between font-bold text-gray-700 mb-1">
                                                                        <span>{formatDatePTBR(evt.date)}</span>
                                                                        <span className={`text-[10px] uppercase px-1 rounded border mr-16 
                                                                            ${evt.type === 'entry' ? 'bg-green-100 text-green-700 border-green-200' : 
                                                                              evt.type === 'exit' ? 'bg-orange-100 text-orange-700 border-orange-200' : 
                                                                              'bg-red-100 text-red-700 border-red-200'}`}>
                                                                            {evt.type === 'entry' ? 'Entrada' : evt.type === 'exit' ? 'Saída' : 'Fim'}
                                                                        </span>
                                                                    </div>
                                                                    <p className="font-semibold">{evt.turma.curso}</p>
                                                                    <p className="text-xs text-gray-500 mt-1">{evt.detail}</p>
                                                                    <p className="text-xs text-gray-400 mt-0.5">Turma {evt.turma.id}</p>
                                                                </div>
                                                            </div>
                                                        ))
                                                    )}
                                                </div>
                                            </div>
                                        </div>

                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* ... (Modais de Nova Turma e Substituição permanecem iguais, omitidos para brevidade mas inclusos no código final) ... */}
                    {isFormOpen && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 backdrop-blur-sm fade-in">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
                                <div className="p-6 border-b border-gray-100 flex justify-between items-center bg-blue-900 text-white rounded-t-2xl">
                                    <h3 className="text-xl font-bold flex items-center gap-2"><Icons.Plus /> Adicionar Nova Turma</h3>
                                    <button onClick={() => setIsFormOpen(false)} className="hover:bg-white/20 p-1 rounded-full text-white">✕</button>
                                </div>
                                <form onSubmit={handleAddClass} className="p-6 grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="md:col-span-2">
                                        <label className="block text-sm font-bold text-gray-700 mb-1">ID da Turma</label>
                                        <input required type="text" className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500" value={newClass.id} onChange={e => setNewClass({...newClass, id: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">Curso</label>
                                        <select required className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500" value={newClass.curso} onChange={handleNewClassCourseChange}>
                                            <option value="">Selecione...</option>
                                            {COURSE_OPTIONS.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">Total de Jovens</label>
                                        <input required type="number" className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500" value={newClass.alunos} onChange={e => setNewClass({...newClass, alunos: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">Analista</label>
                                        <input required type="text" className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500" value={newClass.analista} onChange={e => setNewClass({...newClass, analista: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">Data Transferência</label>
                                        <input type="date" className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500" value={newClass.dataTransferencia} onChange={e => setNewClass({...newClass, dataTransferencia: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">Início</label>
                                        <input required type="date" className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500" value={newClass.inicio} onChange={e => setNewClass({...newClass, inicio: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">Término</label>
                                        <input required type="date" className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500" value={newClass.termino} onChange={e => setNewClass({...newClass, termino: e.target.value})} />
                                    </div>

                                    {/* INSTRUTOR 1 COM SUGESTÕES */}
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">Instrutor 1 (Titular)</label>
                                        <input 
                                            required 
                                            type="text" 
                                            list="all-instructors" 
                                            className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500" 
                                            value={newClass.instrutor1} 
                                            onChange={e => setNewClass({...newClass, instrutor1: e.target.value})} 
                                            placeholder="Digite ou selecione..." 
                                        />
                                        
                                        {modalSuggestions.i1.length > 0 && (
                                            <div className="mt-2 flex flex-wrap gap-2">
                                                <span className="text-xs font-bold text-gray-500 w-full flex items-center gap-1"><Icons.Bulb /> Sugestões (Menor Carga):</span>
                                                {modalSuggestions.i1.map(rec => (
                                                    <button 
                                                        key={rec.nome}
                                                        type="button"
                                                        onClick={() => setNewClass(prev => ({ ...prev, instrutor1: rec.nome }))}
